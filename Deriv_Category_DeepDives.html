nd Growth Hacking","done":["Speaker 1 shared a chat link to the \"H1 design plan mission goals\" document.","The document blends functional themes (e.g., best-in-class product experience) with tribe-specific AI initiatives.","Next week will prioritise demos over document presentations.","It includes details on Generate, UX fix, dependencies, and timelines."]}]}]},{"label":"Off-Topic / Personal","emoji":"⚪","bg":"#EEEEEE","fg":"#777777","count":10,"summary":"10 meetings across 4 weeks. Two clusters: Dec Week 1 (real estate and tea cafe investment conversations recorded on the same device) and Feb Weeks 1 and 3 (astrology consultation, pranayama, jewellery B2B site planning). These recordings are ambient context — personal conversations captured by the Plaud device — not business meetings, but they appear in the log.","weeks":[{"month":"Dec 2025","week":"Week 1 (Dec 01-07)","count":4,"monthHead":"#6C3483","monthLight":"#F5EEF8","commentary":"Four personal recordings from the same device used for business meetings. Three real estate AI conversations explore investment opportunities in property — lead generation tools, client management systems, and AI assistants for real estate research. One tea cafe business investment discussion explores a franchise model. These are ambient recordings, not business meetings, but they appear in the log as the Plaud device recorded conversations outside business hours.","meetings":[{"title":"Real Estate AI, Lead Generation, and Process Automation","done":["**Description**:","Speaker 1 explains the current client property search as extremely time-intensive—up to 24 hours of work per single lead.","Steps include searching portals like Bayut, filtering by budget (e.g., 1 million), and checking building attributes such as age.","ROI calculation requires checking last transaction prices on Property Monitor and finding accurate service charges, which are often not listed."]},{"title":"Real Estate Research, Client Management, and AI Agent","done":["**Description**:","[Speaker 1] describes the current client journey, using an example of a client with a 1.1 million budget who ultimately purchased a 750,000 property and then requested research for off-plan properties.","The research process is manual and time-consuming, taking at least a full day of work for a single client.","Key research steps include:"]},{"title":"Real Estate and AI Assistant","done":["Speaker 1 outlines a process that begins with understanding client requirements and building rapport over a call.","A key step is conducting in-depth property research, including launch date, service charges, current rental income, and investment potential.","Speaker 1 emphasizes they don’t know every building in the vast Dubai market and must first discover available options.","Speaker 2 proposes a workflow where an AI tool takes client requirements (e.g., budget) and identifies 5–10 matching properties."]},{"title":"Tea Cafe Business Investment and Franchise Model","done":["Speaker 1 is researching the launch of a tea cafe in Dubai as a personal investment and new venture.","The plan is for a full-fledged cafe of approximately 1,500 sq ft, not a small corner shop.","Two investment models are under consideration:","**Franchising:** Partnering with an established brand such as Chai Forint, Garam Masala, or Chaiyos, leveraging logistical support and brand recognition."]}]},{"month":"Dec 2025","week":"Week 2 (Dec 08-14)","count":1,"monthHead":"#6C3483","monthLight":"#F5EEF8","commentary":"A single PropTech, WhatsApp Integration, and Real Estate Search session — continuing the real estate exploration from the previous week. Still in the same GTFT Summit week, suggesting the device was recording peripheral conversations at the event venue.","meetings":[{"title":"PropTech, WhatsApp Integration, Real Estate Search","done":["**Description**","The discussion focuses on creating a tool to address real estate agents’ difficulty in finding suitable projects for clients with specific requirements.","Agents currently depend on numerous WhatsApp groups with developers, making information search inefficient and causing phone performance issues due to stored images and files.","The proposed solution is a cloud-based system that uses a prompt-based search (similar to an AI chatbot) to find projects across all developers."]}]},{"month":"Feb 2026","week":"Week 1 (Feb 01-07)","count":4,"monthHead":"#922B21","monthLight":"#FDEDEC","commentary":"Four personal recordings in a low-intensity work week. An astrological consultation covers career, finance, and marriage. Two wellness sessions (breathing/mudras/consciousness and pranayama/nadi balance/meditation). A jewellery business marketing and content strategy session for a B2B contact. None are business-related but they appear in the log because the Plaud device was active.","meetings":[{"title":"02-01 Astrological Consultation- Shivank Shankar - Career, Finance, and Marriage Predictions","done":["A financial rise is anticipated from 7th February to 12th April due to “money promotion”.","Planetary positions discussed:","Jupiter: 4 points.","Moon: 5 points."]},{"title":"02-01 Meeting- Breathing, Mudras, and Consciousness","done":["The main topic of discussion was the relationship between breathing techniques, mudras (hand gestures), and consciousness.","Breathing is identified as the primary system for influencing consciousness, while mudras are considered an auxiliary or secondary method to activate it.","An analogy was used to explain this: the engine is the main part of a car, while the driver, clutch, and brake are auxiliary components. Similarly, breathing is the engine, and mudras are supporting tools.","Mindfulness practice directly impacts the body by connecting to the nervous system."]},{"title":"02-04 Meeting- Jewellery Business Marketing and Content Strategy","done":["Speaker 1 highlighted challenges for entrepreneurs, including quality mismatches, timeline delays, and poor communication with manufacturers.","Both Speaker 1 (Kasturi Accessories) and Speaker 2 (Asalaya) emphasised fully in‑house operations from design to delivery, citing 30 years of experience as a key differentiator.","Primary objective: generate leads via WhatsApp or calls.","Two core marketing channels were discussed:"]},{"title":"02-05 Meeting- Pranayama, Nadi Balance, and Meditation Protocols","done":["Topic Title: Breathing, Nadi Concepts, and Meditation Guidance","The speaker emphasised deep meditation and pranayama practice.","Both nostrils should have equal airflow; sushumna is said to activate when both nostrils are open.","Advised not to go outside or do work when both nostrils flow together (sushumna); risk and caution highlighted."]}]},{"month":"Feb 2026","week":"Week 3 (Feb 15-21)","count":1,"monthHead":"#922B21","monthLight":"#FDEDEC","commentary":"A jewellery B2B trust site, pricing categories, and link-in-bio ad funnel session — a conversation about building a direct-to-consumer marketing funnel for a jewellery contact's business. The 'link-in-bio ad funnel' concept draws on the same digital marketing knowledge applied to Deriv's own campaigns.","meetings":[{"title":"Abhimanyu- Jewellery B2B Trust Site, Pricing Categories, and Link-in-Bio Ad Funnel","done":["Topic Title: Video content strategy and “link in bio” flow","The video should follow the usual style but end with a clear “link in bio” call-to-action.","Goal: Viewers click the bio link, reach the website, and connect via WhatsApp for B2B queries.","Once this flow works, they will further refine content."]}]}]},{"label":"1:1 & Team Check-ins","emoji":"💬","bg":"#F9FBE7","fg":"#558B2F","count":6,"summary":"Only 6 meetings tagged here — a reflection of the categorisation logic, not actual 1:1 volume. Many regular check-ins were absorbed into the category of the work being discussed (e.g. Naomi meetings tagged as Partner & Affiliate if they covered partner topics). The Nov Week 1 cluster (ClickUp review, Oct 2x2) established the team's operating rhythm; the Jan Week 2 Yoli Weekly completed the martech stack alignment.","weeks":[{"month":"Nov 2025","week":"Week 1 (Nov 01-07)","count":4,"monthHead":"#145A32","monthLight":"#D5F5E3","commentary":"Four operational cadence sessions establish the team's working rhythm. ClickUp Update with Yoli and ClickUp Review with Conor confirm the project management tool being used for tracking. Oct 2x2 with Yoli is the first formal two-by-two alignment session between Shivank and Yoli — a recurring format for strategic alignment. Updates with Naomi begins the weekly cadence with the new Team Lead.","meetings":[{"title":"Clickup Update with Yoli","done":["Project and Task Updates: A review of ongoing marketing initiatives including the AppsFlyer implementation, re-evaluation of influencer marketing agencies, and setting up affiliate partner accounts with Google Ads. The goal is to finalise the influencer agency this month and coordinate with Google on affiliate strategies.","Tagline Campaign Rollout: The finalisation of the new tagline's launch, which is dependent on a promotional video. The core task is to complete minor animation tweaks, after which the video will be a ready-to-distribute package for all channels.","Branding Campaign Strategy and Budget: A strategic discussion on whether all marketing campaigns, such as tournaments and tagline promotions, should be run continuously ('evergreen') under a unified branding budget. The current approach budgets campaigns separately, with only the tagline campaign funded for branding, using a budget of 183k. The proposal is to create a single branding pool to fund all campaigns targeting the same audience.","Content and Media Project Management: A critical discussion about the strain on the content and media team due to resource cuts (designers, QAs leaving) while facing an increasing number of high-priority website projects (Banking, API, Deriv AI, Deriv Mobile). The key issue is the inability to meet aggressive timelines and maintain quality and brand consistency, leading to a decision to regroup and push back on deadlines."]},{"title":"Clickup review with Conor","done":["A major focus was on improving task management. [Speaker 1] highlighted that many tasks on the current list are unclear, making it difficult to track progress. The goal is to have clearly defined tasks with proper descriptions and a single owner per sub-task to avoid confusion, particularly between individuals like Ishaan and Ashwati.","To address this, a project board cleanup was initiated. Outdated or completed cards (e.g., \"tournament\") will be closed or archived. A follow-up meeting with Ashwati is planned to review and clean up her assigned cards.","**FB Strategy Revamp:** The team discussed a new full-funnel strategy for Facebook, which will be tested in Tier 1 regions first. To improve tracking, new, separate cards will be created for each region's campaign launch.","**App Marketing Plan:** [Speaker 1] has drafted an app marketing plan outlining a phased approach (install, demo/real phases). This will be shared with [Speaker 2] for input on retargeting strategies and to help identify potential skill gaps for future hiring."]},{"title":"Oct 2x2 with Yoli","done":["Translation workflows","Product design alignment","Notifications and preferences","Topic Title: October updates overview and reporting scope"]},{"title":"Updates with Naomi","done":["**Q3/Q4 Update using BCG Matrix:** A method for structuring a business update presentation for a trip to Malaysia. The BCG Matrix is used to classify partner initiatives into four quadrants: Stars (e.g., the new five-step journey), Question Marks (e.g., Partner API, Google Ads program), Cash Cows (e.g., core geographies), and Dogs (low-potential activities to be discontinued).","**Influencer Marketing Strategy:** A two-pronged approach involving continuing with proven UA influencers under a monthly plan while scouting new regional influencers in areas like LATAM and Africa. A specific tool for Africa is under review.","**Google Ads Partner Program:** A proposed initiative to provide platinum affiliate partners with child accounts under a main company parent account. This offers them a legitimate infrastructure to run Google Ads, overcoming suspension issues, while giving the company visibility into their campaigns.","**Serbia Test Campaign:** A new, small-scale test campaign launched in Serbia with a daily budget of 25. The campaign will run in English for approximately two weeks to gauge lead generation and activation rates in a new market."]}]},{"month":"Dec 2025","week":"Week 2 (Dec 08-14)","count":1,"monthHead":"#6C3483","monthLight":"#F5EEF8","commentary":"Anwar Meeting — a brief stakeholder check-in in the busiest week of the period. Low information density but signals that the relationship management cadence continues even in high-intensity execution weeks.","meetings":[{"title":"Anwar meeting","done":["AI tools for work and planning","Discussion on using Google as an AI studio and other tools (e.g., “Manus”).","Concerns about over-promising delivery with AI and planning.","Reference to departments pushing teams to meet ambitious targets."]}]},{"month":"Jan 2026","week":"Week 2 (Jan 08-14)","count":1,"monthHead":"#7D6608","monthLight":"#FEFCE8","commentary":"Yoli Weekly Meeting — Martech Stack and Customer Journey Analysis. The weekly 1:1 with Yoli covers the full martech stack review and maps the customer journey across all touchpoints. This is a strategy-level session that happens within the 1:1 format — evidence that the weekly check-in cadence carries significant strategic content.","meetings":[{"title":"Yoli Weekly Meeting- Martech Stack & Customer Journey Analysis","done":["A diagram of the company's marketing technology stack was reviewed, starting with demand generation channels such as organic search, social media, retargeting (AdRoll, Match2One), PPC (Google, Bing, Meta), and affiliate platforms (Dynamic Works, MyAffiliates, Scalia). Earned and paid media were noted as important channels to be added.","The content tool strategy has changed, with a new structure involving apps like Create, Marketry, and Amplify. AI tools like Attitude and Create are in use, with plans to merge their features. Postly, also known as Partner Toolkit, will transition into a \"partner resource hub\" and is being managed by Alvi and Harsh.","A new project, \"MarketLabs,\" is being developed to act as an interface between the Academy, website, and Creators Hub.","Form-building platforms like FlutterFlow, OutSystems, and Webflow need to be included in the martech diagram."]}]}]}];
const DEEP = {"Partner & Affiliate": {"tagline": "The largest category by volume — 79 meetings, 19 active weeks, present in every single month.", "sections": [{"heading": "Strategic Role", "body": "The partner and affiliate channel was Deriv's second acquisition engine alongside direct paid search. Unlike Google Ads — which was optimised through algorithms and bidding logic — the partner channel was relationship-dependent: every percentage point of improvement required a human decision, an audit, a conversation, or a tool build. This made it simultaneously the most time-intensive and the most unautomated part of the growth strategy. The six-month period was an explicit attempt to change that."}, {"heading": "The Arc: November to March", "body": "November opened with pure activation — six meetings in Week 1 alone establishing who Vince and Saurabh were, what they would own, and how partner PPC would be separated from direct PPC. By Week 3, the Mauritius audit cycle began, which would run for three rounds through December. This compliance auditing was essential: Mauritius-based partners operated under different regulatory conditions, and sign-off was required before spend could scale.\n\nDecember shifted to creative and campaign development for the partner channel specifically — the Campaign Factory sessions produced affiliate-native messaging. The AI Partner Buddy concept (an automated agent for routine influencer outreach) first appeared here, planting the seed of what would become Amy.\n\nJanuary was the pivot to AI-driven partner operations. The two Vince sessions in Week 1 diagnosed structural funnel inefficiencies that had been accumulating since November. Week 3 became the most productive partner week of the entire period — eight meetings in five days, covering the Amy influencer agent specification, the Partner War Room preparation, Match2One's assisted conversion methodology, and Saurabh's mission-based intelligence system. The Partners Hub V2 migration was also flagged in Week 4 as a risk — the platform migration would break partner tracking.\n\nFebruary saw the partner channel stress-tested by the VIP crisis. As the Google spend gap became undeniable, the partner channel was asked to compensate — leading to six meetings in Week 2 covering V2 funnel optimisation, WhatsApp lead nurturing, retargeting, and API integrations. Week 4 brought the most commercially consequential partner question of the year: can the partner channel contribute to FTD recovery at the scale required for VIP?\n\nMarch answered: yes, but only with a predictive model. All five March Week 3 meetings converged on the partner prediction model — data requirements, timeline, geo expansion (Philippines), affiliate compliance, and ad platform integration. The model was scoped and the data requirements agreed. Implementation would carry into Q2."}, {"heading": "Key People", "body": "Vince and Saurabh were the two primary external partner contacts. Naomi owned the partner channel internally from the team lead perspective, with Prakash providing oversight on partner acquisition strategy. Zafluence (influencer marketing), Match2One (programmatic / M2O pixel), and eventually Nef (Philippines) were the main agency and affiliate relationships."}, {"heading": "Key Tensions and Unresolved Issues", "body": "The partner channel had three persistent unresolved problems through the entire period. First, attribution: partner-driven FTDs were difficult to separate from direct FTDs because the partner click-to-registration path was often broken or multi-step, meaning conversion credit was ambiguous. Second, data quality: the predictive model required clean partner-level conversion data, but the data pipeline from partner platforms into Deriv's BI layer was not built until March. Third, compliance: every geo expansion (Mauritius, Philippines) required a fresh compliance audit before spend could scale, creating a lag between strategic intent and execution."}, {"heading": "Commercial Significance", "body": "Partner and affiliate was explicitly framed as a VIP recovery mechanism in February and March. If Google direct spend couldn't reach the VIP threshold alone, partner-attributed FTDs (uploaded as offline conversions) could supplement the evidence. This made the partner prediction model a dual-purpose deliverable: it would improve partner channel ROI directly AND provide the attribution evidence needed for the Google VIP case."}]}, "AI & Predictive Modelling": {"tagline": "The intellectual and strategic core of the six months — 54 meetings tracing the journey from concept to live production models.", "sections": [{"heading": "Strategic Role", "body": "AI & Predictive Modelling was not a support function — it was the primary strategic bet. The explicit goal from early December onwards was to make Deriv's marketing operation AI-first: every campaign decision guided by a model, every budget allocation informed by a signal, every partner interaction augmented by automation. This was both a productivity ambition (fewer manual decisions) and a commercial one (better decisions = higher FTD conversion = faster path to Google VIP)."}, {"heading": "The Four-Phase Arc", "body": "Phase 1 — Concept and Scoping (Oct–Nov): The AI root cause analysis tool (Oct Week 5) established the first use case. Predictive modelling entered the conversation in Nov Week 1 as a forward-looking tool — can we predict which leads will become FTDs before they convert? This question would define the next four months.\n\nPhase 2 — Architecture (Dec): December was the most intellectually intense period. The PPC Rule Engine, CPA-CPL controls, and DOS-LTV mapping (Dec Week 1) formalised the mathematical framework. The Agentic AI and AI Acceleration sessions (Dec Week 2) set the strategic horizon. The Quants Meeting (Dec Week 5) introduced the two-model architecture — a deposit probability model layered with a lead scoring model — which became the blueprint for the FTD prediction system. The AI-First PPC declaration formalised the operating model.\n\nPhase 3 — Build (Jan–Feb): January was the most meeting-intensive AI period. Week 1 alone had six sessions covering Rakshit's townhall, Aswathi's project strategy, the lead scoring model specification, and Harsh's strategic realignment. Week 3 had eight sessions including the multi-agent architecture design. Week 4 formalised the Advertising OS — the product that would contain all AI components — with a named architecture, a rule engine roadmap, and automation strategy. February advanced the ensemble model: feature importance, calibration, and country-level activation were defined as distinct engineering milestones.\n\nPhase 4 — Live Deployment (Mar): The convergence arrived in Mar Week 3. The Conversion Accelerator launched March 18. The Predictive FTD Model went live March 19. Both were the primary AI deliverables of the entire six-month period. The PPC AI Agent (scoped Mar Week 2) carried forward into Q2."}, {"heading": "The Advertising OS", "body": "The Advertising OS was the product concept that gave the AI work a coherent identity. Formalised in the Jan 23 session, it was defined as the system that would house: the rule engine (automated bid and budget decisions), the predictive models (FTD probability, LTV scoring), the signal engineering layer (feature extraction from raw platform data), and the campaign intelligence dashboard (human-readable output of all model recommendations). By March, the Advertising OS was being actively built and partially live — though full deployment was a Q2 objective."}, {"heading": "Key People and Inputs", "body": "Rakshit provided the executive mandate (two meetings plus a townhall). Aswathi led the Advertising OS and predictive modelling workstream internally. Harsh contributed generative AI capability (workshop + strategic sessions). The Quants team provided the statistical architecture for the ensemble model. Mai AI (external agency) ran the Zimbabwe Google Ads AI pilot as an external validation. Mahantesh tested the Claude Bot experiment for PPC decision automation — the first direct integration of Claude AI into campaign operations."}, {"heading": "Data Quality as the Binding Constraint", "body": "Every phase of the AI work ran into the same ceiling: the training data was impure. The V2 migration had broken event tracking, the UTM taxonomy had gaps, the GCLID offline conversion upload was incomplete, and the partner conversion path was partially untracked. The Jan Week 2 Quants session explicitly named data quality as the primary constraint. This didn't stop the model from being built — but it meant the first production versions would need recalibration once the attribution infrastructure was repaired. The war room that emerged in Mar Week 3 was, at its core, about fixing the data the AI models needed to be reliable."}, {"heading": "Commercial Outcome", "body": "The Conversion Accelerator and FTD Predictive Model going live in March Week 3 represented the most significant technical deliverables of the period. They were also the foundation for the Q2 Google VIP evidence argument — if the models could demonstrably increase FTD conversion rates attributable to Google campaigns, the VIP case could be made on output (FTDs generated) rather than input (spend levels), which was a much stronger position."}]}, "PPC & Campaign Execution": {"tagline": "The operational execution layer — 41 meetings covering the daily machinery of how campaigns were planned, launched, and optimised.", "sections": [{"heading": "Strategic Role", "body": "PPC & Campaign Execution was the revenue-generating engine. Every other category — AI, attribution, dashboards, Google partnership — ultimately served this one. The meeting volume (41 sessions across 16 weeks) reflects a team that was executing continuously while simultaneously rebuilding its operating model. The challenge was that the team was trying to run at full speed and change the car simultaneously: executing Q4 campaigns while introducing AI Max, rebuilding tracking, onboarding PMAX, and managing a platform migration."}, {"heading": "The Killing Countries Framework (Nov)", "body": "The period opened with a defining decision: the 'Killing Countries' framework. Rather than maintaining campaigns in all markets regardless of performance, a data-driven triage was implemented — countries below active trader and revenue thresholds were cut. This was the first evidence of a metric-led decision-making culture taking hold. It freed budget to double down on Tier 1 markets (UAE, Mexico, Colombia, Saudi Arabia) and established the principle that no campaign should survive on hope alone."}, {"heading": "The Transition to AI-Assisted Campaign Management (Dec–Jan)", "body": "December marked the shift from rules-based campaign management to AI-augmented decision-making. The PPC Rule Engine was locked in Dec Week 1, defining the automated logic for CPA/CPL controls. By December Week 5, the AI-First PPC Model was formalised — a document that specified which decisions would be automated, which would be AI-recommended, and which would remain human. January Week 4 was the execution peak: five PPC sessions in a single week covering FTD signal integration, AI for campaign management, launch timelines, funnel diagnostics, and data automation. The Advertising OS was named as the container for all of this."}, {"heading": "AI Max and PMAX", "body": "Google's AI Max (activated January 1) and PMAX were the two campaign types that carried the most strategic weight. AI Max was a condition of the Google VIP programme — Google required Deriv to activate it as proof of commitment to Google's AI-first ad products. PMAX (Performance Max) ran across all Google inventory and required careful signal input: the better the FTD conversion data fed into PMAX, the better Google's algorithm could optimise. This created a circular dependency — better attribution feeds better PMAX signals, better PMAX signals produce better FTDs, better FTDs provide better attribution evidence. The entire H1 2026 strategy depended on getting this loop right."}, {"heading": "Compliance as a Growing Constraint (Mar)", "body": "By March, Google Ads policy compliance had become a material execution risk. Campaign disapprovals, URL policy violations, and landing page issues were consuming bandwidth that should have been spent on optimisation. Two sessions in March Week 2 were dedicated purely to compliance — an unusual allocation in a period of maximum performance pressure. The iOS landing page tracking issue (Apple's privacy framework stripping click IDs on Safari) was an additional technical constraint that reduced measurable FTD volume from mobile traffic."}, {"heading": "The Q1 Shortfall", "body": "The Q1 target had been set at $3.48M FTD revenue, revised down to $2.7M after the VIP crisis, and the March Week 1 projection landed at $1.49M — a 57% shortfall against the revised target. This shortfall was the commercial backdrop against which every March PPC session took place. The March Week 1 performance framework redesign was a direct response: if the absolute numbers couldn't be hit, at least the measurement, automation, and attribution infrastructure could be hardened for Q2."}]}, "Analytics, Attribution & Tracking": {"tagline": "The data integrity backbone — and the site of the period's deepest crisis. 40 meetings tracing a careful build-up followed by systematic breakdown.", "sections": [{"heading": "Strategic Role", "body": "Attribution was not an analytical nice-to-have — it was commercially load-bearing. Every Google VIP claim, every budget justification, every PMAX signal, every predictive model training run depended on accurate attribution data. When attribution degraded, it didn't just produce wrong reports; it actively corrupted the AI models, misled the campaign optimisers, and made the VIP case unprovable. This is why the attribution war room in March Week 3 was treated as an emergency, not a data hygiene task."}, {"heading": "Phase 1: Foundation (Nov–Dec)", "body": "November established the measurement baseline. GA4 was confirmed as the single source of truth in Week 1, with UTM taxonomy cleaned and unassigned traffic sources reduced. AppsFlyer was confirmed for mobile attribution over Firebase. The multi-touch attribution architecture was formally scoped in Nov Week 4 — a decision that created a long-running workstream that would not reach resolution in the six-month period.\n\nDecember added complexity. The V2 migration risk to GA4 events was flagged in Dec Week 1. Event360 (the internal data pipeline) was introduced as the attribution infrastructure in Dec Week 2. Hamza's traffic source analysis in Dec Week 4 began the forensic work on the 'Other/Direct' attribution bucket — the category that would eventually contain ~17K unclassified FTTs."}, {"heading": "Phase 2: Build and First Cracks (Jan)", "body": "January Week 2 was the attribution inflection point — seven sessions in a single week advanced the MTA implementation, addressed the GCLID gap, integrated Event360, and introduced post-view credit for YouTube. But the same week revealed that V2 event tracking was not correctly firing, and that GCLID records were not matching funded account records. The team was simultaneously building the attribution system and discovering it was already broken.\n\nJan Week 5 ended the month with an honest assessment: GA4 attribution and PPC credit discrepancies were unresolved. The system was built but not clean."}, {"heading": "Phase 3: Degradation (Feb)", "body": "February was where attribution integrity visibly degraded. Feb Week 2 revealed that HubSpot was misclassifying paid leads as organic due to UTM stripping — a systemic failure in the CRM handoff. Feb Week 3 brought the backend tracking discrepancy to a head: GA4 records didn't match backend conversion records, and the gap was widening. PostHog was evaluated as a supplementary tracking layer. Feb Week 4 identified the exact funnel steps where UTM parameters were being lost."}, {"heading": "Phase 4: War Room (Mar Week 3)", "body": "Five attribution sessions in a single week. The Meta Attribution Failure session (Mar 16) was the trigger — Meta's pixel was failing to fire on a significant proportion of conversions, and UTM parameters were being stripped by Meta's privacy framework. Three working sessions on Mar 17–18 performed the forensic reconciliation across Meta and Google. The Technical Review (Mar 18) confirmed: both platforms had systematic attribution failures, affecting an unknown proportion of FTD conversions.\n\nThe resolution architecture agreed in the Mar 18 Todo session was: Conversion API (CAPI) as the server-side solution, bypassing browser-level tracking restrictions. CAPI would send conversion events directly from Deriv's servers to Meta and Google, eliminating the dependency on browser-based pixels. This was the correct long-term fix — but implementation would carry into Q2."}, {"heading": "The 17K Unclassified FTTs", "body": "The discovery of approximately 17,000 FTTs (First-Time Traders) classified as 'Other/Direct' in the attribution system was the starkest evidence of the measurement failure. These traders had been acquired through some channel — paid search, organic, direct, referral — but the attribution system had lost the signal. The predictive model, the campaign optimisers, and the Google VIP evidence all had a significant hole in their denominators. Resolving this bucket was the primary attribution objective heading into Q2."}]}, "Dashboard & Reporting": {"tagline": "Sparse through Q4, foundational in January, then the primary deliverable of March — 24 meetings mapping the build of Deriv's campaign intelligence layer.", "sections": [{"heading": "Strategic Role", "body": "The dashboard was the interface between the AI models and the humans who needed to act on them. Without a dashboard, the predictive model's outputs had nowhere to land — they were numbers in a database that nobody could see or act on. Building the campaign performance dashboard was therefore the last-mile delivery step for the entire AI & Predictive Modelling workstream. It's why March became so dashboard-intensive: the models were ready, but the human interface wasn't."}, {"heading": "The Slow Start (Nov–Dec)", "body": "Only two dashboard sessions in the entire Q4 period. Nov Week 1's HOD Scorecard Alignment established the concept of a department-level performance scorecard — but it was a governance discussion, not a build. Dec Week 3's CAPI Dashboard session was a design conversation. The team was busy building the underlying data and model infrastructure; the visualisation layer came later."}, {"heading": "Architecture Defined (Jan)", "body": "January Weeks 3 and 4 were when the dashboard project was properly scoped and resourced. Six sessions across two weeks defined the technical architecture (AI-driven optimisation dashboard with accuracy guardrails), the API integrations needed (Google Ads, Meta Ads, BigQuery), the milestones and AI dependencies, and the global scope (all regions, all channels). The Global Marketing Dashboard session (Jan Week 4) added compliance logging as a requirement — the dashboard needed to record every automated decision for audit purposes. This was prescient: Google policy compliance became a live issue in March."}, {"heading": "The March Sprint (Weeks 1–3)", "body": "The dashboard went from scoped to built in a three-week sprint under crisis conditions. Damon and Dux were assigned full-time to the build in Mar Week 1. By Mar Week 2, a prototype had been completed using Claude AI (the AI assistant, used to accelerate the dashboard code). Five sessions in Mar Week 2 refined the performance tracking, retargeting integration, Q1 reporting, and data access. Five more sessions in Mar Week 3 defined the AI recommendation layer, the Google Search scoping (narrowed for reliability), the BI pipeline resolution, and the AI Agent roadmap — making the dashboard self-optimising via the PPC AI Agent developed in parallel.\n\nThis was the fastest material build of the entire six-month period — from architecture to prototype in six weeks."}, {"heading": "Data Access as the Recurring Blocker", "body": "Every week of the March dashboard sprint mentioned the same constraint: BI pipeline and data access issues. The team could build the visualisation layer, define the logic, and agree on the metrics — but the data from the V2 platform was not flowing cleanly into the BI layer. This was the same V1→V2 database migration ownership problem that surfaced in the Platform & Technology category. The dashboard sprint surfaced it as a delivery risk rather than an abstract infrastructure concern."}, {"heading": "The Intelligence Layer", "body": "The Mar Week 3 session titled 'Ad Dashboard Intelligence Layer' formalised the concept that the dashboard was not merely a reporting tool but an intelligence product. The intelligence layer consisted of: model-generated recommendations (what to change), automated actions (what was changed automatically), confidence scores (how reliable each recommendation was), and an audit log (when and why each decision was made). This architecture positioned the dashboard as a precursor to the fully autonomous PPC AI Agent."}]}, "Platform & Technology": {"tagline": "19 meetings across 10 weeks — the infrastructure decisions that enabled or constrained everything else happening in parallel.", "sections": [{"heading": "Strategic Role", "body": "Platform & Technology was the foundation layer. When it worked, it was invisible. When it broke — specifically when the V2 migration disrupted tracking — it cascaded into attribution failures, model training problems, dashboard data gaps, and partner conversion losses simultaneously. The sessions in this category weren't just technical discussions; they were the points at which infrastructure risk was either recognised, escalated, or mitigated."}, {"heading": "The V2 Migration Narrative", "body": "The V2 platform migration was the single most consequential infrastructure decision of the period. It appeared first in Nov Week 1 as a UX discussion. By Dec Week 2, V2 tracking issues were already surfacing — the new platform's event architecture was not compatible with the existing GA4 tracking setup. The Jan Week 3 war room on V2 conversion confirmed that mobile users on V2 were converting below V1 rates and that PPC landing pages were incompatible with V2 URL structures.\n\nJan Week 5 moved V2 funnel monitoring into an ongoing operational cadence. Feb Week 4's HubSpot and WhatsApp setup added more dependencies to the V2 infrastructure. By March Week 2, the V1→V2 database migration had reached a cross-team ownership crisis — multiple teams depended on the same database tables with no single owner. This was the platform failure that blocked the dashboard, the predictive model, and the attribution work simultaneously."}, {"heading": "HubSpot Migration", "body": "The HubSpot CRM migration ran as a parallel infrastructure project through Dec–Feb. It was introduced in the Dec Week 1 MarTech Automation Roadmap session and went live in January. By Feb Week 2, Manahil's session on HubSpot and real-to-funded conversion recovery confirmed the migration was complete but data quality was still being validated. The Feb Week 2 session on PPC lead misclassification revealed a post-migration UTM stripping bug — a direct downstream consequence of the CRM change."}, {"heading": "The Federated Mesh Vision", "body": "The Jan Week 4 session on Lean Architecture and Federated Mesh introduced the long-term technical vision: rather than a centralised data warehouse that all teams query, each squad would own its data contract — defining what data it produces and what it consumes. This federated model would eliminate the cross-team dependency that was causing the V2 migration crisis. It was an architectural vision for Q2 and beyond, not a Jan deliverable."}, {"heading": "MCP Integration", "body": "The Feb Week 4 MCP Integration and Ad Platform API Access session introduced the Model Context Protocol — a standard for connecting AI agents to external data sources. In the context of Deriv's stack, MCP would allow the PPC AI Agent to read Google Ads and Meta Ads data directly without manual API configuration. This was a forward-looking capability that would accelerate the Advertising OS implementation in Q2."}, {"heading": "Infrastructure Debt", "body": "Across all 19 sessions, a consistent theme emerges: the team was accumulating infrastructure debt faster than it could repay it. Every new capability (V2, HubSpot, AI Max, partner MCC accounts, CAPI, BigQuery, PostHog) added a new integration, a new data flow, and a new potential point of failure. The V2 migration crisis in March was the visible consequence of this debt — but the debt itself had been accruing since November."}]}, "Google Partnership": {"tagline": "Only 13 meetings, but each one had disproportionate commercial consequences — tracing the Google relationship from investment pitch to VIP crisis to recovery plan.", "sections": [{"heading": "Strategic Role", "body": "Google was not just an ad platform for Deriv — it was a strategic partner with a formal programme (VIP status) that unlocked additional funding, preferential support, and beta access to new ad products. The Google VIP programme required meeting a minimum annual spend threshold (~£26M/year). Every meeting in this category was either building the case for VIP, acting on conditions required to achieve it, or responding to the revelation that the trajectory was far off target."}, {"heading": "Phase 1: Investment and Foundation (Oct–Nov)", "body": "The Google Branding Business Case (Oct Week 5) opened the period by making the investment argument for increased brand spend to Google. Nov Week 1's GA4 Alignment session established the agreed measurement standard — both Deriv and Google would use GA4 as the source of truth for campaign performance. This shared measurement agreement would later become complicated by the attribution failures discovered in February."}, {"heading": "Phase 2: Technology Activation (Dec–Jan)", "body": "December's Google sessions focused on technology: AI Max (activated Jan 1), BigQuery/Gemini integration, and MCC structure for affiliates. The Parth Pitch on Google Funding and Predictive LTV was significant — framing the predictive LTV model as a joint Google-Deriv initiative was an attempt to get Google's technical and financial endorsement. The Dec Week 5 session settled the technology priorities for H1: BigQuery for data, AI Max for campaign optimisation, PMAX for retargeting.\n\nJanuary's Michelle Google session (named account manager, first appearance in Jan Week 2) and the Country Tiers and PMAX session confirmed the technical partnership was deepening. The relationship had moved from generic team calls to dedicated account management."}, {"heading": "Phase 3: The VIP Crisis (Feb)", "body": "The Michelle Google meeting in Feb Week 2 was the crisis moment. The gap was quantified explicitly: Deriv's current spend of £380–400K/month against a VIP threshold of £26M/year (£2.17M/month) represented an 80%+ shortfall. The activation roadmap agreed in this session defined four recovery workstreams: offline conversion upload (proving Google's contribution to FTDs), AI Max scale-up (demonstrating commitment to Google AI products), PMAX signal improvement (feeding better conversion data to Google's algorithm), and partner channel FTD attribution (supplementing direct-channel evidence with partner-assisted FTDs).\n\nAll four of these workstreams generated significant activity in the partner, attribution, platform, and AI categories through February and March."}, {"heading": "Phase 4: Recovery Execution (Mar)", "body": "The Mar Week 3 Google sessions were the culmination. The Google Offline Conversion Upload and SQL Query Alignment session (Mar 18) advanced the most critical technical VIP requirement. The PPC Strategy, Google VIP Status, Predictive FTD Model, and Partner Scaling session (Mar 18) confirmed: end-April is the hard deadline. The predictive FTD model (live Mar 19) and the partner prediction model (in build) were the two evidence mechanisms that would support the VIP case.\n\nThe end-of-period position: the VIP gap was still very large, but Deriv now had a credible technical roadmap (offline conversions, FTD model evidence, PMAX signal improvement) and a named deadline to work toward."}, {"heading": "The Dependency Web", "body": "The Google relationship created a web of dependencies that ran through every other category. AI Max required the AI & Predictive Modelling team to restructure campaign signals. Offline conversion upload required the Analytics & Attribution team to resolve the GCLID gap. PMAX signal improvement required the Platform & Technology team to fix V2 event tracking. Partner FTD attribution required the Partner & Affiliate team to build a predictive model. Google VIP was not a Google Ads problem — it was a company-wide data and technology problem with a commercial deadline."}]}, "People, HR & Org": {"tagline": "33 meetings across 13 weeks — the hidden workload beneath the commercial and technical delivery, revealing persistent organisational stress.", "sections": [{"heading": "Strategic Role", "body": "People and HR activity rarely appears in performance marketing meeting logs. The fact that 33 sessions were recorded — 8.2% of the total — is itself a signal. The team was navigating a period of simultaneous commercial pressure (VIP crisis), technical transformation (AI-first pivot), and organisational change (restructuring, role transitions, performance management). These three forces produced people-related friction at a pace that required formal management intervention."}, {"heading": "The Early Period: Performance Reviews and Transitions (Nov–Dec)", "body": "November established the HR cadence: Payal's probation review (Week 1), Naomi's promotion to Team Lead and role transition (Week 2), team building session to manage morale (Week 2), and the first team restructuring discussion (Week 2). The pattern — performance review, leadership change, morale management — would repeat throughout the period.\n\nDecember's three people sessions were more concerning: Marketing Team Structure and Role Overload was the first explicit acknowledgement that the team was understaffed for its ambition. Workplace Dynamics and Expectation Management was a conflict management session. Yoli's PPC Performance and Team Dynamics session linked interpersonal dynamics directly to campaign execution — a warning that team friction was affecting output."}, {"heading": "The Mid-Period: Review Cycles (Jan)", "body": "January was the formal quarterly review cycle. Ishank's performance review introduced AI capability as a performance criterion for the first time — team members were now being assessed on their ability to use and contribute to AI tools, not just their domain expertise. Saurabh's Team Misalignment and Role Clarity session revealed that role ambiguity was creating accountability gaps. Taabish's Q4 feedback closed the annual review cycle. Payal's probation confirmation (Jan Week 3) was the final decision on the most closely monitored team member of the period."}, {"heading": "The Crisis Period: Conflict and Restructuring (Feb–Mar)", "body": "February and March were the most HR-intensive months. Feb Week 2 surfaced job security concerns (Conor's session), team restructure discussions (Prakash and Mahantesh), and team dynamics issues (Swati). Feb Week 3 had formal conflict resolution between Naomi and Shivank — a documented mediation that required structured intervention.\n\nFeb Week 4 was the most significant HR week of the entire period: layoff strategy was being actively planned, two org restructuring sessions formalised the new team structure, Ishank raised a formal salary grievance, and Chris G's role was repositioned in the post-restructure org. The timing — the same week as the Google VIP crisis quantification — reveals that commercial pressure and organisational stress were escalating simultaneously.\n\nMarch continued the pattern: return to office policy, performance management in the context of AI transformation, and job security discussions appeared in weeks that were ostensibly about dashboard builds and campaign performance."}, {"heading": "The AI-HR Intersection", "body": "A recurring theme was the intersection of the AI transformation with people management. AI was changing role definitions (Aswathi's scope, Ishank's career path, Mahantesh's remit), creating skill gaps (the Aswathi vs agency specialist benchmark assessment), and enabling headcount decisions (the team restructure that followed the AI tool builds). The Feb Week 2 Prakash and Mahantesh session — 'AI for Advertising Optimisation and Team Restructure' — captured this directly in its title: the AI investment was partially justified by the team efficiency it would enable."}, {"heading": "Reading the Subtext", "body": "The HR meeting volume tells a story that the commercial metrics don't: this was a team under sustained pressure, managing multiple simultaneous transformations, with insufficient headcount for the ambition and inadequate role clarity for the pace of change. The conflict resolution, the layoff planning, the salary disputes, and the job security discussions are not peripheral — they are the human cost of the commercial and technical strategy being pursued."}]}, "Strategy & Planning": {"tagline": "Only 11 meetings across 8 weeks — but these were the sessions where direction was set for everything else.", "sections": [{"heading": "Strategic Role", "body": "Strategy & Planning meetings were rare because they were high-bandwidth — the decisions made in these sessions cascaded into every other category. The tribe calls, CEO prep sessions, and H1 planning meetings defined the operating model, the investment priorities, and the delivery milestones that the execution teams then spent weeks implementing. The relative scarcity of these sessions is a feature: Deriv's culture favoured doing over planning, and the strategy sessions were deliberately focused on producing specific decisions rather than generating discussions."}, {"heading": "The H1 Summit as the Organising Principle", "body": "From December through January, the H1 AI and Automation Summit was the primary planning horizon. Every strategy meeting in Jan Weeks 1–4 was directly or indirectly about preparing for the summit: aligning on which AI initiatives to showcase, building the one-pagers and demos, designing the H1 deliverables, and framing the summit narrative. The summit was not just a presentation event — it was the forcing function that gave the AI workstreams their delivery deadlines."}, {"heading": "The November Foundation", "body": "The Yoli Tribe Call (Nov Week 5) was the cross-functional alignment that closed the planning phase and opened the execution phase. Before this call, the team was still debating priorities; after it, the direction was set for December. This is why December was the busiest month — the tribe call unlocked the sprint."}, {"heading": "The December Strategic Sessions", "body": "December's three strategy sessions were the most consequential of the period. The Strategy Meeting on Automation, FTT Growth, and Event360 Alignment (Dec Week 2) formally linked all automation activity to the FTT growth metric — establishing the measurement principle that survived through the VIP crisis. The Q1–Q3 Performance Review (Dec Week 3) was the definitive mid-year reckoning — from this session forward, every activity was required to map to conversion or deposit growth. The AI-First Marketing Stack and Productisation session (Dec Week 4) gave the strategy a product identity — the AI marketing system as a versioned product with features and a roadmap."}, {"heading": "The Absence of Strategy in March", "body": "Strategy & Planning has no March sessions — a telling gap. By March, the team had shifted entirely to crisis management and execution. The planning horizon had collapsed from six months to six weeks. The VIP deadline (end-April) replaced the H1 summit as the organising principle, and the response to it was operational rather than strategic. This absence is not a failure; it reflects the appropriate adaptation of a team that had done its strategic work and was now executing against it under pressure."}]}, "Budget & Finance": {"tagline": "14 meetings concentrated in Nov Week 2 — the budget decisions made in a single week shaped every spend conversation for the next five months.", "sections": [{"heading": "Strategic Role", "body": "Budget & Finance meetings were rare because the fundamental decisions were made early and rarely revisited. The Nov Week 2 cluster was the budget definition week for 2026. Once the 2026 flat-YoY budget constraint was set, the team's task was to find efficiency gains — more FTD output per pound of spend — rather than to seek more budget. This constraint was the invisible hand behind every channel allocation, country prioritisation, and experiment funding decision that followed."}, {"heading": "The November Budget Week", "body": "Seven meetings in Nov Week 2 established the financial framework for all of 2026. The 2026 Budget Justification session built the investment case. The Aligning on Experiment Campaigns Budget Allocation session locked the test-and-learn envelope — a dedicated budget for AI experiments that couldn't be raided for performance campaigns. The Google Team meeting on Q4 Budget Ramp and ROAS-Focused Pivot was the most commercially significant: Google was being asked to approve a Q4 ramp conditional on ROAS evidence that was still being gathered. The flat-YoY constraint meant there was no room for error — every pound had to work harder in 2026 than in 2025."}, {"heading": "The Payback Period Problem", "body": "The FTTs, Productisation, and Payback Period session (Dec Week 2) introduced the number that would define the VIP crisis: Deriv's current customer acquisition payback period was approximately 12 months, against a benchmark of 4–6 months. This gap — a 2–3x difference in capital efficiency — was the commercial root cause of the Google VIP shortfall. If you're paying 12 months to recover acquisition cost but only have 4–6 months of budget commitment, you need volume to compensate. The VIP spend requirement (£26M/year) was the volume required to make the unit economics acceptable to Google as a partnership."}, {"heading": "The EDS Negotiation", "body": "The EDS Payment and Negotiation Strategy session (Feb Week 4) was the only mid-period finance session. It represents cost management as a lever: while the revenue trajectory was under pressure, managing down vendor costs on payment processing could improve net unit economics. Low frequency, specific impact."}]}, "External / Industry Intel": {"tagline": "All 16 meetings in a single week — the GTFT 2025 Summit in Dec Week 2 delivered the competitive and technological landscape that shaped the next four months.", "sections": [{"heading": "The GTFT Summit", "body": "The Global Trading and Fintech Summit (GTFT 2025) was a two-day industry event that Shivank attended in December Week 2 — the same week that was also the busiest operational week of the six-month period. The Plaud device recorded 16 sessions from the summit, ranging from keynote-style presentations to one-on-one competitive intelligence conversations."}, {"heading": "The Competitive Benchmarks", "body": "Four competitor sessions provided the performance benchmarks that would frame every subsequent strategy conversation. Capital.com's overview established the primary benchmark: $5M/month in FTD revenue — a figure that Deriv was not yet approaching. Crypto.com's growth strategy revealed how a crypto-native brand had scaled to consumer finance relevance through brand investment. XTB's growth and influencer marketing validated Deriv's own influencer investment thesis with evidence from a comparable market participant. Angel One's evolution in the Indian capital markets provided the playbook for emerging market retail investor acquisition."}, {"heading": "The AI and Technology Sessions", "body": "Six sessions covered the AI and technology landscape. Agentic AI for Financial Services and Agentic Commerce mapped the emerging product category that Deriv's own Advertising OS was beginning to participate in. Scale and Impact of AI Beyond Productivity and Moving from Digitisation to Autonomous AI provided the strategic framing for Deriv's AI-first pivot — this wasn't a productivity initiative, it was a competitive positioning decision. The Role of AI in Modern Marketing was the most directly applicable session to Deriv's situation. Leveraging Global Technology for Local Relevance addressed the market adaptation challenge in Deriv's diverse geography."}, {"heading": "The Structural and Regulatory Sessions", "body": "Trust as the Foundation of Banking, The Global Challenge of Financial Inclusion, Vision of Web3 in the Next Decade, and Vision to Build the First Truly Global Bank provided the long-term strategic context. For Deriv — operating across 150+ countries — financial inclusion and trust infrastructure were not abstract: they were the conditions that determined whether Deriv could scale in specific markets. The Web3 session contributed to the crypto payments and crypto trading strategy that appeared in later technology discussions."}, {"heading": "The Downstream Impact", "body": "The summit's competitive intelligence fed directly into the February VIP crisis framing. When the Google shortfall was quantified in Feb Week 2, the Capital.com $5M/month benchmark was the comparison point — it established that the addressable FTD market was real and the gap was an execution problem, not a market sizing problem. The summit's AI sessions validated the AI-first pivot by showing that the entire industry was moving in the same direction. Without this external evidence, the internal AI investment argument might have been more contested."}]}, "Off-Topic / Personal": {"tagline": "10 meetings across 4 weeks — ambient personal recordings that appear in the business dataset because the Plaud device captured them.", "sections": [{"heading": "Why These Appear", "body": "The Plaud recording device was used consistently for business meetings throughout the six-month period. Because it was a personal device, it also captured conversations outside business contexts — real estate consultations, personal wellness sessions, and informal business discussions for people in Shivank's personal network. These recordings were transcribed and summarised by the same pipeline as the business meetings, making them part of the 401-meeting dataset."}, {"heading": "The December Real Estate Cluster (Dec Week 1)", "body": "Four recordings captured conversations about real estate investment and a tea cafe franchise. Three real estate sessions — covering AI for lead generation, client management systems, and an AI assistant for property research — suggest a personal investment interest in proptech tools. The tea cafe franchise session explored business model and investment requirements. None of these are Deriv business, but they reflect an active entrepreneurial and investment mindset that was active in parallel with the work context."}, {"heading": "The February Personal Sessions (Feb Weeks 1 and 3)", "body": "February Week 1 had four personal recordings in a notably light work week. An astrological consultation covered career, finance, and marriage. Two wellness sessions (breathing/mudras and pranayama/meditation) suggest a wellness practice that was more active during lower-intensity work periods. The jewellery business marketing session helped a contact build a direct-to-consumer funnel — applying the same digital marketing knowledge from Deriv to a personal contact's business. The Week 3 session continued the jewellery B2B work, adding a pricing structure and link-in-bio ad funnel."}, {"heading": "What This Data Reveals", "body": "The personal recordings are not analytically significant for the business narrative — but they do reveal something about the context in which the business work was happening. The wellness sessions in Feb Week 1 (during the lowest business meeting week of the period) suggest active stress management during a high-pressure six months. The real estate and entrepreneurship conversations reveal a broader investment horizon beyond the Deriv role. The jewellery business support sessions reveal a tendency to apply professional skills to personal network problems."}]}, "1:1 & Team Check-ins": {"tagline": "Only 6 meetings tagged here — a reflection of categorisation logic, not actual 1:1 volume.", "sections": [{"heading": "The Categorisation Context", "body": "The 1:1 & Team Check-ins category captured only meetings where the 1:1 relationship was the primary content — where the session was about the relationship, team cadence, or operating rhythm itself, rather than being a meeting with a specific person about a specific project. In practice, many regular 1:1s were absorbed into the category of the work being discussed: Naomi 1:1s about partner topics went into Partner & Affiliate, Aswathi sessions about AI went into AI & Predictive Modelling, and so on."}, {"heading": "The November Operating Rhythm", "body": "Four sessions in Nov Week 1 established the team's working cadence for the entire period. ClickUp Update with Yoli and ClickUp Review with Conor aligned on the project management tool — choosing ClickUp over alternatives and setting up the task and reporting structure. Oct 2x2 with Yoli was the first formal bilateral alignment session between Shivank and Yoli — a recurring format (2x2 = two agendas, two people) that became the standard for strategic alignment between marketing and growth leadership. Updates with Naomi set up the weekly Team Lead briefing cadence."}, {"heading": "The Anwar Meeting", "body": "The Anwar Meeting (Dec Week 2) is a single stakeholder check-in in the busiest week of the period. The fact that it happened at all during a week of 42 meetings signals that stakeholder relationship maintenance was treated as non-negotiable even under maximum execution pressure."}, {"heading": "The Yoli Martech Session", "body": "The Yoli Weekly on Martech Stack and Customer Journey Analysis (Jan Week 2) is the most substantive session in this category — a strategic review of the entire technology stack through the lens of the customer journey. That this happened in a weekly 1:1 format reflects the trust and depth of the Yoli-Shivank working relationship: the most complex strategic conversations were happening in the informal 1:1 context rather than in formal strategy sessions."}, {"heading": "The Hidden Volume", "body": "The true volume of 1:1 and check-in meetings was significantly higher than 6. Looking across all categories, named individual meetings appear in Partner & Affiliate (Vince, Saurabh, Naomi), PPC (Yoli, Conor, Mahantesh), People/HR (Ishank, Taabish, Payal), and AI (Aswathi, Harsh). The 6 sessions tagged here are the residual — the meetings where the relationship cadence itself was the agenda. The actual 1:1 count across the full dataset is likely 50–70 sessions."}]}, "Uncategorised": {"tagline": "41 meetings (10.2%) that didn't match any keyword pattern — a mixed bag of genuine cross-cutting work, one-off strategic sessions, and data artefacts.", "sections": [{"heading": "What Uncategorised Means", "body": "The uncategorised group consists of meetings where the title didn't trigger any of the 13 keyword patterns. This can mean several things: the meeting covered genuinely cross-cutting topics that didn't fit one category, the meeting title was generic (timestamped filenames, meeting IDs), the meeting was a one-off that didn't fit any pattern, or the meeting was a personal/ambient recording not caught by the Off-Topic filter. All four types appear in this group."}, {"heading": "The Cross-Cutting Sessions", "body": "Several uncategorised sessions are genuinely important but cross multiple categories. 'Risk Team CLV, CAC, and Conversion Funnel Analysis' (Dec Week 1) brought the risk function into the marketing conversation — unusual and significant. 'Q1 Milestones and Operational Metrics Alignment' (Jan Week 4) set the quarterly measurement framework. 'Aswathi's Performance Marketing Skill Gaps and GTM Strategy' (Feb Week 2) was an honest self-assessment of where the team's skills fell short of the strategy's requirements. 'Cohort ROI, LTV Strategy, and AI-Driven Retention' (Feb Week 4) advanced a sophisticated retention model. None of these fit a single category cleanly."}, {"heading": "The January Week 4 Cluster", "body": "Eight uncategorised meetings in a single week reflect the density and diversity of Jan Week 4. Product sessions (Post-View and Post-Click Development, OneTap onboarding, referral feature), an Amazon AI automation session (Deriv may be exploring Amazon marketplace), a prototype selection session for the H1 summit demos, and a documentation standardisation session — all happening in the same week as five PPC sessions, three partner sessions, and three AI sessions. Week 4 of January was the most complex operational week of the period."}, {"heading": "The Data Artefacts", "body": "A handful of uncategorised sessions are pure data artefacts: timestamped filenames ('2026-02-03 13-45-20', '2026-02-09 10-30-30 merged', '2026-02-21 21-56-09') where the recording was never renamed. 'Camera Application Troubleshooting' (Mar Week 1) is a technical support call captured by the Plaud device. These artefacts are the unavoidable noise in a dataset generated by ambient recording rather than structured meeting logging."}, {"heading": "What Would Reclassification Reveal", "body": "If the uncategorised meetings were reclassified with fuller information, the biggest beneficiary categories would likely be AI & Predictive Modelling (several product-AI crossovers), Dashboard & Reporting (several reporting alignment sessions), and a hypothetical 'Product & UX' category that doesn't currently exist. The fact that UX and product sessions keep appearing in uncategorised reflects that the categorisation system was built around the marketing team's primary workflows, not the full scope of what the device recorded."}]}};

let currentCat = 0;
let currentView = 'summary';

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Build sidebar
const nav = document.getElementById('cat-nav');
CATS.forEach((cat, idx) => {
  const btn = document.createElement('button');
  btn.className = 'cat-btn';
  btn.id = `nav-${idx}`;
  btn.innerHTML = `<span class="cemoji">${cat.emoji}</span><span class="clabel">${esc(cat.label)}</span><span class="cbadge">${cat.count}</span>`;
  btn.addEventListener('click', () => { currentCat = idx; render(); });
  nav.appendChild(btn);
});

function switchView(v) {
  currentView = v;
  document.getElementById('tab-summary').classList.toggle('active', v==='summary');
  document.getElementById('tab-weeks').classList.toggle('active', v==='weeks');
  document.getElementById('panel-summary').classList.toggle('active', v==='summary');
  document.getElementById('panel-weeks').classList.toggle('active', v==='weeks');
  render();
}

function render() {
  document.querySelectorAll('.cat-btn').forEach((b,i) => b.classList.toggle('active', i===currentCat));
  if (currentView === 'summary') renderSummary();
  else renderWeeks();
}

// ─── SUMMARY ─────────────────────────────────────────────────────
function renderSummary() {
  const cat = CATS[currentCat];
  const deep = DEEP[cat.label];
  const sc = document.getElementById('summary-content');

  const MONTH_ORDER = ["Oct 2025","Nov 2025","Dec 2025","Jan 2026","Feb 2026","Mar 2026"];
  const totalMonths = new Set(cat.weeks.map(w => w.month)).size;
  const commentedWeeks = cat.weeks.filter(w => w.commentary).length;
  const dateSpan = cat.weeks.length > 0 ? cat.weeks[0].month + ' → ' + cat.weeks[cat.weeks.length-1].month : '—';
  const maxWeek = cat.weeks.reduce((a,b) => b.count > a.count ? b : a, {count:0,week:'—',month:''});

  let html = `
    <div class="cat-hero" style="background:${cat.bg};border-left-color:${cat.fg}">
      <div class="hero-emoji">${cat.emoji}</div>
      <div class="hero-text">
        <div class="hero-label" style="color:${cat.fg}">${esc(cat.label)}</div>
        <div class="hero-tagline" style="color:${cat.fg}">${esc(deep?.tagline || cat.summary)}</div>
        <div class="hero-stats">
          <div class="hero-stat" style="background:${cat.fg}22">
            <strong style="color:${cat.fg}">${cat.count}</strong>total meetings
          </div>
          <div class="hero-stat" style="background:${cat.fg}22">
            <strong style="color:${cat.fg}">${cat.weeks.length}</strong>active weeks
          </div>
          <div class="hero-stat" style="background:${cat.fg}22">
            <strong style="color:${cat.fg}">${totalMonths}</strong>months active
          </div>
          ${maxWeek.count > 0 ? `<div class="hero-stat" style="background:${cat.fg}22">
            <strong style="color:${cat.fg}">${maxWeek.count}</strong>peak week
          </div>` : ''}
        </div>
      </div>
    </div>`;

  if (deep && deep.sections && deep.sections.length) {
    html += `<div class="deep-summary">`;
    deep.sections.forEach((sec, si) => {
      html += `
        <div class="ds-section${si===0?' open':''}" id="dss-${currentCat}-${si}">
          <div class="ds-head" onclick="toggleDS('dss-${currentCat}-${si}')">
            <span style="color:${cat.fg}">${esc(sec.heading)}</span>
            <span class="ds-arr">▼</span>
          </div>
          <div class="ds-body">${sec.body.split("\n\n").map(p => `<p>${esc(p)}</p>`).join("")}</div>
        </div>`;
    });
    html += `</div>`;
  }

  // Link to weeks view
  html += `<div style="text-align:center;padding:8px 0 32px">
    <button onclick="switchView('weeks')" style="background:${cat.fg};color:#fff;border:none;border-radius:20px;padding:10px 24px;font-size:13px;font-weight:700;cursor:pointer;">
      📅 View Week-by-Week Breakdown →
    </button>
  </div>`;

  sc.innerHTML = html;
  sc.scrollTop = 0;
}

function toggleDS(id) {
  document.getElementById(id).classList.toggle('open');
}

// ─── WEEKS ───────────────────────────────────────────────────────
function renderWeeks() {
  const cat = CATS[currentCat];
  const wc = document.getElementById('weeks-content');

  const MONTH_ORDER = ["Oct 2025","Nov 2025","Dec 2025","Jan 2026","Feb 2026","Mar 2026"];
  const commentedWeeks = cat.weeks.filter(w => w.commentary).length;
  const dateSpan = cat.weeks.length > 0 ? cat.weeks[0].month + ' → ' + cat.weeks[cat.weeks.length-1].month : '—';
  const maxWeek = cat.weeks.reduce((a,b) => b.count > a.count ? b : a, {count:0,week:'—',month:''});
  const totalMonths = new Set(cat.weeks.map(w => w.month)).size;

  let html = `
    <div class="cat-hero" style="background:${cat.bg};border-left-color:${cat.fg};margin-bottom:20px">
      <div class="hero-emoji">${cat.emoji}</div>
      <div class="hero-text">
        <div class="hero-label" style="color:${cat.fg}">${esc(cat.label)}</div>
        <div class="hero-tagline" style="color:${cat.fg}">${esc(DEEP[cat.label]?.tagline || cat.summary)}</div>
        <div class="hero-stats">
          <div class="hero-stat" style="background:${cat.fg}22"><strong style="color:${cat.fg}">${cat.count}</strong>meetings</div>
          <div class="hero-stat" style="background:${cat.fg}22"><strong style="color:${cat.fg}">${cat.weeks.length}</strong>weeks</div>
          <div class="hero-stat" style="background:${cat.fg}22"><strong style="color:${cat.fg}">${commentedWeeks}</strong>analysed</div>
          ${maxWeek.count > 0 ? `<div class="hero-stat" style="background:${cat.fg}22"><strong style="color:${cat.fg}">${maxWeek.count}</strong>peak</div>` : ''}
        </div>
      </div>
    </div>`;

  const monthGroups = {};
  cat.weeks.forEach(w => { if (!monthGroups[w.month]) monthGroups[w.month] = []; monthGroups[w.month].push(w); });
  const sortedMonths = Object.keys(monthGroups).sort((a,b) => MONTH_ORDER.indexOf(a) - MONTH_ORDER.indexOf(b));

  sortedMonths.forEach(month => {
    const wks = monthGroups[month];
    const monthTotal = wks.reduce((s,w) => s+w.count, 0);
    const mgid = `mg-${currentCat}-${month.replace(/\s/g,'')}`;
    html += `<div class="month-group" id="${mgid}">
      <div class="month-banner" style="background:${wks[0].monthHead}" onclick="toggleMonth('${mgid}')">
        ▶ ${month.toUpperCase()}
        <span class="mbadge">${monthTotal} meeting${monthTotal!==1?'s':''}</span>
        <span class="marrow">▾</span>
      </div>
      <div class="month-weeks" id="${mgid}-weeks">`;

    wks.forEach((week, wi) => {
      const wcid = `wc-${currentCat}-${month.replace(/\s/g,'')}-${wi}`;
      html += `<div class="week-card" id="${wcid}">
        <div class="week-header" onclick="toggleWeek('${wcid}')">
          <div class="wh-band" style="background:${week.monthHead}"></div>
          <div class="wh-label" style="color:${week.monthHead};background:${week.monthLight}">${esc(week.week)}</div>
          <div class="wh-count" style="color:${week.monthHead}">${week.count}</div>
          <div class="wh-arrow">▼</div>
        </div>
        <div class="week-body">
          <div class="week-commentary${week.commentary ? '' : ' empty'}">${week.commentary ? esc(week.commentary) : 'No strategic commentary for this period.'}</div>
          <div class="week-meetings">`;

      week.meetings.forEach((m, mi) => {
        const hasDone = m.done && m.done.length > 0;
        const showAll = m.done && m.done.length > 3;
        const doneId = `done-${wcid}-${mi}`;
        const doneHtml = hasDone ? '<ul>' + m.done.map(d => `<li>${esc(d)}</li>`).join('') + '</ul>' : '';
        html += `<div class="meeting-row">
          <div class="mr-num">${mi+1}</div>
          <div>
            <div class="mr-title">${esc(m.title)}</div>
            ${hasDone ? `<div class="mr-done">
              <div id="${doneId}" style="overflow:hidden;max-height:${showAll?'54px':'none'}">${doneHtml}</div>
              ${showAll ? `<button class="mr-toggle" onclick="toggleDone('${doneId}',this)">▼ ${m.done.length} points</button>` : ''}
            </div>` : ''}
          </div>
        </div>`;
      });
      html += `</div></div></div>`;
    });
    html += `</div></div>`;
  });

  wc.innerHTML = html;
  wc.scrollTop = 0;

  // Auto-open first week
  const first = wc.querySelector('.week-card');
  if (first) first.classList.add('open');
}

function toggleMonth(mgid) {
  const el = document.getElementById(mgid);
  el.querySelector('.month-banner').classList.toggle('collapsed');
  el.querySelector('.month-weeks').classList.toggle('hidden');
}
function toggleWeek(wcid) {
  document.getElementById(wcid).classList.toggle('open');
}
function toggleDone(id, btn) {
  const el = document.getElementById(id);
  const isOpen = el.style.maxHeight === 'none';
  el.style.maxHeight = isOpen ? '54px' : 'none';
  const n = btn.textContent.match(/\d+/)?.[0]||'';
  btn.textContent = isOpen ? `▼ ${n} points` : `▲ collapse`;
}

// Init
render();
</script>
</body>
</html>
