p."]}]},{"month":"Dec 2025","week":"Week 4 (Dec 22-28)","count":2,"monthHead":"#6C3483","monthLight":"#F5EEF8","commentary":"Two external-facing AI sessions: the Google Ads AI-driven optimisation meeting (with NDA and IP safeguards) formalises the external agency AI pilot, and Harsh's Generative AI and Prompt Engineering workshop develops internal team capability. Both signal a shift from theorising to operationalising.","meetings":[{"title":"External Meeting- AI-driven Google Ads optimisation, NDA-IP safeguards, pilot ramp plan","done":["Topic Title: NDA, IP sensitivity, and data sharing","The team discussed back-and-forth on NDA and “Evo” items; partnership is in a good spot.","[Speaker 3] emphasised IP sensitivity and exceptions granted by their counsel to share updates.","Transparency: They will limit shared materials but expect no meaningful impact on collaboration."]},{"title":"Harsh Workshop- Generative AI Tools & Prompt Engineering Techniques","done":["**Model Types:** Discussed distinctions between model types: \"Fast\" (speed), \"Pro\" (analysis and interconnection), and \"Thinking\" (complex tasks).","**Research Applications:** Demonstrated using AI for personal procurement (e.g., buying air purifiers, finding apartments) and comparing products across channels like Noon and Amazon.","**Deep Research Activity:** Participants were instructed to use Gemini to conduct deep research on a topic of personal interest (e.g., sports, gyms, shopping) and share results.","**Guided Learning:** Highlighted a feature useful for learning new technologies (e.g., Tokenization) step-by-step, similar to academic teaching methods."]}]},{"month":"Dec 2025","week":"Week 5 (Dec 29-31)","count":4,"monthHead":"#6C3483","monthLight":"#F5EEF8","commentary":"Four sessions define the year-end AI-first declaration. The AI-First PPC Model and the companion strategy session lock the operating model: AI drives campaign decisions, humans set guardrails. The Quants Meeting on Two-Model PPC Efficiency, Deposit Probability, and Lead Scoring is the most technically rigorous session yet — the two-model architecture (probability of deposit × lead score) is formalised. Rakshit's PPC Client Automation and AI Integration session brings in external validation.","meetings":[{"title":"AI-First PPC Model","done":["The PPC team should deprioritise sponsorships and unrelated functional tasks unless they directly support the AI product.","Being “first in AI for PPC” is the target edge, not parity with standard broker playbooks.","Escalation is encouraged when dependencies (e.g., AI engineering support) block progress; the CEO is personally invested and ready to intervene.","Resource commitment is in place: Haroon is already full-time on AI, with two more engineers expected in two weeks (three AI engineers total)."]},{"title":"AI-First PPC Strategy, Rules Engine, Deposit-Centric ROI, and Team Reallocation","done":["Assessment of visibility and output:","Leadership perceives limited visible progress except during in-person Dubai visits; momentum appears to fade afterward.","Expectation to increase ownership, stretch beyond current scope, and deliver consistently without gaps.","Emphasis on accountability: six years tenure implies capability and expectation to lead more initiatives and show outcomes."]},{"title":"Quants Meeting- Two-Model PPC Efficiency, Deposit Probability, and Lead Scoring Strategy","done":["`Two-model approach`","`PPC efficiency`","`Model 1 features`","`Deposit Prediction`"]},{"title":"Rakshit- PPC Client Automation and AI Integration Strategy","done":["**Current Performance:** Past campaigns generated $14 million in revenue from a $12 million spend (a 1.1x or 10% return), which is considered suboptimal and unprofitable when factoring in team salaries. This is low compared to partners who achieved 4x returns. The 'partner' side ROI is observed to be much higher than the 'client' side.","**Target ROI:** The new goal is to achieve a Return on Ad Spend (ROAS) where every $1 spent generates at least $2 in revenue, equivalent to a 9x return in terms of deposits. The focus will be on both ROAS and the absolute number of new funded accounts.","**Key Challenges:**","**Scaling & Time Lag:** When scaling and spending more, the time lag between a user creating an account and funding it (up to 40-60 days) negatively impacts ROAS. This lag is a critical data point the AI engine must use for budget optimisation."]}]},{"month":"Jan 2026","week":"Week 1 (Jan 01-07)","count":6,"monthHead":"#7D6608","monthLight":"#FEFCE8","commentary":"The most AI-intensive week of January — six sessions. Rakshit Townhall (AI-Driven Automation and Future Growth) sets the public strategic direction. Harsh's Strategic Realignment on AI Priorities sharpens the execution focus. Aswathi's AI Project Strategy maps the delivery roadmap. The Predictive Lead Scoring Model development session defines the feature set. Rakshit's Feedback session calibrates what leadership expects from AI by H1. The survey campaign analysis session produces the first real-world validation data for AI-driven acquisition.","meetings":[{"title":"Analysis of Survey Campaign Performance and Future AI-Driven Strategy","done":["Lead-to-onboarded conversion improved with the survey-integrated approach: old campaigns recorded a conversion rate of 61, while new campaigns achieved 67 for December. This indicates higher lead quality attributable to the survey-led flow.","Onboarded-to-activated conversion was similar across both approaches for December. Activated client counts were two for the new campaigns and three for the old campaigns in December; participants cautioned that it is still early to draw definitive conclusions from December’s activation numbers.","Top-of-funnel dynamics shifted: total leads decreased in the new campaigns, and cost rose. Spending on new campaigns was almost 3K, compared to 1.5K on old campaigns—indicating a higher CPL for the survey flow. The team explicitly recognised that the quality uplift is coming at a higher cost per lead.","Real account openings (non-partner accounts) showed an important quality signal. Survey campaigns yielded 46 real accounts from 680 leads, whereas old campaigns produced 41 real accounts from roughly triple the leads. In percentage terms, more people opened real accounts in the survey campaigns, strengthening the case for better lead quality despite fewer leads and higher CPL."]},{"title":"Aswathi- AI Project Strategy","done":["[x] Share the rule generation sheet with the PPC team (Ravichand, Shankar) for feedback and input. - [TBD]","[x] Create a document detailing the methodology for how the AI rules are being built. - [TBD]","[x] Post the rule-generation sheet and methodology document in the designated project channel, tagging all relevant team members. - [TBD]","[ ] Update the project plan to formally include a \"PPC client team\" or a \"training phase\" to ensure their input is captured. - [TBD]"]},{"title":"Developing a Predictive Lead Scoring Model for Ad Campaign Optimisation","done":["**Deposit Probability**: Will a new user make a deposit? (A binary prediction).","**Deposit Value**: If they do deposit, how much money will they add?","**Model 1 (Main Model)**: Trained on all user data (organic, direct, etc.) to establish a baseline deposit probability based on user persona (e.g., age, income, occupation).","**Model 2 (Sub-model)**: Trained specifically on PPC data. This model would superimpose its findings onto the output of Model 1, adding an efficiency factor based on the acquisition channel. The final PPC score would be calculated using a formula like: `Probability of Deposit * PPC Efficiency Factor`."]},{"title":"Harsh- Strategic Realignment on AI Project Priorities and Execution","done":["**AI Attribution Engine (Persona/Assisted Conversion):**","**Objective:** To analyse user personas and track conversions originating from display banners and other ad platforms. The system, which Haroon is working on, aims to identify which websites contribute most effectively to conversions.","**Status:** Haroon has created the \"bare bones\" of this system. Shivank believes this part is easier to deliver quickly, providing a tangible sign of progress. However, Speaker 3 notes that a significant portion may need to be redone to build a complete, robust pipeline.","**AI Rule Engine:**"]},{"title":"Rakshit Townhall- AI-Driven Automation and Future Growth","done":["Employee onboarding: The event of a new hire triggers coordinated automation. An IAM agent assigns birthright access (tailored per department, such as Design). Upon access provision, an L&D agent assigns learning materials. After three days, an HRP agent checks in; after a month, a PR agent initiates performance review flow. Events can also be “lack events” (e.g., inactivity on Slack or email) prompting an outreach agent to check status, workload, or PSLs. Applied across HR, the entire employee lifecycle becomes an event graph feeding the HR “brain.”","User journey: A user landing on deriv.com (from an affiliate, online ad, social, ChatGPT, or Google) is a gateway event. An attribution agent assigns the source, enabling correct channel resource allocation. If the user creates a demo account, a marketing communications agent starts tailored messaging. Dropping off due to KYC or friction triggers assistance via email, in-app prompts, or night-time outreach. KYC itself spawns its own agent flow.","[ ] Fix the migration problem and stabilise the client experience during the architecture transition - [This quarter]","[ ] Double down on courses and workshops; expand access to AI tools for employees - [TBD]"]},{"title":"Rakshit's Feedback and Strategic Realignment on AI","done":["**A Rule-Based Optimisation Engine**: This engine will automate the day-to-day campaign management tasks currently performed manually by team members like Payal and Tabish. It will use predefined rules—based on metrics like impressions, clicks, and conversion rates—to optimise campaigns, pause underperforming ones, and reallocate budgets. This will free up the team to focus on higher-level strategy.","**Predictive Modelling**: In collaboration with the Quants team, a predictive model will be developed to assess the quality of a lead on day one. This model will predict the likelihood of a new affiliate activating, solving the critical problem of lag time in performance data. This allows for immediate feedback and enables the team to double down on campaigns that generate high-potential leads.","[ ] Plan with Naomi how to present the AI strategy to Rakshath to secure his alignment - [TBD]","[ ] Send Naomi the draft document on the AI piece, based on discussions with Payal and Tabish - [TBD]"]}]},{"month":"Jan 2026","week":"Week 2 (Jan 08-14)","count":5,"monthHead":"#7D6608","monthLight":"#FEFCE8","commentary":"Five meetings advancing the model from concept to build. The Quants Meeting on Predictive Model and Data Quality for FTD directly addresses the model's input requirements — data quality is already identified as the primary constraint. Aswathi's Advertising OS, Predictive Modelling, and Programmatic Advertising session maps where the model sits in the broader OS architecture. The Mai AI agency Zimbabwe pilot is the first live deployment of AI-driven Google Ads optimisation outside the core markets.","meetings":[{"title":"Aswathi Meeting- Advertising OS, Predictive Modelling, and Programmatic Advertising","done":["Top priorities: Advertising OS (Ad-OS) and predictive modelling; success hinges on getting these right.","Ad-OS includes an attribution module and a rule engine. Predictive modelling has been handed over with complete data and model-building documentation.","Shivank has reached out to Rakshit to support Pranaj on predictive modelling and will keep following up.","DV360 was proposed to manage expectations and buy time by pushing back on additional YouTube campaigns."]},{"title":"Mai AI agency- AI-driven Google Ads Optimisation Pilot for Zimbabwe (Search Terms, PMAX Shift, Target CPA, Real→FTD Funnel)","done":["AI-driven Google Ads optimisation","Campaign structure and PMAX","Zimbabwe account audit","Search term optimisation"]},{"title":"Naomi Meeting- AI Product, Campaign Optimisation, and Transcript Analysis","done":["[ ] Convert the meeting recording into a text transcript.","[ ] Use Gemini to analyse the transcript.","[ ] Refine the AI prompt to ensure the output is based only on the provided transcript.","[ ] Refine the AI engineer document with more campaign information and detailed rules."]},{"title":"Naomi Weekly Meeting- AI Strategy and Project Planning","done":["Shivank emphasised consolidating the top three projects into a single document: predictive modelling, retargeting for drop-offs, and a rule engine.","Each project needs a clear plan detailing purpose, approach, and the problem it solves, written so anyone—including engineers—can understand.","Naomi will create a primary document outlining these three initiatives with descriptions, with each initiative linking to a more detailed, separate document.","Shivank advised Naomi to meet Payal and Tabesh to unpack their campaign optimisation process in detail for the rule engine strategy."]},{"title":"Quants Meeting- Predictive Model and Data Quality for FTD","done":["**Description**","[Speaker 1] developed a predictive model with 70% accuracy for identifying depositors, enhanced by adding new features derived from the original 36.","Key new features include “time to verify” and treating the act of entering information itself as a predictive indicator.","[Speaker 1] shared a PDF on Slack that is more readable than the .md file."]}]},{"month":"Jan 2026","week":"Week 3 (Jan 15-21)","count":8,"monthHead":"#7D6608","monthLight":"#FEFCE8","commentary":"Eight meetings — the broadest AI week of the period. The Personalised Recommendation Engine session expands the model scope beyond FTD prediction to include post-acquisition personalisation. The Multi-Agent Architecture and User Signup Funnel session defines Amy's technical architecture. Prayash's Budget Optimisation/Rule Engine/AI Studio feedback improves the tooling. The Model Accuracy and Data Enrichment session forces a hard conversation about whether the training data is clean enough. Yoli's Google Ad Manager and AI Strategy session brings senior stakeholder alignment.","meetings":[{"title":"01-21 Meeting- Personalised Recommendation Engine & Predictive Modelling","done":["A suggestion was made to create a personalised recommendation engine for the Traders Hub app.","This AI project would match campaign details with user details to suggest the next best action for a user.","A simpler, non-AI version was proposed for faster implementation, which could be completed in about two days.","This would involve mapping a campaign (e.g., \"silver\") to a specific landing page URL."]},{"title":"Harsh Meeting- AI Tool for Wireframing, Development Approach, and Haroon's Role","done":["Shivank Shankar confirmed that he and Saurabh are travelling to Malaysia.","They briefly discussed the office in Malaysia, which was previously an IBM building.","Shivank's flight is on the morning of the 24th, while Saurabh's is also early on the same day for an event.","Shivank Shankar proposed creating wireframes in an AI studio to make it easier for Haroon to connect and build upon, aiming to provide a clear visual representation."]},{"title":"Naomi Meeting- AI Strategy, Lead Conversion, and Funnel Optimisation","done":["**Shivank's View (Top-Down/Acquisition First):** Argued for starting with the acquisition phase, as it aligns with the team's core PPC skill set, existing data infrastructure, and offers a clearer career advantage. He suggested proving a model here before tackling more complex areas.","**Naomi's View (Bottom-Up/Activation First):** Contended that the primary business issue is converting existing sign-ups into depositors (\"the money problem\"), not a lack of leads. She argued that the user journey post-acquisition is broken, and fixing activation and retention first would demonstrate that acquisition isn't the sole problem.","**Manual Intervention:** Shivank proposed an experiment to manually contact a limited number of leads via personal calls or WhatsApp messages for two weeks to measure the impact of a \"human touch\" on conversion rates. Naomi raised concerns about the workload and the risk of WhatsApp account blockage.","**Predictive Modelling:** To prioritise efforts, Shivank suggested using predictive modelling to identify high-intent leads who could then receive personalised attention. This would require Jatin's help with data availability and Korn's or Yingxian's team to build the model."]},{"title":"Prayash's tool feedback- Budget Optimisation, Rule Engine, and AI Studio","done":["The discussion focused on a two-stage budget optimisation tool. Stage two provides recommendations to increase or decrease campaign budgets based on predefined weights (e.g., ROAS).","The tool classifies campaigns as high-performing, moderate, or under-performing, and suggests budget adjustments for the latter two.","There was confusion over whether the tool uses \"budget\" or \"spend\". It was clarified that the displayed figure is the total spend for selected campaigns, which can be edited.","The tool recommended a 200% budget increase for a campaign with very low ROI (0.8%), which was deemed impractical despite potential theoretical justification."]},{"title":"Predicitive Modeling- Model Accuracy and Data Enrichment","done":["Speaker 3 reported a database fetching issue: data retrieval works for V1 binary user IDs but fails for V2 binary user IDs.","Taabish offered to run a quick data extraction for testing if Speaker 3 provides the exact required columns.","The team discussed validating the current model, trained on data up to 10 January, by testing it against newly funded users from 11–13 January to assess predictive accuracy.","Initial analysis shows weak predictions: the highest deposit probability was 0.48 (48%), which is considered low."]},{"title":"Yoli & Priyanka- Silver Campaign Launch and Strategy","done":["The creative assets for the silver campaign are ready.","[Speaker 2], [Speaker 1], and Shivank Shankar will launch the campaigns today across all markets.","The campaign will direct traffic to a new silver landing page, which is a copy of the existing gold landing page. Deep linking is not currently set up.","The initial budget is $100 per campaign, with plans to scale based on performance."]},{"title":"Yoli Meeting- Google Ad Manager, AI Strategy, and Platform Growth","done":["Shivank Shankar has completed the verification for Google Ad Manager. The account should be ready soon.","Soban is willing to test the Ad Manager on P2P. A Proof of Concept (POC) will be developed for P2P as an internal ad, strictly on mobile.","Once the account is set up, they will get the technical documentation and have another call with Sovan.","Hamza and Nuzi (front-end developer) were mentioned as resources for implementation."]},{"title":"Yoli team meeting- AI Agents Guardrails, Multi-Agent Architecture, and User Signup Funnel Optimisation","done":["`AI agents`","`Email and messaging workflows`","`User signup funnel`","Topic Title: Consolidation of links and document ownership"]}]},{"month":"Jan 2026","week":"Week 4 (Jan 22-28)","count":3,"monthHead":"#7D6608","monthLight":"#FEFCE8","commentary":"Three defining sessions. The AI Tool for Campaign Optimisation and Rule Generation session advances the automation layer. The Advertising OS Architecture, Rule Engine Roadmap, and Automation Strategy session (01-23) is the most consequential AI meeting of January — the Advertising OS is formally named, scoped, and roadmapped. The Data-Led Predictive Growth and Creative Automation Strategy session adds the creative optimisation dimension.","meetings":[{"title":"01-22 Weekly Meeting- AI Tool for Campaign Optimisation and Rule Generation","done":["The team discussed enhancing the campaign optimisation dashboard so the AI tool learns from user decisions (e.g., rejecting a budget recommendation) and retains this in memory.","Shivank Shankar outlined the long-term goal of deploying the model to directly optimise platforms like Google once its recommendations are consistently reliable.","Speaker 1 cautioned that achieving full confidence in the LLM’s creative and unpredictable suggestions will take longer than one to two months.","The initial plan is to generate a starter set of recommendations (e.g., ten) to understand the AI’s reasoning before deeper adoption."]},{"title":"01-23 Project Meeting- Advertising OS Architecture, Rule Engine Roadmap, and Automation Strategy","done":["Advertising OS architecture and product scope","Current dashboard includes: ad spend, DOS by channel, interests (business/health/sports), optimisation results with website exclusions, savings (15%), wasted ad spend, and “kill list”.","Discussion on positioning: Advertising OS as main umbrella with multiple components vs separate products.","Rule Engine to be a separate product and the second block after Attribution/Optimisation block; show initial four-block diagram to stakeholders."]},{"title":"01-26 Meeting- Data-Led Predictive Growth, Ad Platform AI Integration, and Creative Automation Strategy","done":["Topic Title: Shifting Marketing Mindset to Data-Led, Predictive Growth","Reimagine traditional marketing processes to leverage new data access and AI.","Pursue sustainable growth with autonomous, predictable operations across functions.","Use data to decide which channels to scale, pause, or stop—minimise manual judgement."]}]},{"month":"Jan 2026","week":"Week 5 (Jan 29-31)","count":1,"monthHead":"#7D6608","monthLight":"#FEFCE8","commentary":"Single session covering Automation, AI, and Predictive Modelling — a consolidation checkpoint at  Pay-Per-Click (PPC) campaigns.","**Part 1: Automation of Known Tasks**","Automate existing campaign optimisation processes currently done manually.","Aswathi suggested using an AI rule engine for this, aligning with the team's original plan."]},{"title":"Predictive Model based on countries","done":["The discussion focused on creating a model to predict whether users will pay a fee.","The initial approach is to use user profile and behavioural data (e.g., occupation) to make these predictions.","This model will initially focus on existing top-performing markets.","For new campaigns (e.g., in Nigeria), the model will help identify which users are likely to deposit based on their behaviour within that campaign."]},{"title":"Predictive Model- PFTD Ensemble Model, Feature Importance, Calibration, and Country-Level Activation","done":["Topic Title: Proposed FTD Probability Model Overview","The team presented an ensemble model to predict Probability of First Time Deposit (PFTD) using data from the first 72 hours after user identification.","The ensemble combines XGBoost (60% weight) and LightGBM (40% weight) with 18 selected features.","Executive summary and training/validation figures show the model is adequately trained."]}]},{"month":"Feb 2026","week":"Week 4 (Feb 22-28)","count":2,"monthHead":"#922B21","monthLight":"#FDEDEC","commentary":"Two sessions: the weekly campaign launch and tracking issues meeting surfaces how tracking degradation is corrupting the model's input signals. The Meta Ads AI Tool Testing session expands the model beyond Google into Meta — the first cross-platform AI signal engineering attempt.","meetings":[{"title":"02-25 Weekly Meeting- Campaign Launch Strategy & Tracking Issues","done":["Discussion focused on launching campaigns in countries migrated to the new system version, \"V2\".","A past tracking issue in \"V1\" countries like Nigeria was noted. A Google campaign with only V2 countries also faced tracking issues and was paused by Aswathi.","Shivank suggested a backend fix has been deployed; campaigns in V2 countries should now be trackable. Plan is to re-launch to verify.","Decision: Relaunch paused campaigns in V2 countries and monitor for 1–2 days to see if tracking issues persist."]},{"title":"02-26 Meeting- Meta Ads AI Tool Testing and Landing Page Optimisation Strategy","done":["The team explored Natix AI, a tool for Meta Ads analysis, testing its capabilities and connectivity","Multiple participants attempted to connect their Meta Ads accounts through the platform","Aswathi had previously connected and tested the tool, running into credit limitations","The platform offers 1,500 daily refresh credits"]}]},{"month":"Mar 2026","week":"Week 1 (Mar 01-07)","count":1,"monthHead":"#0E6655","monthLight":"#E8F8F5","commentary":"One session covering regional security crisis impact, PPC scaling, and AI automation implementation. The security crisis (an external event) is altering campaign signals in specific regions — the model needs to account for non-marketing factors in its predictions. A sign of real-world complexity entering the modelling environment.","meetings":[{"title":"03-04 Weekly Meeting- Regional Security Crisis Impact, PPC Campaign Scaling Strategy, and AI Automation Implementation","done":["Discussed ongoing security concerns in Dubai following recent drone and missile activity","[Shivank] reported experiencing explosive sounds near his location; windows shaking from nearby incidents","Vince (mentioned associate) experienced fear as attacks occurred near Paramount Hotel on Palm Jumeirah","Concerns raised about investor confidence and potential capital flight from Dubai"]}]},{"month":"Mar 2026","week":"Week 2 (Mar 08-14)","count":5,"monthHead":"#0E6655","monthLight":"#E8F8F5","commentary":"Five sessions in the most technically dense AI week of March. The Signal Engineering Integration session defines how PPC campaign signals feed the predictive model. The PPC AI Agent Development session (03-10) is the first meeting explicitly about building an autonomous PPC agent. The Growth Team Project Updates session confirms all three AI workstreams are live: Advertising OS, predictive models, and attribution infrastructure. The LTV Prediction Model and Data Access session surfaces the same data pipeline blockage as last week.","meetings":[{"title":"03-09 Strategic Meeting- PPC Campaign Optimisation with Predictive AI and Signal Engineering Integration","done":["Integration of HubSpot is being planned for outbound communication channels including email and WhatsApp","The integration will support context gathering for outbound operations","Current focus is on setting up the infrastructure for creation and deployment","The entire system will be linked to the PPC partner for acquisition benefits"]},{"title":"03-10 Meeting- PPC Campaign AI Agent Development - Data Access and Optimisation Logic","done":["The team is unable to obtain access to raw data from BigQuery required to build AI agents for campaign optimisation.","Data is currently stored in the BI reporting BigQuery project but needs to be copied to the CRO project for access.","Multiple requests have been made to Jatin, David, and Omar since 24th February with limited progress.","The BI team states they are migrating and mapping data, but no clear deadline has been provided."]},{"title":"03-10 Meeting- User Journey Documentation and Campaign Flow Strategy","done":["[Speaker 1] requested compiling user journeys with annotated screenshots indicating where elements should appear in the trader flow.","The team may sketch simple, rough placements to show preferences.","Screenshots will be reviewed with Jatin for translation and implementation.","Rakshit suggested splitting the documentation by pages (landing pages, Gold campaigns, MT5 themes, etc.) to accelerate progress."]},{"title":"03-11 Meeting- Growth Team Project Updates - Advertising OS, Predictive Models & Attribution Infrastructure","done":["Shivank has been sharing department growth updates across multiple channels including WhatsApp","Discussion initiated about sending a centralised update after reviewing all ongoing items","Team is working through tracking status of various projects and initiatives","WhatsApp campaign is operational with leads being acquired, but no deposits have been recorded yet"]},{"title":"03-13 Meeting- Google Ads Campaign Disapprovals and Policy Compliance Strategy","done":["**Status of Disapproved Campaigns**: Some campaigns were reinstated, while others received new disapprovals or had appeals partially approved (CSFP lifted but \"destination not working\" still pending).","**New Disapprovals**: Aswathi enabled some campaigns yesterday that were disapproved; appeals were submitted without changes because assets were in Spanish.","**Appeal Process Limitations**: Michelle noted she cannot escalate further until changes are made before reappealing; repeated escalations without updates reduce her ability to push cases.","**Budget Strategy for Escalation**: Ishank proposed increasing budgets to ₹15,000 to trigger higher-level reviews; Michelle agreed to try, cautioning there may be limits on how many can be escalated via this route."]}]},{"month":"Mar 2026","week":"Week 3 (Mar 15-21)","count":3,"monthHead":"#0E6655","monthLight":"#E8F8F5","commentary":"The AI work culminates. The Campaign Strategy and Predictive Modelling session (03-16) confirms the FTD model is live and providing signals. The LTV Prediction Model progress review identifies data access as the remaining blocker. The Campaign Performance Optimisation and AI Model Strategy session (03-17) frames the next iteration of the model post-launch. The Conversion Accelerator launches March 18 and the predictive FTD model goes live March 19 — the two primary AI deliverables of the entire six-month period.","meetings":[{"title":"03-16 Meeting- Campaign Strategy, Predictive Modelling & Reporting Update","done":["**Strategic shift** from demo sign-ups to real/funded account optimisation (FTD focus)","**Predictive modelling** as an accelerator for FTD optimisation — a model that predicts with ~70–75% accuracy whether a new lead will fund an account, with the goal of passing these signals back to Google via GCLIDs","**Tracking and attribution issues** (e.g., missing GCLIDs on V1, UTM parameters not passing, discrepancies between Looker Studio and Google Ads dashboards) flagged as an ongoing hygiene concern requiring cross-team collaboration (particularly with Christy)","**Campaign launches** — including AI Max and P Max — positioned as initiatives that become more powerful once the predictive model is operational"]},{"title":"03-16 Progress Review Meeting- LTV Prediction Model & Data Access Discussion","done":["**Use net deposits as the target variable** instead of revenue, as revenue is highly volatile, difficult to query accurately across multiple platforms, and less consistent as a success metric.","**Reduce the observation/look-back window from 90 days to 48 hours**, aligning with Google's practical requirement for near-real-time audience signal submission.","**Switch target variable from revenue to net deposits**","**Reduce look-back window from 90 days to 48 hours**"]},{"title":"03-17 Meeting- Campaign Performance Optimisation & AI Model Strategy","done":["**Request CPL, CTR, and CTL columns be added to daily performance data**","**Provide structured Google Ads data dump to Mahantesh's team**","**Push Michelle for Google Ads API access**","**Coordinate Meta/Facebook API access setup**"]}]}]},{"label":"PPC & Campaign Execution","emoji":"📣","bg":"#FFEBEE","fg":"#B71C1C","count":45,"summary":"41 meetings across 16 weeks — the operational execution layer. From initial country kill-list triage (Nov) → PMAX scaling and AI Max activation (Dec–Jan) → automation and funnel optimisation (Feb) → campaign tracking remediation and compliance (Mar). The meetings thin out in March not because execution slowed but because the AI tooling was taking over routine campaign decisions.","weeks":[{"month":"Nov 2025","week":"Week 1 (Nov 01-07)","count":5,"monthHead":"#145A32","monthLight":"#D5F5E3","commentary":"Five sessions establish the PPC operating model. The agency pitch for an end-to-end Google Ads solution evaluates external execution capability. ASO strategy begins (app store visibility as a channel). Creative analysis and brand awareness campaign scoping. The lead acquisition form, KPI protection, and team communication protocols session establishes the measurement baseline. The 'Killing Countries' framework is the most operationally significant output — data-driven country elimination based on CPA and active trader ratios.","meetings":[{"title":"Agency pitch -Google ads end to end solution","done":["**Data Discrepancy and Lack of Trust:** There is a significant data discrepancy in their marketing dashboards. Specifically, the Multi-Touch Attribution (MTA) dashboard is not showing the correct numbers and fails to match data from their PPC platforms, causing confusion and a lack of trust in their reporting. This indicates a broader challenge in maintaining a single source of truth for marketing performance.","**Optimizing for Delayed, High-Value Conversions:** Their primary challenge is optimizing campaigns for bottom-of-the-funnel conversions (first-time deposits). They receive many low-quality leads that do not convert. This is complicated by a delayed conversion cycle, where it can take upwards of 20 days from an ad click to a deposit, making real-time optimization difficult.","**Disconnect Between Ad Platform and Backend Data:** There is a gap between data on ad platforms like Google and their own backend systems, which track crucial business metrics like actual deposits and revenue. While they pass some offline data back, they need a more robust system that fully integrates this backend data into the AI's campaign optimization process.","**Lack of End-to-End Automation:** The team spends significant time on manual campaign management and optimization. They have observed that most existing AI tools focus on asset creation but lack the capability to automatically handle the entire campaign lifecycle, from creation and structuring to continuous, intelligent optimization."]},{"title":"App Store Optimization (ASO) Strategy","done":["The primary goal for this quarter is to make the app discoverable for basic, non-branded search terms like \"trading apps\" and \"trading brokers.\"","The initial ASO work will focus on setting a proper foundation. This includes optimizing the app's title, description, and short description using thorough keyword research.","It was noted that 65% of all app downloads originate from a search within an app store, which underscores the importance of ASO.","Success will be measured by tracking the app's search ranking for key non-branded terms, with the goal of improving its position from results like 20th or 15th to the 9th or 5th position."]},{"title":"Creative Analysis and Brand Awareness Campaign","done":["**Description**","A creative analysis was conducted for brand awareness campaigns, testing three creatives—\"Anytime, Anywhere\", \"3 million traders\", and \"100k affiliates\"—paired with three ad copies (A, B, C).","Primary evaluation metrics: Impressions, CPM (Cost Per Mille), CTR (Click-Through Rate), and ERL (Estimated Ad Recall Lift Rate).","Initial conclusion: \"Anytime, Anywhere\" with Copy A was deemed the best overall performer due to balanced results across all metrics."]},{"title":"Lead Acquisition Form, PPC KPI Protection, and Team Communication Protocols","done":["`Lead acquisition form`","`Team communication`","Lead Acquisition Form: Objectives and Question Count","Aim to limit onboarding questions to 3 (+1 optional) to reduce friction and protect PPC sign-up KPI."]},{"title":"PPC Client- Killing countries & creatives alignment","done":["Topic Title: Dashboard overview and data scope (July–October)","Description:","A new Looker Studio–based dashboard displays spend and revenue by region and country from July to October (October data through the 29th).","Purpose: visualize country performance, identify underperformers to “kill,” and focus on stronger markets as the team shifts to sign-ups and experiment campaigns."]}]},{"month":"Nov 2025","week":"Week 2 (Nov 08-14)","count":1,"monthHead":"#145A32","monthLight":"#D5F5E3","commentary":"A single high-signal session: Killing Countries based on active traders and revenue implements the framework from Week 1. Country kill-lists are actioned — the first example of data directly driving campaign decisions rather than informing them.","meetings":[{"title":"Killing Countries based on active traders & revenue","done":["**Methodology:** The team analysed country performance for PPC and affiliate channels to decide where to continue or stop campaigns. The primary logic involved comparing country metrics against the median for average revenue (0.35%) and average active traders (0.25%). A pattern was noted where countries underperforming on the affiliate side also tended to underperform on the PPC side.","**Market Exits:**","**Algeria:** Marked for removal (\"out of the market\") due to low affiliate performance, low average revenue per client ($146), and an extremely high non-brand CPA ($1300-$2700).","**Other Underperformers:** Vietnam and the Philippines were noted as significantly below the median. Kyrgyzstan and Yemen were also marked for removal due to very low active trader counts (under 25)."]}]},{"month":"Dec 2025","week":"Week 1 (Dec 01-07)","count":3,"monthHead":"#6C3483","monthLight":"#F5EEF8","commentary":"Three sessions advance the campaign intelligence layer. PMAX Campaign Performance and Budgeting locks the budget allocation model. Customer Segmentation, PMAX Campaigns, and Predictive Bidding begins applying segmentation logic to campaign targeting. PPC Acquisition Quality, Regional Persona Segmentation, and Activation Accountability introduces a quality filter — not all leads are equal.","meetings":[{"title":"Customer Segmentation, PMAX Campaigns, and Predictive Bidding","done":["A previous technical issue with CleverTap prevented successful implementation for customer segmentation and customised messaging.","The team will re-evaluate Segment as a potential tool; a call is scheduled to discuss pricing and the earlier issues encountered.","Plan to review archived system channels to understand what went wrong with Segment’s prior implementation.","A key advantage of Segment is its ability to pass audience data back to ad platforms like Google, which CleverTap might not support."]},{"title":"PMAX Campaign Performance and Budgeting","done":["**Performance Issues:** Many PMAX campaigns exhibit extremely high CPRs (ranging from `$30,000` to `$70,000`), attributed to setup inconsistencies where a \"bad campaign\" was copied and pasted using Google Ads Editor, resulting in missing assets like images.","**Strategic Dilemma (ROAS vs. Funded Accounts):** The team is facing a core conflict. Focusing on ROAS, as was successful in October, leads to lower spending but higher value deposits. Conversely, pushing for a higher count of funded accounts through high-volume channels like PMAX is risky, as it degrades overall conversion quality and the value per account. The team plans to present these findings to leadership to get a clear direction on which metric to prioritise.","**Industry Sentiment:** It was noted that PMAX campaigns are widely known in the industry for not delivering high-quality leads.","**V1/V2 Tracking Discrepancy:** A potential tracking issue was identified where some countries receive traffic from V2, but the leads are not being tracked from V2, creating a \"grey zone\" in the data."]},{"title":"PPC Acquisition Quality, Regional Persona Segmentation, and Activation Accountability","done":["Affiliate activation","Regional ad messaging","Lead quality filtration","PPC lead quality"]}]},{"month":"Dec 2025","week":"Week 3 (Dec 15-21)","count":3,"monthHead":"#6C3483","monthLight":"#F5EEF8","commentary":"Three sessions mark the mid-December performance review. Campaign Optimisation, Automation Rules, and Google Ads formalises the rules-based automation approach. The Priyanka branding campaign ROI and data alignment session is notable — it's the first time brand campaign spend is being asked to prove conversion contribution. Yoli's PPC Spend and Conversion Funnel session maps the full end-to-end cost flow from ad spend to FTD.","meetings":[{"title":"Campaign Optimisation, Automation Rules, Google Ads","done":["Speaker 1 shared six months of Google Ads data; an AI tool independently established CPA and ROS benchmarks.","The tool generated rules per country and campaign type, which Speaker 1 found valuable.","For effectiveness, rules must be dynamic and run daily or on a regular cadence.","Rules should be regenerated periodically (e.g., monthly or every two months) to enable optimisation and monitoring."]},{"title":"Priyanka- Branding Campaign ROI & Data Alignment","done":["Speaker 1 questions the effectiveness of high-fidelity branding campaigns: they look good but lack proven ROI.","Speaker 2 confirms there is no clear ROI for brand campaigns and the budget is too small to make a significant impact; around 800,000 is spent on branding within lead generation.","The hypothesis that branding campaigns would lower Cost Per Acquisition (CPA) for lead generation has not proven true in their case due to low spending.","Speaker 2 notes other companies, like Capital.com, spend millions (e.g., 2–3 million dollars in UAE) on branding in a single market to achieve results—a strategy they cannot replicate."]},{"title":"Yoli Meeting- PPC Spend & Conversion Funnel","done":["Speaker 1 reviewed the total derivative based on the average of the last three months and compared it to current PPC performance.","The discussion considered a scenario where new funded accounts are split 50/50, representing a potential outcome if spending is increased to \"x\".","Speaker 2 highlighted that hitting this target would require significant improvements in the conversion funnel, from sign-up to funded account.","Speaker 1 clarified they were presenting a \"worst-case scenario,\" assuming the current PPC funnels remain unchanged."]}]},{"month":"Dec 2025","week":"Week 5 (Dec 29-31)","count":1,"monthHead":"#6C3483","monthLight":"#F5EEF8","commentary":"Single year-end session: PPC Country Prioritisation, PMAX Optimisation, and FTD Recovery. A directional planning session setting the Q1 execution agenda — which countries to scale, how to optimise PMAX signals, and what the FTD recovery path looks like entering January.","meetings":[{"title":"PPC Country Prioritisation, PMAX Optimisation and FTD Recovery","done":["Multiple sessions were held to understand the decline in first-time deposits (FTD), funded accounts, and conversion metrics across PPC, and to align PPC, branding, SEO, and creative strategies.","Core themes:","FTD and real‑to‑funded metrics are deteriorating.","PPC spend is misaligned with “money‑back” countries."]}]},{"month":"Dec 2025","week":"Weekly Meeting- Campaign Workflow and PPC Automation - Summary.md","count":1,"monthHead":"#6C3483","monthLight":"#F5EEF8","commentary":"","meetings":[{"title":"Weekly Meeting- Campaign Workflow and PPC Automation","done":["**New Campaigns:** The process is linear, starting with **Research** (e.g., finding a topic for an ebook), followed by the **Creation** of creative assets and landing pages (involving content, design, and compliance), and concluding with the **Launch** and setup of the campaign.","**Existing (Old) Campaigns:** The process is cyclical, beginning with **Reporting** and **Analysis** of performance data. Based on the analysis, the team identifies issues like creative fatigue or poor landing page performance, which then leads to **Optimisation** and a refresh of creatives or landing pages. The cycle then repeats: Reporting → Analysis → Optimisation → Refresh.","**Initial Metrics:** The team first identified four key metrics: **FTD (First Time Deposit)**, **CPR (Cost Per Registration)**, **CTL (Click to Lead)**, and **CTR (Click-Through Rate)**, noting that different metrics point to different problems (e.g., low CTL suggests a landing page issue).","**Refined Funnel Metrics:** The focus later shifted to a more granular conversion funnel analysis, prioritising:"]}]},{"month":"Dec 2025","week":"Weekly Meeting- PPC Strategy and Q1 Planning - Summary.md","count":1,"monthHead":"#6C3483","monthLight":"#F5EEF8","commentary":"","meetings":[{"title":"Weekly Meeting- PPC Strategy and Q1 Planning","done":["**Performance Goals:** A \"big hairy audacious goal\" (BHAG) was set to double current performance. With a daily average of 485 new funded accounts, the goal is to increase PPC's contribution to 50%, requiring 970 total new accounts daily. This involves reverse-calculating the necessary demos and leads based on current conversion rates.","**Budget Scenarios:** Two budget options were discussed to achieve this goal:","**Budget 1:** Doubling the existing PPC spend (2x).","**Budget 2:** A significantly higher budget to reach the 50% contribution goal, with an estimated annual spend of 53 million, which was considered \"a bit too high.\""]}]},{"month":"Jan 2026","week":"Week 1 (Jan 01-07)","count":2,"monthHead":"#7D6608","monthLight":"#FEFCE8","commentary":"Two execution sessions: Conor's Strategic Planning for AI Integration and PPC Performance maps where AI will augment the existing PPC team's work. Prakash's PPC Ad Optimisation for FTD Growth is the first session explicitly tying PPC optimisation to the FTD metric (rather than CPL or CPA alone) — a signal that the measurement framework is maturing.","meetings":[{"title":"Conor- Strategic Planning for AI Integration and PPC Performance","done":["[ ] Draft a comprehensive plan outlining the team's strategy, including budgets for platforms/countries and a clear \"why\" for the proposed direction - By Friday","[ ] In the plan, detail how to reallocate unused budget (approx.</mark> `₹500K`/month) to the high-performing \"yellow\" countries to drive new funded accounts - [TBD]","[ ] Develop a quarterly roadmap (Q1, Q2, etc.) for the \"yellow\" countries, analysing last year's performance and setting specific growth targets for new funded accounts and ROAS - [TBD]","[ ] Reverse engineer the plan from a target of 35-40% campaign return and an increase in new funded accounts - [TBD]"]},{"title":"Prakash- PPC Ad Optimization for FTD Growth","done":["Multi-channel attribution: Google’s last-click view is confined to its ecosystem (search, YouTube, display), ignoring cross-network influences (e.g., Meta, TikTok, affiliates, Telegram). Advertising OS will provide unified attribution and post-view/post-click context across channels.","Predictive Lifetime Value (PLTV): Beyond FTD, the engine will predict Day-Zero LTV and FTD likelihood, generating offline conversion uploads back to Google within the ideated 48-hour window for optimal ML learning. The rule engine will produce “people lists” tagged by predicted value, enabling Google to calibrate bids (e.g., acquire a client worth $300 at $100 CPA, country-specific).","A real-time performance view (FTD, CPA, ROS, ad spend) and live feed of optimiser changes with human-in-the-loop auditing.","A “publisher kill switch” to stop high-click, zero-FTD ads."]}]},{"month":"Jan 2026","week":"Week 3 (Jan 15-21)","count":3,"monthHead":"#7D6608","monthLight":"#FEFCE8","commentary":"Three sessions: the AI Campaign Tool, Data Discrepancy, and Summit Prep session surfaces the first major data discrepancy — click-to-visitor ratios not matching across platforms. Prakash's Digital Marketing Campaign Tool MVP defines the minimum viable product for the campaign automation tool. Soban's Drop in V2 Signups, PPC Audit, and CRO Validation is the first formal PPC audit triggered by a product change (V2 launch) — establishing that platform migrations need pre/post PPC validation.","meetings":[{"title":"01-20 Weekly Meeting- AI Campaign Tool, Data Discrepancy & Summit Prep","done":["Shivank Shankar presented a prototype of an AI-powered tool for campaign optimisation, which uses a rule engine and a swipe card interface for recommendations.","The tool simulates a human's thought process, running checks on campaign duration, CPL, and conversion rates to diagnose issues. It then shows which checks passed, failed, or were skipped.","A sample use case for a campaign in Somalia resulted in a recommendation to \"pause immediately\" due to \"burning cash with zero return on ad spend.\"","The system is designed with a \"human in the middle\" approach. Users can approve (\"Yes\") or reject (\"No\") AI suggestions, providing reasons for rejection to help the AI learn and improve its model."]},{"title":"Prakash- Digital Marketing Campaign Tool MVP","done":["**Description**","The objective is to build a product within the partner toolkit that enables partners to run digital marketing campaigns directly via the partners’ app, easily.","Partners should be able to transfer funds into an ads wallet and configure campaign conditions.","The company may also add funds to this ads wallet for partners to use exclusively on ads."]},{"title":"Soban- Drop in V2 signups, PPC audit, CRO validation","done":["Topic Title: Drop in V2 signups and potential causes","Signups on V2 showed a peak, followed by a drop since last Monday/Tuesday, with the dip starting around 1 December.","Technical issues are considered less likely; reduced marketing spend is suspected to impact volume.","PPC changes were made recently, including pausing campaigns in multiple countries and a specific low-quality lead campaign."]}]},{"month":"Jan 2026","week":"Week 4 (Jan 22-28)","count":5,"monthHead":"#7D6608","monthLight":"#FEFCE8","commentary":"The most PPC-intensive week of January — five sessions. FTD Signals and Country Intent Strategy advances the targeting intelligence. AI for Campaign Management (01-23) brings the Advertising OS into direct PPC workflow integration. The PPC Prioritisation, Launch Timelines, and Funnel Diagnostics session aligns on delivery dates. The campaign-triggered personalised homepage and PPC routing POC is the first cross-functional PPC-to-product integration. Data Automation and PPC Analysis locks the data pipeline requirements.","meetings":[{"title":"01-22 Meeting- PPC Optimisation, FTD Signals, Country Intent Strategy","done":["PPC signals and conversion funnel performance","PPC campaigns are optimised for “real account” creation using Google API signals.","A large volume of “real” events (5,000+) is being passed to Google, improving sign-up to real conversion.","Real-to-funded conversion has dropped significantly due to insufficient funded user (FTD) signals."]},{"title":"01-23 Meeting- AI for Campaign Management","done":["**Description:**","The team discussed implementing AI to manage advertising campaigns on Meta and Google.","Naomi suggested that after implementation, the AI should learn how campaigns are set up, including ad groups and ad copy.","The AI could run health checks and flag setup errors, such as incorrect ad group names or missing primary text."]},{"title":"01-23 Weekly Meeting- PPC Prioritisation, Launch Timelines, Landing Page Redesign, Deep Linking, and Funnel Diagnostics","done":["Topic Title: Prioritisation in ClickUp for PPC and Campaign Tasks","Shivank reviewed ClickUp priorities so the team has a reference while he is away.","“Match to one add role piece” marked high; “Match two hundred roll” setup is already done.","Brand impression share is low but ongoing; trademark tasks set to low."]},{"title":"01-26 Meeting- Campaign-triggered personalised homepage, design optimisation, and PPC routing POC","done":["Topic Title: Campaign-triggered personalised homepage experience","Discussed stitching the user journey from campaign entry to the homepage with contextual UI (notifications, pop-ups, banners, highlighted sections).","Need a data store mapping campaign names/UTMs to triggers (e.g., gold/silver/MSN5 experiences).","Existing person objects store attribution and campaign name; triggers should be linked to these attributes."]},{"title":"01-26 Weekly Meeting- Data Automation, PPC Analysis, and PII Handling","done":["The team discussed preparing a data set for Jatin by creating an augmented view via SQL.","A core principle is to avoid using Personally Identifiable Information (PII) such as email addresses.","If joins are required, they should be executed at a level that prevents PII exposure to end users.","The need for tool documentation was raised; Shivank will share it on Slack."]}]},{"month":"Feb 2026","week":"Week 2 (Feb 08-14)","count":5,"monthHead":"#922B21","monthLight":"#FDEDEC","commentary":"Five sessions — the highest PPC density of February. Aswathi's ROAS Improvement and ROS Prioritisation sessions advance the bidding strategy. Chris's WhatsApp Lead Nurturing, PPC-to-Deposit Gap, and Data Integrity session surfaces the gap between lead acquisition and deposit conversion as the primary performance problem. Jatin's PPC Tracking and User Journey session maps the full click-to-account journey. Mahantesh's PPC Campaign Analysis and API Access session prepares the data infrastructure for more granular reporting.","meetings":[{"title":"Aswathi- Google Ads Automation & ROAS Improvement","done":["Aswathi presented a plan to automate Google Ads campaign management to save costs and improve Return on Ad Spend (ROAS).","The system analyses campaign age and search term data to suggest optimisations.","Potential savings are calculated based on negativising costly keywords and pausing underperforming campaigns.","This automation aims to improve ROAS and demonstrate the value of automation."]},{"title":"Aswathi- ROS Prioritisation, PPC Optimisation, Automation, and Experiment Plans","done":["Topic Title: Focus Areas for ROS and Automation","The team agrees directors will prioritise ROAS (Return on Spend) and automation.","ROAS should be split into core and experiment buckets; automation is a separate focus.","A diagram was proposed to visualise: two main pillars (ROAS, Automation), with ROAS divided into core and experiments; automation into post-view and post-click."]},{"title":"Chris- WhatsApp Lead Nurturing, Landing Page, PPC-to-Deposit Gap, and Data Integrity","done":["Topic Title: WhatsApp-led lead nurturing flow and landing page","Discussion focused on creating a landing page to capture phone numbers and start WhatsApp messaging for nudging sign-ups and deposits on Daredevils.","Vince has approval from Jai and Rashid to use phone numbers; objective is WhatsApp-based guidance via videos and step-by-step messages.","Proposed flow: user enters phone number on landing page, receives a forex ebook via WhatsApp, then ongoing nudges and a separate sign-up link leading to HubSpot after registration."]},{"title":"Jatin- PPC Tracking, User Journey Mapping, and Home Troubleshooting","done":[]},{"title":"Mahantesh- PPC Campaign Analysis Objectives, Data Corrections, and API Access Plan","done":["Topic Title: Objectives for PPC campaign analysis","The team needs to identify which campaigns to scale up or scale down, target geographies, and audiences.","Immediate focus is on historical analysis to guide current spend decisions; predictive modelling may come later as a second stage.","Daily metrics like impressions and clicks may be less relevant than conversion-related metrics for decision-making."]}]},{"month":"Feb 2026","week":"Week 3 (Feb 15-21)","count":3,"monthHead":"#922B21","monthLight":"#FDEDEC","commentary":"Three sessions: the performance metrics and Google Ads weekly is routine maintenance. The AI Max Adoption, PMAX FTD Optimisation, and VBB Roadmap session is significant — value-based bidding is formally proposed as the next evolution after CPA targeting. The vendor bus shelter rates and UAE App Campaign session is notable for bringing offline media into the same planning conversation as digital PPC.","meetings":[{"title":"02-16 Weekly Meeting- Performance Metrics, Google Ads, and Retargeting Strategy","done":["**Description**","Shivank Shankar presented a plan to map all activities into three parts: ROS (Return on Spend), Automation and AI, and a general task list, to align on PICs and timelines.","The discussion focused on finding better early indicators for experimental campaigns to reduce the long lag time (up to six months) for seeing results like deposits from real accounts.","**Conclusion**"]},{"title":"02-18 Weekly Meeting- AI Max Adoption, PMAX FTD Optimisation, Predictive Conversion, VBB Roadmap, and Cross-Market App Launch","done":["Topic Title: Priority Alignment, Tracker Updates, and App Rollout","Description:","Update shared tracker and slides to reflect current priorities and accurate AI Max adoption metrics; existing AI Max adoption data is outdated.","Joint Business Plan items reviewed; AI Max app technical stack rework needed."]},{"title":"02-20 Meeting- Vendor Bus Shelter Rates, Deriv Go V2 UAE App Campaign, Budget and Fraud Controls","done":["Topic Title: Vendor contract and revised rates for bus shelters","Discussion on bus shelter pricing and receiving revised rates from the vendor.","Previously, a full-year booking influenced pricing; expecting a similar rate structure now.","Vendor to share revised rates by end of day."]}]},{"month":"Feb 2026","week":"Week 4 (Feb 22-28)","count":4,"monthHead":"#922B21","monthLight":"#FDEDEC","commentary":"Four sessions as February closes: PPC Performance and Conversion Strategy reviews the month. The Campaign Performance Optimisation and Landing Page UX Issues session is the first explicit link between UX problems and PPC efficiency. Chris's Facebook Attribution, WhatsApp Onboarding Experiment, and Cohort LTV Alignment session formalises the multi-channel attribution approach for lifecycle PPC. Naomi's Google Campaign Data Sharing and Automation Feasibility session assesses what the team can automate vs what requires manual intervention.","meetings":[{"title":"02-23 Meeting- PPC Performance & Conversion Strategy","done":["Two main problem statements for PPC were identified:","Improving the conversion rate from visitor to funded account. The journey is Visitor -> Demo Account -> Real Account -> Funded Account.","Determining the payback time for ad spend.","Cumulatively, the company is making more than it spends month-on-month."]},{"title":"02-27 Meeting- Campaign Performance Optimisation and Landing Page UX Issues","done":["Shivank presented a screen-sharing session analysing campaign pages on joinear.com with high bounce rates to identify optimization opportunities","Report displayed full list of all pages and their behaviour patterns","Top five campaigns were analysed based on traffic using post-hoc recording data, including conversion funnel analysis","Analysis covered last seven days' data, examining issues on various landing pages"]},{"title":"Chris- Facebook Attribution, WhatsApp Onboarding Experiment, AI PPC Data Foundation, Cohort LTV Alignment","done":["Topic Title: Tracking and Attribution Issues in Facebook/Meta Campaigns","The team faces discrepancies between Facebook dashboard, Tape, Luca Studio, and backend databases (V1 vs V2).","Facebook retargeting campaigns lack UTMs; prospecting campaigns show mismatches in signups and deposits across tools.","Example: Nigeria “silver” campaign shows 113 virtual signups in Facebook, but Luca Studio records only 3 leads and 1 real account."]},{"title":"Naomi- Google Campaign Data Sharing Scope, Automation Feasibility, and Activation Prioritisation","done":["Topic Title: Scope of data sharing for Google campaigns","Naomi asked what “top three campaigns” refers to and why Google is prioritised over Meta, which has higher traffic.","Shivank clarified “top three” is based on leads to ensure sufficient down-funnel data.","The intent: provide ad copy, landing pages, and keywords from the top three Google search campaigns as a pilot."]}]},{"month":"Mar 2026","week":"Week 1 (Mar 01-07)","count":1,"monthHead":"#0E6655","monthLight":"#E8F8F5","commentary":"Single session: PPC Campaign Performance Analysis Framework and Automation Workflow. Given the Q1 shortfall (projection at 57% of target), this session redesigns the performance framework — what metrics to track daily vs weekly, and which automation rules can compensate for the budget/execution gap.","meetings":[{"title":"03-05 Meeting- PPC Campaign Performance Analysis Framework and Automation Workflow","done":["**Core vs. Experimental Campaign Classification**","Two campaign categories exist: Core campaigns (proven performers) and Experimental campaigns (newer initiatives)","Initial proposal: Experimental campaigns defined as those running less than six months","Concern raised that six months may be too long a duration for evaluation"]}]},{"month":"Mar 2026","week":"Week 2 (Mar 08-14)","count":2,"monthHead":"#0E6655","monthLight":"#E8F8F5","commentary":"Two compliance-driven sessions: Google Ads Policy Compliance and Campaign Budget Review (03-10) addresses disapproval issues. Campaign Tracking and iOS Landing Page Issues (03-11) surfaces the iOS-specific tracking gap introduced by Apple's privacy changes — a technical blocker for accurate FTD attribution from mobile traffic.","meetings":[{"title":"03-10 Meeting- Google Ads Policy Compliance and Campaign Budget Review","done":["**Background**: Last week’s CSSP and destination-related disapprovals were escalated and resolved, yet many ads remain disapproved across multiple accounts.","**Current Status**:","Speaker 1 manually appealed all disapprovals on Friday.","Ishank submitted a bulk manual appeal."]},{"title":"03-11 Meeting- Campaign Tracking and iOS Landing Page Issues","done":["**Landing Page Accessibility Issue**: The landing page looks identical, but clicking certain ads and opening campaigns that are not tracking correctly results in an \"access denied\" error","The landing page may fail to load properly due to parameter-related issues","Three sample campaigns were tested; all showed the same problem","**Platform-Specific Behaviour**: The issue appears to be iOS-specific, raising questions about how Google’s model handles similar scenarios"]}]},{"month":"Mar 2026","week":"Week 3 (Mar 15-21)","count":1,"monthHead":"#0E6655","monthLight":"#E8F8F5","commentary":"Final week: Google Ads Campaign Setup and Landing Page Compliance Review. Policy compliance is now a recurring theme — the team is managing disapprovals, URL policy violations, and landing page requirements simultaneously with campaign performance. The compliance overhead is consuming execution bandwidth.","meetings":[{"title":"03-16 Meeting- Google Ads Campaign Setup & Landing Page Compliance Review","done":["**Review Landing Page & Ad Copy Screenshots**","**Follow Up on Tracking/Sign-Up Attribution Issue**","**Ask Michelle About South Africa**","**Enquire About Scaleo Availability**"]}]},{"month":"Mar 2026","week":"Week 4 (Mar 22-28)","count":4,"monthHead":"#0E6655","monthLight":"#E8F8F5","commentary":"The most active execution week since November. PMax campaigns are relaunched, Demand Gen is scoped for Nigeria as the pilot market, and retargeting campaigns are configured for 10 country-specific markets. Key strategic decisions include the 8% tipping-point rule for Demand Gen budget sizing, a 30-day learning window before making firm scaling decisions, and Brand/Search Lift studies required before any Demand Gen campaign is published. The team also resolves that search campaign scaling should focus on increasing budgets on already-performing campaigns rather than waiting for a gap analysis.","meetings":[{"title":"03-24 Digital Marketing Strategy & Demand Gen Campaign Planning","done":["Demand Gen campaign initially targeting Nigeria via retargeting (existing demo/real account holders + website visitors from past 5-6 months, including PMax audiences); expansion to all English-speaking countries thereafter.","Brand Lift and Search Lift surveys must be configured before publishing the Demand Gen campaign — cannot be added retroactively. Campaign to be built, paused, and lift studies configured first.","Demand Gen budget framework: set tCPA at 2× generic search CPA; daily budget at 20× generic search CPA. Launch on Max Conversions first, transition to tCPA based on Optiscore recommendations.","30-day learning window to be observed for all new campaigns before making firm scaling decisions based on predictive model output.","Lookalike audience viability depends on seed list size — start with Optimised Targeting OFF to test strictly; evaluate Optimised Targeting ON if volumes are insufficient."]},{"title":"03-24 PPC Branding, Attribution Strategy & Retargeting Campaign Planning","done":["Display attribution engine captures pre-website-visit interactions (post-view, impression-level) that multi-touch attribution fundamentally cannot — positioning it as a complementary but distinct layer.","10 new country-specific retargeting campaigns to be launched (Argentina, Venezuela, Chile priority; Nigeria and Ghana also identified) with separate campaigns per country for clean CPA profiling.","Creative themes to prioritise: Forex, eBook, Crypto, Chat Patterns (proven). Gold/Silver to be tested. Prasanna's motion design team confirmed as currently available.","Current $30 campaign budget spread across 6 major countries flagged as insufficient — country-level dedicated campaigns required for meaningful retargeting signal.","AI intelligence layer proposed: March21 + Adroll + Google Ads data combined to make informed budget scaling decisions at keyword and campaign level."]},{"title":"03-24 Weekly: Digital Marketing Strategy, Demand Generation & Campaign Scaling","done":["PMax campaigns relaunched and live following spend increase on 23 March 2026; individual country-level structure maintained for clean Demand Gen and Search campaign alignment.","Demand Gen retargeting pilot for Nigeria confirmed: use GCLID IDs from demo sign-ups to build retargeting audience; request full list of unfunded demo/real account users from Ada. Target go-live: ~31 March 2026.","Brand keyword campaigns live for South Africa and Kenya (~2-3 phone bookings); budget to be doubled. Brazil campaign resubmitted following landing page update on 23 March 2026.","Google's minimum threshold: 15 conversions in 28 days for offline conversion imports; 30 conversions/month for enhanced conversions for leads. Campaigns not meeting this threshold flagged as a priority agenda item for 31 March 2026.","Demand Gen budget rule: ≥8% of total account spend (tipping point) or daily budget = generic search CPL × 2 × 10. Spend directed at funded countries only."]},{"title":"03-26/27 Google Ads Campaign Performance, Optimisation & Prediction Model Review","done":["Demand Gen campaigns launched in new territories (Zimbabwe, Colombia, Argentina, Mexico, Botswana, Uganda) on 25 March 2026 using English creatives; Spanish creatives to be sourced for LATAM markets.","Offline conversion reporting framework set up: daily scheduled Google Ads report (named 'Offline Imported Reports') saved in MCC and Google Drive, replacing manual screenshot process.","4,788 fresh lead line items reviewed from Prashant's model; 7 new leads added to the ≥70% bin (4 new + 3 repeating from previous batch) — appended to the existing Google Ads upload list.","72-hour prediction window ambiguity identified: does the model monitor 72 hours of post-sign-up activity, or list all sign-ups from the past 72 hours? Direct clarification from model owner (Isaiah) required.","Search term negation logic agreed: MCC non-brand search campaigns, last 30 days, all Virtual Sign-up conversions = zero AND cost > ~₹50 (derived from total spend ÷ virtual sign-ups × 3, rounded up as buffer)."]}]}]},{"label":"Analytics, Attribution & Tracking","emoji":"📡","bg":"#E8EAF6","fg":"#283593","count":45,"summary":"45 meetings. Analytics and attribution remained a persistent challenge. Meta over-attribution was accepted as expected behaviour; Bing Ads US conversion tracking broke in November 2025 and remained unresolved through March. Stape server-side tracking was upgraded to investigate Jamaica Gold FTD misattribution. The prediction model was found to over-predict by 3× due to a 90-day lag. Partner Hub V2 sign-up tracking showed a major funnel gap (33 affiliate IDs vs. 2,500 virtual sign-ups).","weeks":[{"month":"Nov 2025","week":"Week 1 (Nov 01-07)","count":2,"monthHead":"#145A32","monthLight":"#D5F5E3","commentary":"The data foundation is laid. GA4 is confirmed as the single source of truth in a session that also cleans the UTM taxonomy and reduces unassigned traffic sources. The AppsFlyer vs Firebase discussion settles the mobile attribution tool debate. These two sessions establish the measurement infrastructure that everything else will be built on — and whose gaps will become the crisis in March.","meetings":[{"title":"Appsflyer vs Firebase discussion","done":["`Cost per click (CPC)`","`Cost per install (CPI)`","`Attribution and tracking`","Participants confirmed they pay for cost per click (CPC), not cost per install (CPI)."]},{"title":"GA4 Alignment, UTM Taxonomy Cleanup, and Reducing Unassigned Sources","done":["`UTM taxonomy`","`Unassigned direct sources`","Discussed reworking UTM parameters to align with Google-recognised taxonomy for accurate GA4 reporting.","Current UTM structure is legacy, widely used across social since inception; changes risk impacting historical mapping."]}]},{"month":"Nov 2025","week":"Week 2 (Nov 08-14)","count":1,"monthHead":"#145A32","monthLight":"#D5F5E3","commentary":"A single GA4 deep-dive with Jatin covers the implementation details — event naming, conversion actions, and funnel tracking logic. The technical groundwork is being laid carefully.","meetings":[{"title":"Meeting with Jatin for GA4","done":["**Description**","The GA4 team requested aligning current UTM parameters to those recognised by Google Analytics 4 (GA4).","Goal: ensure data consistency between internal reporting and GA4, as GA4 is misattributing traffic due to non-standard UTMs.","Example: replace current parameters like `ppc social`, `ppc search`, and `paid search` with GA4-recognised terms such as `cpc` or `display`."]}]},{"month":"Nov 2025","week":"Week 4 (Nov 22-28)","count":1,"monthHead":"#145A32","monthLight":"#D5F5E3","commentary":"The most consequential tracking session of November: Multi-touch Attribution, MarTech, and Data Tracking. The MTA architecture is formally scoped — this is the origin of the attribution workstream that will remain incomplete through the March war room, 16 weeks later.","meetings":[{"title":"Multi-touch Attribution, MarTech, and Data Tracking","done":["Speaker 2 (Chris) has moved to a new role under Yoli, focusing on MarTech, and will be working more closely with Speaker 1 (Shivank).","Speaker 1 expressed that this move is positive, recalling previous discussions about attribution.","The biggest pain point is the lack of a functional multi-touch attribution system; attribution data is not yet usable for active spending decisions.","STAPE implementation and Conversion API setup are complete and are helping to shape ad spend at a keyword level on platforms like Google and Meta."]}]},{"month":"Dec 2025","week":"Week 1 (Dec 01-07)","count":3,"monthHead":"#6C3483","monthLight":"#F5EEF8","commentary":"Three sessions advance attribution architecture. The AI-first PPC Strategy session includes multi-touch attribution as a core component of the rule engine inputs. The Campaign Budget, V2 Migration, and GA4 session raises the first flag: V2 migration may break existing GA4 event tracking. Multi-Touch Attribution Vendor Negotiation explores external tools to accelerate implementation.","meetings":[{"title":"AI-first PPC Strategy — Dynamic Rule Engine, Budget Pacing, and Multi-touch Attribution","done":["Dynamic Rule Engine","Multi-touch Attribution","Augmentation vs Automation vs Agents","Budget pacing and allocation"]},{"title":"Campaign Budget, V2 Migration, and GA4","done":["The initial monthly experiments budget was 188K; a November buffer raised it to 277K, which was exceeded by 20,000.","December’s budget is 188K, but 80,000 has already been spent in the first four days; at this pace, the entire budget could be consumed within the first 10 days.","The team needs alignment on a clear experiments budget to prevent overspending.","A specific YouTube campaign for Thailand costs 800 per country per day."]},{"title":"Multi-Touch Attribution Tools and Vendor Negotiation","done":["Hyros was mentioned for multi-touch attribution but deemed unsuitable as it primarily serves e-commerce.","The discussion shifted to Segment, which the company previously used before switching to Rudderstack.","The switch occurred because Rudderstack was considered better and more cost-effective.","Reintroducing Segment would require a new architecture and is considered expensive."]}]},{"month":"Dec 2025","week":"Week 2 (Dec 08-14)","count":1,"monthHead":"#6C3483","monthLight":"#F5EEF8","commentary":"A single session: Growth Tribe, Event360, and AI Project Alignment. Event360 (Deriv's data pipeline) is introduced as the internal attribution infrastructure — it will carry the MTA data from GA4 into the reporting layer.","meetings":[{"title":"Growth Tribe, Event360, and AI Project Alignment","done":["**Function:** This team will handle routine business operations, including campaigns, paid media, social media, PR, and standard website tasks (e.g., new pages, blogs).","**Tribe:** The \"growth tribe\" will focus exclusively on building AI-related products to accelerate users to their first-time trade (FTT). The tribe's success will be measured by this specific goal.","**Event Kit:** To create a standard schema and a single source of truth for all user journey events (e.g., email, trading).","**Event Pipe:** To capture and connect user events across all platforms (web, mobile, MT5, C trader)."]}]},{"month":"Dec 2025","week":"Week 3 (Dec 15-21)","count":3,"monthHead":"#6C3483","monthLight":"#F5EEF8","commentary":"Three sessions converging on attribution methodology. Attribution Tracking and Data Analysis reviews current signal quality. Offline Conversions and Multi-touch Attribution begins scoping the GCLID-to-FTD offline conversion upload — a critical capability for Google VIP. Predictive Modelling for LTV and MTA links attribution data directly to the predictive model inputs.","meetings":[{"title":"Attribution Tracking and Data Analysis","done":["Discussion began on reviewing PPC (Pay-Per-Click) data, which isn’t directly accessible. The current month’s overall revenue reflects a loss.","For the date range December 17–19, current month revenue is 9.95, and the year-to-date figure differs.","PPC revenue contribution is estimated at 2.8%–5% of total deposit contribution.","Comparison of 315k versus 9.95 for the current month yields approximately 3.16%."]},{"title":"Offline Conversions and Multi-touch Attribution","done":["The meeting defined a conversion as a real account sign-up.","The user journey includes: website visit, demo sign-up, real account creation, and account funding.","Two reporting methods are used:","Ad spend versus deposits received (DOS)."]},{"title":"Predictive Modelling for LTV and MTA","done":["**Data Skewness:** The current model's accuracy is low because the deposit data is heavily skewed. A large majority of clients (80-90%) make small deposits, while a very small number of high-net-worth clients make large, six-digit deposits, significantly skewing the average. The model is currently too conservative, under-predicting the value of potential high-value clients.","**Proposed Solution:** A two-step model was suggested. First, it would classify a client as high-value or regular, and then make a deposit prediction within that category.","**Influential Features:** The current model identifies client residence, site update, and occupation as key predictors, while the acquisition channel is less influential. Adding more variables like device type (iOS vs. Android) could help, but their impact needs to be analysed.","**PPC Channel:** The initial analysis included all acquisition channels, but the primary goal is to optimise the PPC (Pay-Per-Click) channel. The team wants to identify which specific PPC sources (e.g., a particular TikTok ad) attract higher-value clients. The analysis can be rerun exclusively for PPC clients, provided the dataset is large enough for the model to learn effectively."]}]},{"month":"Dec 2025","week":"Week 4 (Dec 22-28)","count":4,"monthHead":"#6C3483","monthLight":"#F5EEF8","commentary":"Four sessions — the most attribution-intensive week of Q4. Hamza's two traffic source sessions are important: the first analyses which sources are driving the 'Others' category, and the second attempts to split Direct vs Organic within that category. The HubSpot CRM migration and attribution tracking session adds the CRM layer to the attribution chain. The PPC Automation and UTM Integrity session raises the first formal UTM quality concern.","meetings":[{"title":"Hamza Meeting- Data Tracking, PPC Channel, Google Analytics","done":["**Discussion:**","[Speaker 1] questioned the origin of tracked data and how it is attributed to the PPC (Pay-Per-Click) channel versus the direct channel.","[Speaker 2] explained they use Google Analytics, which derives data from UTM parameters (source, medium) in the URL.","When Google Analytics fails to capture data (null values), they also extract UTM parameters directly from the page URL on the user's first visit."]},{"title":"Hamza Meeting- Traffic Source Split for 'Others' Funnel – Direct vs Organic, Funnel Tracking","done":["Topic Title: Need for traffic source split within “Others” funnel","Description:","Current reporting shows “Others” contributing the highest volume (e.g., 1,95,000), with PPC affiliates the lowest.","The team hypothesises that a significant portion of “Others” is Direct; Organic is also included."]},{"title":"HubSpot CRM Migration, Retargeting Workflows, and Attribution Tracking","done":["Topic Title: AC/Fan Setting and Room Comfort (Brief)","Discussion around AC being off, fan on, and confusion about who controls AC.","Minor setup issue noted (black-and-white setting changed).","Not directly related to the core agenda but occurred at the start."]},{"title":"Team Meeting- PPC Automation, UTM Integrity, and Attribution Reliability","done":["AI rule engine","Campaign setup audit","Budget calculation and automation","STAPE server-side tracking"]}]},{"month":"Dec 2025","week":"Week 5 (Dec 29-31)","count":1,"monthHead":"#6C3483","monthLight":"#F5EEF8","commentary":"Assisted Conversions, Branded vs Non-Branded Traffic, and Display Strategy — a year-end session that introduces two new attribution complexity layers: assisted conversion credit for display, and separating branded search from non-branded in reporting.","meetings":[{"title":"Assisted Conversions, Branded vs Non-Branded Traffic, and Display Strategy","done":["`Assisted conversions`","`Branded vs non-branded traffic`","`Display advertising strategy`","Topic Title: Branded vs Non-Branded Traffic Analysis across Brokers"]}]},{"month":"Jan 2026","week":"Week 1 (Jan 01-07)","count":1,"monthHead":"#7D6608","monthLight":"#FEFCE8","commentary":"GCLID and Funded Account Attribution Discrepancies — the first explicit attribution discrepancy meeting of 2026. GCLID tracking (Google's click identifier used to connect ad clicks to offline conversions) is not matching funded account records. This gap will grow through February and become the war r
