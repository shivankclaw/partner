<style>
  :root {
    --navy: #0B2545; --navy2: #1A3C6B; --mid: #2E86C1;

  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

         background: var(--bg); color: var(--text); font-size: 14px; overflow-x: hidden; }

  /* TOP BAR */
  .topbar {
    background: var(--navy); color: #fff;
    padding: 12px 24px; display: flex; align-items: center; gap: 16px;

  .topbar-logo { font-size: 15px; font-weight: 800; letter-spacing: 0.5px; white-space: nowrap; }

  .topbar-stats { margin-left: auto; display: flex; gap: 10px; }
  .tstat { background: rgba(255,255,255,0.1); border-radius: 16px; padding: 3px 11px;
           font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.8); white-space: nowrap; }
  .tstat strong { color: #fff; }

  /* TABS in topbar */
  .view-tabs { display: flex; gap: 4px; margin-left: 20px; }
  .view-tab {
    background: rgba(255,255,255,0.1); border: none; color: rgba(255,255,255,0.65);
    padding: 5px 14px; font-size: 12px; font-weight: 600; border-radius: 16px;
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .view-tab:hover { background: rgba(255,255,255,0.18); color: #fff; }
  .view-tab.active { background: #7EC8E3; color: var(--navy); }

  /* LAYOUT */
  .layout { display: flex; min-height: calc(100vh - 50px); }

  /* SIDEBAR */
  .sidebar {
    width: var(--sidebar-w); flex-shrink: 0; background: var(--navy2);
    position: sticky; top: 50px; height: calc(100vh - 50px);
    overflow-y: auto; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.2) transparent;
  }
  .sidebar-header { padding: 14px 18px 8px; font-size: 10px; font-weight: 700;
                    letter-spacing: 1.2px; color: rgba(255,255,255,0.35); text-transform: uppercase; }
  .cat-btn {
    display: flex; align-items: center; gap: 10px; padding: 10px 18px;
    cursor: pointer; border: none; background: none; color: rgba(255,255,255,0.72);
    width: 100%; text-align: left; font-size: 12.5px; font-weight: 500;
    transition: background 0.15s, color 0.15s; border-left: 3px solid transparent;
  }
  .cat-btn:hover { background: rgba(255,255,255,0.07); color: #fff; }
  .cat-btn.active { background: rgba(255,255,255,0.12); color: #fff; border-left-color: #7EC8E3; }
  .cat-btn .cemoji { font-size: 16px; flex-shrink: 0; width: 22px; text-align: center; }
  .cat-btn .clabel { flex: 1; line-height: 1.3; }
  .cat-btn .cbadge { background: rgba(255,255,255,0.14); border-radius: 10px;
                     padding: 1px 7px; font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.85); flex-shrink: 0; }
  .cat-btn.active .cbadge { background: #7EC8E3; color: var(--navy); }

  /* MAIN */
  .main { flex: 1; min-width: 0; padding: 0; overflow: hidden; }

  /* ── PANEL VIEWS ── */
  .panel { display: none; }
  .panel.active { display: block; }

  /* SUMMARY PANEL */
  .summary-scroll { padding: 28px 32px; overflow-y: auto; height: calc(100vh - 50px); }

  /* HERO */
  .cat-hero {
    border-radius: var(--radius); margin-bottom: 20px;
    padding: 24px 28px; display: flex; align-items: flex-start; gap: 20px;
    border-left: 6px solid; box-shadow: var(--shadow);
  }
  .hero-emoji { font-size: 44px; flex-shrink: 0; }
  .hero-text { flex: 1; }
  .hero-label { font-size: 24px; font-weight: 800; margin-bottom: 3px; }
  .hero-tagline { font-size: 13px; line-height: 1.55; opacity: 0.75; margin-bottom: 14px; }
  .hero-stats { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
  .hero-stat { border-radius: 8px; padding: 8px 14px; font-size: 12px; }
  .hero-stat strong { display: block; font-size: 22px; font-weight: 800; line-height: 1; margin-bottom: 2px; }

  /* DEEP SUMMARY SECTIONS */
  .deep-summary { display: flex; flex-direction: column; gap: 0; margin-bottom: 28px; }
  .ds-section {
    background: var(--card); border: 1px solid var(--border);
    border-top: none; overflow: hidden;
  }
  .ds-section:first-child { border-radius: var(--radius) var(--radius) 0 0; border-top: 1px solid var(--border); }
  .ds-section:last-child { border-radius: 0 0 var(--radius) var(--radius); }
  .ds-head {
    padding: 13px 20px; font-weight: 700; font-size: 13px;
    cursor: pointer; display: flex; align-items: center; justify-content: space-between;
    transition: background 0.12s; user-select: none;

  .ds-head:hover { background: #F8FAFD; }
  .ds-head .ds-arr { color: var(--muted); transition: transform 0.2s; font-size: 11px; }
  .ds-section.open .ds-arr { transform: rotate(180deg); }
  .ds-body {
    display: none; padding: 0 20px 16px 20px;
    font-size: 13.5px; line-height: 1.78; color: #2C3E50;
  }
  .ds-section.open .ds-body { display: block; }
  .ds-body p + p { margin-top: 10px; }

  /* SECTION DIVIDER */
  .section-divider {
    font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    color: var(--muted); padding: 18px 0 10px; border-top: 1px solid var(--border);
    margin-top: 4px; margin-bottom: 4px;
  }

  /* WEEK-BY-WEEK PANEL */
  .weeks-scroll { padding: 28px 32px; overflow-y: auto; height: calc(100vh - 50px); }
  .month-group { margin-bottom: 6px; }
  .month-banner {
    border-radius: 8px 8px 0 0; padding: 9px 18px; font-weight: 700; font-size: 12px;
    color: #fff; letter-spacing: 0.6px; cursor: pointer; display: flex; align-items: center; gap: 10px;
    position: sticky; top: 0; z-index: 10;
  }
  .month-banner .mbadge { margin-left: auto; background: rgba(255,255,255,0.2); border-radius: 10px; padding: 1px 9px; font-size: 10px; }
  .month-banner .marrow { margin-left: 6px; transition: transform 0.2s; }
  .month-banner.collapsed .marrow { transform: rotate(-90deg); }
  .month-weeks { display: flex; flex-direction: column; gap: 0; }
  .month-weeks.hidden { display: none; }
  .week-card { background: var(--card); border: 1px solid var(--border); border-top: none; overflow: hidden; }
  .week-card:last-child { border-radius: 0 0 8px 8px; }
  .week-header { display: flex; align-items: center; gap: 0; cursor: pointer; }
  .wh-band { width: 6px; align-self: stretch; flex-shrink: 0; }
  .wh-label { padding: 12px 16px; font-weight: 700; font-size: 12px; flex: 1; }
  .wh-count { padding: 12px 14px; font-weight: 800; font-size: 17px; flex-shrink: 0; }
  .wh-arrow { padding: 12px 16px; color: var(--muted); font-size: 11px; flex-shrink: 0; transition: transform 0.2s; }
  .week-card.open .wh-arrow { transform: rotate(180deg); }
  .week-body { display: none; }
  .week-card.open .week-body { display: block; }
  .week-commentary { padding: 14px 20px 12px 22px; font-size: 13px; line-height: 1.72; color: #2C3E50; border-bottom: 1px solid var(--border); background: #FAFCFF; }
  .week-commentary.empty { color: var(--muted); font-style: italic; }
  .week-meetings { padding: 0 0 8px; }
  .meeting-row { display: grid; grid-template-columns: 28px 1fr; padding: 8px 20px 8px 22px; border-bottom: 1px solid #F0F4F8; gap: 10px; align-items: start; }
  .meeting-row:last-child { border-bottom: none; }
  .mr-num { color: var(--muted); font-size: 11px; font-weight: 700; padding-top: 2px; text-align: right; }
  .mr-title { font-weight: 700; font-size: 13px; color: var(--navy); margin-bottom: 3px; }
  .mr-done { font-size: 11px; color: #555; line-height: 1.55; }
  .mr-done ul { list-style: none; padding: 0; }
  .mr-done li { position: relative; padding-left: 12px; margin-bottom: 1px; }
  .mr-done li::before { content: "–"; position: absolute; left: 0; color: var(--muted); }
  .mr-toggle { background: none; border: none; color: var(--mid); font-size: 11px; font-weight: 600; cursor: pointer; padding: 2px 0; }

  /* PLACEHOLDER */
  .cat-placeholder { text-align: center; padding: 80px 40px; color: var(--muted); font-size: 15px; }
  .cat-placeholder .big { font-size: 48px; display: block; margin-bottom: 12px; }
</style>

<script>
const CATS = [{"label":"Partner & Affiliate","emoji":"🤝","bg":"#FFF8E1","fg":"#F57F17","count":81,"summary":"The dominant category by volume — 81 meetings across 21 weeks. Partner & Affiliate activity never stopped from Nov 2025 through Mar 2026, reflecting how central the partner channel was to Deriv's growth model. The arc runs from chaotic onboarding (Nov) → compliance auditing (Dec) → AI-first partner automation (Jan–Feb) → predictive model, geo expansion, and Amy AI-driven outreach activation (Mar).","weeks":[{"month":"Nov 2025","week":"Week 1 (Nov 01-07)","count":6,"monthHead":"#145A32","monthLight":"#D5F5E3","commentary":"The partner channel is formally activated. Six meetings in a single week establish the operating model: two Vince-and-Saurabh joint sessions define the division of responsibilities, a PPC partner task alignment session maps campaign ownership, a programmatic ads session with Match2One begins the display retargeting thread, and the partner activation/onboarding strategy formalises the framework for bringing new partners onto Google Ads. This is the foundational week for everything that follows in the partner channel.","meetings":[{"title":"Meeting With Vince & Saurabh","done":["The affiliate network is heavily reliant on a small number of top performers, with many affiliates inactive or generating minimal revenue. Residual income continues from casual introducers, but efforts are underway to attract new affiliates, including launching an affiliate e-book.","Lead generation faces quality issues: many leads are job seekers or seeking passive income, not genuine affiliates or traders. PPC campaigns target relevant interests but do not guarantee high-quality leads, and manual outreach to competitor affiliates is effective but resource-intensive.","There is a need to better educate and convert low-quality leads, with suggestions to segment and prioritise leads using targeted questions and workflows.","The team is testing a reduction in lead qualification questions from eight to two, aiming to improve sign-up rates and streamline follow-up for country managers. Concerns remain about balancing data collection with user experience."]},{"title":"PPC Partner Task Alignment","done":["Ask Manahil to add a new email to the nurture sequence for affiliate leads who could become clients.","Escalate the video revision request to Carl.","Have Fai check Facebook audience sizes in EU countries to select one for a test campaign.","Create a task card to plan a native ads strategy."]},{"title":"PPC Partner w-Vince & Yoli","done":["Keyword strategy for affiliate marketing e-book campaign","The campaign targets an affiliate marketing e-book focused on learning how to become an affiliate marketer, tools available, and related education topics. Total keywords identified are 31, including brand keyword, trading ebook, affiliate marketing courses, affiliate marketing tips and tricks, what is affiliate marketing, and how does it work.","The plan is to focus on phrase match and exact match in the initial phase; broad match is not preferred due to poor lead relevance (“not prominent affiliates”).","Event goal is affiliate sign-ups; optimization will center on sign-up conversions."]},{"title":"PPC Partner with w-Saurabh & Vince","done":["Organizational structure and responsibility for activation and acquisition","Marcelo is responsible for activation and acquisition; the squad falls under activation. Marcelo reports to Odette, who reports to Prakash, described as “the main one” and numbers-focused.","Prakash is heavily involved in the activation effort, aware of ongoing meetings and frustrations, and motivated to avoid poor outcomes.","Saurabh is introduced as the person focused on improving efficiency and productivity in the activation process, with Prakash depending on him to assess and drive improvements."]},{"title":"Partner Activation and Onboarding Strategies","done":["Current State of Partner Activation: An analysis of the current partner activation statistics, highlighting a significant imbalance between the number of acquired partners and those who are active and generating revenue.","Analysis of Activation Blockers: Technical and Process Issues: An identification of the primary blockers hindering partner activation, which are categorised into three sections: technical and process, content, and human. The initial focus is on the technical and process-related problems.","Debate: PPC vs. Organic Lead Activation and Country-Level Performance: A discussion exploring the reasons for the low activation rate of PPC leads. The conversation shifts from a channel-specific problem to a country-level performance issue.","Lead Segmentation and Qualification: There is a need to segment leads based on their qualification to provide a tailored approach. The current system treats all leads the same, regardless of their experience or intent, which affects the effectiveness of activation efforts."]},{"title":"Programmatic ads with Match2One","done":["**Brand Performance and Programmatic Spend Strategy:** This strategy focuses on using branding activities to generate measurable customer intent. The established industry benchmark for investment in programmatic advertising is 1% of a company's total annual revenue, which for a company with a ₹250 million revenue, translates to a target spend of ₹2.5 million annually.","**Competitor Analysis Overview:** This involves analysing top industry competitors (like eToro, Kraken) to benchmark performance. Key metrics include their 90-day programmatic ad spend (ranging from ₹1.1M to ₹8.5M) in high-value markets like the US and UK, their marketing channel mix (e.g., display, video), and their distinct creative messaging strategies, providing a roadmap for the client's own market positioning.","**Branded vs. Non-Branded Keyword Strategy:** This strategy differentiates marketing approaches based on company size. Mid-sized firms should focus on generating cheaper, branded keyword searches (e.g., \"investing platform the RIB\") to achieve profitable growth. In contrast, larger firms with bigger budgets can afford to compete for expensive, non-branded keywords (e.g., \"investing platform\") because their high brand visibility leads to better click-through rates, justifying the higher cost.","**Growth Strategy for The RIB:** The proposed plan is for The RIB, as a mid-sized company, to use programmatic branding to increase the volume of cheaper, brand-related keyword searches. This creates a synergy between branding (programmatic) and intent (search), improving the overall Return on Investment (ROI) and enabling scalable growth."]}]},{"month":"Nov 2025","week":"Week 2 (Nov 08-14)","count":5,"monthHead":"#145A32","monthLight":"#D5F5E3","commentary":"Affiliate attribution and funnel ownership are formally scoped — a conversation that will remain unresolved for months. The Zafluence meeting surfaces an invoice discrepancy, flagging early that influencer marketing lacks cost controls. The partner daily reporting dashboard is scoped, and the Google Ads partner programme framework is reviewed. Naomi's influencer and Telegram management discussion signals the channel is diversifying beyond search.","meetings":[{"title":"Affiliate Attribution, Activation-to-Deposit Conversion, and Funnel Ownership","done":["Discussed whether deposits made by partners into their own client accounts should be attributed to affiliate campaigns when there are no activations.","Current dashboard counts client deposits, inflating DOAs due to inclusion of partners’ own deposits.","Position: If there are no activations, deposits from partners who were already clients should not be attributed to the campaign.","If activations exist, count those activations; otherwise, exclude deposits from partner attribution."]},{"title":"Google Ads Partner Program","done":["**Description**","Create dedicated Google Ads child accounts for top partners (e.g., Platinum) instead of granting access to existing company accounts.","Enables partner-specific billing, logos, and other custom details rather than Deriv’s.","The advertiser name shown under \"About this advertiser\" will be the partner’s, as they will manage their own billing and verification—similar to agency-client setups."]},{"title":"Naomi catchup- Telegram, Influencer Marketing and Team Management","done":["**Telegram & Influencer Strategy:**","Speak to Raul about the Telegram post link strategy.","Create a post with a sign-up CTA for the Telegram channel.","Export the AI-generated competitor data into a Google Sheet and share it."]},{"title":"Partner PPC- Daily Reporting, Performance Tracking, and Dashboard","done":["**Description**","[Speaker 1] proposed a daily report (\"daily pulse\") for affiliates to monitor performance by region.","This would enable rapid optimisation if a region underperforms, as the current dashboard is slow and hard to view holistically.","The aim is a single, consolidated view of daily onboarded numbers."]},{"title":"Zafluence- Influencer Marketing, Cost Justification, and Invoice Discrepancy","done":["Two new UAE-based influencers were onboarded without prior approval: one at 17k USD and the other at 12k USD.","The agency proceeded due to no response, justifying the costs for posts across three individual platforms.","These influencers are treated as replacements, with costs covered under the existing 24k invoice as confirmed in the termination email.","The agency asserts the pricing is reasonable for licensed UAE influencers, citing an example of an influencer with 2,000 followers charging 50k per post."]}]},{"month":"Nov 2025","week":"Week 3 (Nov 15-21)","count":7,"monthHead":"#145A32","monthLight":"#D5F5E3","commentary":"The busiest partner week so far — seven meetings. The two Mauritius partner meetings (audit #2 and two formal partner sessions) are the most significant: they establish the compliance and performance baseline for the entire affiliate ecosystem. Prakash's affiliate strategy session frames the long-term growth vision. The partner ecosystem/paid advertising alignment sets the joint investment priorities heading into December. Partner issues meeting flags the first operational friction points.","meetings":[{"title":"Affiliate and Partner Feedback","done":["**What's Working Well (Strengths & Fuel):**","**Accessibility & Trust:** Low minimum deposits, a wide range of payment methods (crypto, payment agents), and quick withdrawals are highly valued and build user trust, especially in Nigeria.","**Partner Support & Motivation:** The commission structure (gold, platinum tiers) is consistent and well-regarded. Supportive country managers, partner rewards, sponsorships, and annual partner vacations/events (e.g., to Mauritius) are highly motivating.","**Product Development:** The development of new trading assets is fueling growth."]},{"title":"Mauritius Partner Audit #2","done":["Acquisition Channels: Customers are acquired via ads on Google, Facebook, and Telegram.","Communication Platforms: Leads are directed to Telegram or WhatsApp.","Content Delivery: Educational videos are published on YouTube, with links shared to clients.","Monetisation Goal: Drive clients to trade using a specific broker’s app."]},{"title":"Mauritius Partner Meeting #1","done":["Topic Title: Need for a dedicated app to scale the education and signals business","Description:","Speakers discussed building a proprietary app to host lessons, signals, and community tools.","App should enable lead capture (emails, phone numbers) and authentication to build a direct user list."]},{"title":"Mauritius Partner Meeting #2","done":["The primary traffic source is a Telegram channel, creating platform dependency risk if it shuts down.","A significant vulnerability is the lack of direct ownership of customer data (email IDs, phone numbers).","Proposal: build a proprietary app to capture user sign-ups and data directly, enabling push notifications for signals and announcements.","An app would improve tracking of user journeys (sign-up to deposit) and measurement of content/video impact."]},{"title":"Partner Ecosystem and Paid Advertising","done":["**Description:**","The event is an opportunity for partners to reset and look ahead to 2026, aiming to build an exceptionally strong partnership.","The current partner ecosystem is robust, with representation from many countries.","Three platinum partners were recognised: Samuel from Nigeria, another partner from Nigeria, and Solomon Search from Zambia."]},{"title":"Partner Issues","done":["Proof of income","Payment agents (P2P & Premium)","Partner retagging","Compliance guidance"]},{"title":"Prakash- Affiliate Marketing and Growth Strategy","done":["Debated CLV calculation using revenue vs deposits. Prashant proposed deposits (and deposit-withdrawal ratios) as a proxy for CLV.","Concerns that deposit-only is not a true CLV indicator; revenue must still factor in.","Need alignment on CLV definitions by country; gaps exist (e.g., Angola).","Affiliates require CLV/CAC guidance to plan budgets and targets per market."]}]},{"month":"Dec 2025","week":"Week 1 (Dec 01-07)","count":6,"monthHead":"#6C3483","monthLight":"#F5EEF8","commentary":"Six meetings mark the pivot from onboarding to execution. The Campaign Factory sessions generate affiliate campaign concepts with data-driven messaging — the first time creative is being developed specifically for the partner channel. Mauritius Partner Audit #3 closes the compliance review cycle. The influencer marketing resourcing session and AI Partner Buddy strategy discussion introduce the automation vision: an AI that manages routine influencer outreach.","meetings":[{"title":"Affiliate Marketing and Video Campaign Strategy","done":["**New Video Concepts:** The team reviewed a new set of six videos by Payel. Two new angles were developed: one for the same theme and one for a new theme.","**Old Videos:** It was suggested that the old videos could still be used for external campaigns to show the sign-up process. A proposal was made to A/B test them to check their Click-Through Rate (CTR).","**Revised Messaging:** The new messaging focuses on the benefits of the affiliate program.","**Video 1 (Registration):** A hook \"60% actually make money on the first week\" was proposed, pending verification."]},{"title":"Affiliate Program and Google Ads Strategy","done":["[ ] [Speaker 6] to provide an email clarification confirming that a child account with a separate payment profile and advertiser verification will display the partner's name, not Deriv's.","[ ] Test the affiliate program with a dummy MCC and one or two affiliates to start.","[ ] The Deriv team to develop a contract with the compliance team that outlines the terms, risks, and mandatory Google advertiser verification for affiliates.","[ ] Schedule a call with the compliance team to discuss the plan and get their input."]},{"title":"Campaign Factory- Affiliate Campaign Concepts, Data-Driven Messaging, Partner Support","done":["`Affiliate campaign concepts`","`Data-driven messaging`","`Partner support`","Topic Title: Human-led partnerships in the era of AI"]},{"title":"Campaign Factory- Affiliate Marketing Campaign Ideas and Brand Messaging","done":["Discussion opened with how simple it is to start as an affiliate.","Share a link in a WhatsApp group with friends and family to begin.","No minimum deposit or minimum active client requirements.","Commissions can be earned even if just one person joins and deposits the minimum $5."]},{"title":"Influencer Marketing Resourcing and AI Partner Buddy Strategy","done":["`Influencer Marketing`","`AI Integration`","`Activation and Retention`","`AI partner buddy`"]},{"title":"Mauritus Partner Audit #3","done":["Objective: Launch Telegram ads to attract users to a trading group.","Video content approach updated:","Original idea: $100 challenge.","Revised idea: “Follow my journey” showcasing growth from a $300 account."]}]},{"month":"Dec 2025","week":"Week 2 (Dec 08-14)","count":2,"monthHead":"#6C3483","monthLight":"#F5EEF8","commentary":"Just two meetings but both significant: the DerivOne platform discussion surfaces compliance risk in the influencer strategy, and the loyalty rewards/affiliate monetisation session begins the conversation about how partner-acquired traders are being incentivised to deposit. These are the seeds of the value measurement problem that will require a predictive model by March.","meetings":[{"title":"DerivOne Platform, Influencer Strategy, and Compliance Risk","done":["**Recruiting from the Customer Base:** A primary suggestion was to identify and recruit potential influencers and affiliates from the existing customer base. These users are already familiar with the product, KYC-verified, and can be easily paid and monitored.","**New Collaboration Model:** A model similar to Welltrade's was proposed, involving a small upfront payment to influencers, which they must then earn back through commissions. This serves as a low-risk test to identify high-performers.","**Promoting Personal Brands:** Affiliates should be encouraged to build their own brands (e.g., \"Naomi's Trading Academy\") and introduce Deriv as a tool they use, rather than directly promoting the company.","**Affiliate Reactivation:** The current process of reactivating only affiliates who have been inactive for 60 days was criticised for missing valuable, older partners who are still active online. A review of this strategy was recommended."]},{"title":"Loyalty Rewards, Affiliate Monetisation, and Ad Bidding Optimisation","done":["`Affiliate Program`","`Loyalty Rewards`","`Ad Technology and Bidding`","Topic Title: Loyalty rewards integrated with advertising"]}]},{"month":"Dec 2025","week":"Week 3 (Dec 15-21)","count":5,"monthHead":"#6C3483","monthLight":"#F5EEF8","commentary":"Five meetings covering the full breadth of the partner channel. The agency pitch for Truecaller ads and media buying explores the Indian market opportunity. M2O pixel implementation begins — Match2One's tracking infrastructure being installed into the funnel. HubSpot landing page funnel drop-off analysis reveals conversion leakage at the affiliate entry point. Match2One's AI-driven advertising and multi-touch attribution session is the first time partner and attribution work formally intersect.","meetings":[{"title":"Agency Pitch- Influencer Marketing, Truecaller ads and Media Buying for the Indian Market","done":["Marketing team based in Dubai; headquarters in Malaysia. Focus on paid media, performance marketing, and influencer marketing, mostly in-house.","Significant AI investment: 100 AI engineers hired in the past six months, aiming to be the first AI-driven online trading company.","Product suite includes forex, stocks, and crypto.","Primary geographies: Africa and South America; Asia is less dominant."]},{"title":"HubSpot Landing Page Funnel Drop-off Analysis and Affiliate Onboarding","done":["Funnel structure and drop-off tracking for the campaign","Lead journey: landing → sign-up → demo account → partner account.","Additional drop-off layers identified between each step.","System captures submissions to measure drop-off from landing to sign-up; affiliate completions indicate full journey completion."]},{"title":"M2O Pixel- Tag Manager & Pixel Implementation","done":["Speaker 2 was unsure about creating new tags and where to find the required code.","Speaker 3 clarified that new tags must be created because the old platform will be shut down in six to ten weeks; the old tags will need to be deleted later.","Speaker 3 shared a link with three new pixels:","Initialization pixel"]},{"title":"Match2One- AI-driven Advertising & Multi-touch Attribution","done":["**Description:**","The existing squad structure, including cross-functional and hybrid squads, will be phased out.","These squads will be transformed into AI-based products, designed to provide end-to-end solutions, aiming to automate tasks currently performed by teams.","**Conclusion:**"]},{"title":"Partner PPC Campaign testing, Landing page filter, Ad copy variables","done":["Campaign structure for testing landing pages and ad copies","Current approach: New landing pages are live in a few campaigns; ad copy tests are planned.","Debate on whether to run entirely new campaigns with new landing pages and creatives.","Concern about testing two variables (landing page + ad copy) at the same time."]}]},{"month":"Dec 2025","week":"Week 4 (Dec 22-28)","count":1,"monthHead":"#6C3483","monthLight":"#F5EEF8","commentary":"A single Saurabh meeting covering product strategy, affiliate marketing, and AI development — a sign the partner conversations are maturing from operational to strategic.","meetings":[{"title":"Saurabh- Product Strategy, Affiliate Marketing, and AI Development","done":["A packaging miscommunication with a supplier resulted in a shortfall: out of 5,000 bars ordered (in 500 boxes), 10 boxes (100 bars) will have incorrect silver packaging.","The supplier has offered a discount on the next order as compensation.","The product is scheduled for manufacturing by January 1st and is expected to arrive by mid-January (15th-20th).","On the administrative front, Speaker 2 has secured municipality approval to register the food product. A trade license and the municipality certificate (costing 20 dirhams directly, or 200 via an agency) are pending before sales can begin."]}]},{"month":"Dec 2025","week":"Partner PPC Weekly Meeting- 2026 Planning & Ad Platform Strategy - Summary.md","count":1,"monthHead":"#6C3483","monthLight":"#F5EEF8","commentary":"","meetings":[{"title":"Partner PPC Weekly Meeting- 2026 Planning & Ad Platform Strategy","done":["The primary agenda was reviewing priorities and budget for the 2026 partner program.","A prioritisation method was agreed upon, involving mapping all ongoing initiatives by impact versus effort. The initiatives fall under three categories: Ad Platform, Projects, and Process.","The team noted that monthly onboarding targets seem arbitrary, making it difficult to plan effectively. Clarity is needed on top-level business goals to inform strategy and budget.","**Meta Ads:**"]}]},{"month":"Dec 2025","week":"Yoli Weekly- Paid Acquisition, Influencer Marketing, and AI Projects - Summary.md","count":1,"monthHead":"#6C3483","monthLight":"#F5EEF8","commentary":"","meetings":[{"title":"Yoli Weekly- Paid Acquisition, Influencer Marketing, and AI Projects","done":["**Description**:","Discussed multiple AI initiatives, including cross-channel attribution and a chatbot.","Key project: dynamic budget pacing rules for Google and Meta campaigns, building on a prior concept with Prayash and Jatin.","System to leverage historical data to set rules (e.g., increasing bids during high-conversion windows by country) to optimise budget utilisation."]}]},{"month":"Jan 2026","week":"Week 1 (Jan 01-07)","count":4,"monthHead":"#7D6608","monthLight":"#FEFCE8","commentary":"The AI-driven partner pivot begins. Four meetings in the first week of January: AI-Driven Partner PPC Optimisation formally launches as a workstream. Two Vince sessions diagnose the marketing funnel inefficiencies that have been building since November — they surface structural issues in lead quality and conversion rates. The PPC partner AI-driven marketing strategy session scopes retargeting and predictive modelling for the partner channel.","meetings":[{"title":"AI-Driven Partner PPC Optimisation","done":["**Leadership Mandate:** Senior leader Rakshit is now directly involved in PPC and is concerned about stagnant growth. He perceives PPC as the primary lever the business can control to drive growth, unlike the affiliate channel, which depends on external partners. His core focus is on direct ROI, expecting a return of at least 40% to ensure profitability after factoring in all operational costs. An 18% return on the client side (from a $12 million spend yielding $14 million) is considered insufficient.","**Problem Statement:** The current manual approach to campaign optimisation is not scalable and fails to provide a competitive edge. Rakshit feels there is a lack of communication and visibility, leading to a perception that nothing is moving forward.","**AI as the Solution:** The strategic response is to become an \"AI-first PPC\" team. The goal is to build automated systems for campaign optimisation and use predictive analytics to improve efficiency. This will allow the team to scale operations without a linear increase in resources and focus on acquiring high-quality partners over sheer quantity.","**Defining Success:** The team acknowledges that for the partner programme, success cannot be measured simply by a direct dollar-in, dollar-out metric like the client side. The primary output to be optimised for is the acquisition of more *activated* affiliates who bring in valuable clients, which will be the core metric for the AI models."]},{"title":"PPC Partner AI-Driven Marketing Strategy- Scoping Optimisation, Retargeting, and Predictive Modelling","done":["Adds an email but doesn't click \"sign up.\"","Clicks \"sign up\" but fails to verify their email.","Verifies their email but doesn't proceed to fill in personal details.","Fails to accept the terms of use."]},{"title":"Vince- Strategic Approach to Addressing Business Inefficiencies","done":[]},{"title":"Vince-Analysis of Marketing Funnel Inefficiencies and Strategic Remediation Plan","done":["**Email & Phone Verification:** 5,000 users were lost at this stage. Common issues included sessions ending abruptly after country selection, 4DP failures, invalid or expired OTP codes, and a \"redirection loop\" in the social sign-up process that left users stuck.","**Password Setup:** Another 5,000 users dropped off while setting a password. The primary cause was an unresponsive \"submit\" button, leading users to abandon the process after 30-60 seconds.","**Personal Details:** Following password setup, 814 more users were lost.","**KYC Process:** This stage saw a drop-off of 6,000 users. Major friction points included users skipping essential steps and a non-functional date-of-birth calendar picker, which prevented them from proceeding. Users who encounter these issues typically abandon the process and do not return."]}]},{"month":"Jan 2026","week":"Week 2 (Jan 08-14)","count":2,"monthHead":"#7D6608","monthLight":"#FEFCE8","commentary":"Two important management meetings: Naomi's AI rule engine/quarterly metrics session aligns on performance benchmarks, and Prakash's session covering Naomi's performance and partner acquisition flags the dual challenge of team capability and pipeline growth simultaneously.","meetings":[{"title":"Naomi Meeting- AI Rule Engine, Quarterly Performance Metrics and Scalable Influencer Programme","done":["Two parallel tracks are identified:","Product: building the AI rule engine/predictive model.","Functional: maintaining and using business metrics.","The current AI component will serve as a rule engine/middle layer that will eventually “tell” the team what is happening, but it is not ready yet."]},{"title":"Prakash- Naomi's Performance, AI Project & Partner Acquisition","done":["Shivank discussed Naomi's low morale, stemming from her belief that Prakash has a negative perception of her. Naomi admitted to Shivank that she sometimes struggles with receiving feedback and reporting back on its implementation.","Prakash clarified that he doesn't hold grudges and noted Naomi's defensive communication style might lead to her being excluded. He had previously advised her to focus on problem-solving over justification.","Shivank reported widespread uncertainty and low morale among the team following recent transitions, highlighting a lack of clarity about the new dynamics between Prakash and Yuli.","He stressed that junior and senior members feel disengaged and need direct communication from leadership to understand the new direction and feel empowered, especially regarding the AI-first strategy. Face-to-face communication has proven more effective than documents alone."]}]},{"month":"Jan 2026","week":"Week 3 (Jan 15-21)","count":8,"monthHead":"#7D6608","monthLight":"#FEFCE8","commentary":"The most productive partner week of the entire period — eight meetings. The AI agent for influencer recruitment session formalises 'Amy' as the influencer automation tool. Bill Match2One's session on assisted conversions and FTD retargeting strategy resolves the attribution gap for programmatic. The Partner War Room prep begins. Saurabh's mission-based system and AI dashboard session defines the partner intelligence infrastructure. Vince's weekly covers customer retention and the affiliate tournament concept.","meetings":[{"title":"01-20 Meeting- AI Agent for Influencer Recruitment, Audience Compliance, Negotiation, and Regional Scaling","done":["Topic Title: Overview of AI Agent for Influencer Recruitment","The presenter introduced an AI agent (“Amy”) that automates influencer sourcing, outreach, and negotiation.","Data sources include scraping Instagram, TikTok, and YouTube; vetting via vision and text analysis to categorise creators.","The agent can build large prospect lists (e.g., 250) and conduct personalised outreach in local languages."]},{"title":"01-21 Weekly Meeting- Partner Top-Ups, Persona-Led Campaigns, and Unified Performance Dashboard","done":["Topic Title: Partner-led ad campaigns and top-up mechanism","Allow partners to run their own campaigns with a top-up in a product account to fund ads and attract creators.","Prakash suggested attempting implementation within this week; feasibility and timelines questioned.","Harsh was present during the discussion."]},{"title":"Bill Match2One- Programmatic Advertising, Assisted Conversions, and FTD Retargeting Strategy","done":["Programmatic spend and assisted conversion tracking","Match2One campaigns are being scaled to capture assisted conversions across PPC, affiliates, and owned channels.","Historical competitor analysis: mid-size brokers spend ~1% of annual revenue on programmatic; Kraken spent ~2.3–3.5%, likely due to going public.","Mid-size players buy ~78% brand keywords; leaders buy ~30% brand plus a larger non-brand share to capture expensive generic terms."]},{"title":"Naomi- Partner War Room Prep & AI Dashboard Strategy","done":["Shivank Shankar announced a \"war room\" for partners scheduled for next week, initially believing it was focused on partner integration conversions.","Naomi clarified that a recent town hall by Prakash mentioned the war room was for the broader affiliate journey, not specifically for conversion or PPC.","Shivank suggested preparing a comprehensive list of issues and demands to be fixed for the entire partner journey, regardless of the war room's exact focus.","Key issues to investigate include:"]},{"title":"Partner PPC- Real-time Retargeting & Affiliate Performance Strategy","done":["**Initial Vendor Discussion:** The team had a call with Inuit about real-time retargeting for users abandoning the affiliate sign-up process. Inuit's capabilities were limited to dynamic creatives and could not help identify the precise abandonment triggers, leading the team to develop its own strategy.","**Proposed Strategy:** Payal presented a strategy to use predictive modelling and AI to retarget users who show intent but drop off during the sign-up journey. The goal is to analyse the affiliate user journey (from survey to partner status) using BI dashboard data to pinpoint high drop-off stages.","**Defining \"Real-Time\" and Audience Exclusion:** A discussion arose about the definition of \"real-time,\" with the group agreeing on a necessary delay to avoid retargeting users who might return shortly after leaving. It was also agreed that a broad exclusion window (e.g., 30-90 days) is needed to avoid retargeting newly converted affiliates.","**User Segmentation:** The strategy involves using predictive modelling to segment abandoning users into high, medium, and low intent categories. This allows for cost-efficient bidding and tailored messaging for each group based on signals like pixel data, user behaviour, and device history."]},{"title":"Saurabh- Mission-Based System, AI Dashboard, and Project Planning","done":["Saurabh expressed confusion about the meeting's direction and objectives, noting the initial discussions were not very clear.","Shivank Shankar mentioned a \"war room\" created by Prakash which has become chaotic, involving \"silver pods\" and numbers. This is happening alongside ongoing H1 and H2 Malaysia projects.","The discussion shifted to defining a clear \"mission\". Shivank suggested the mission should specify a goal, like achieving \"30% new funders\".","The proposed system should provide a recommendation (approve/disapprove) and learn from these judgements."]},{"title":"Vince Weekly Meeting- Customer Retention, Affiliate Programme & Market Analysis","done":["The discussion focused on a quadrant analysis of 23 countries, segmenting them based on deposit volume and conversion rates.","**Tier 1 (High Value Crisis Markets):** These have the lowest active users but the highest average deposits. The goal is to return to Q1-Q3 conversion rates, which dropped in Q4 due to a Google campaign, and increase them by 5-8%.","**Tier 2 (Mid-Value Growth Markets):** These countries have strong conversion rates. The objective is to restore performance to Q1 levels and increase it by 5-10% for the bottom three countries in this tier.","**Tier 3 (Volume Markets with Quality Issues):** Countries like Uganda, Benin, and Nigeria have high user numbers but low average deposits. The plan is to use nurture campaigns to improve conversion rates and encourage repeat funding."]},{"title":"Yoli- Summit Deliverables, AI Engineer Resourcing, Ad OS, Compliance for Synthetic Campaigns, Partner Resource Hub, Affiliate Tournaments, and Amy Assistant Optimisation","done":["Summit deliverables and working-session approach","Refer to Saurabh’s document outlining expected outcomes for each function by end of week at the summit.","Required outputs: inventory of manual work to eliminate in H2, clear timelines, replacement systems/vehicles, enabling systems, prioritisation logic, commitments.","Squads must commit to launches that systematise growth; cover data usage, sequencing, dependencies, ownership, tracking, accountability."]}]},{"month":"Jan 2026","week":"Week 4 (Jan 22-28)","count":3,"monthHead":"#7D6608","monthLight":"#FEFCE8","commentary":"Three focused sessions: Amy (the AI influencer agent) specification is formalised. The affiliate ROAS, reverse attribution, and Partners Hub V2 migration session brings the platform migration into the partner context for the first time — a flag that V2 will disrupt partner tracking. The AI co-pilot and advertising optimisation session advances the Advertising OS integration for partners.","meetings":[{"title":"01-22 Meeting- AI Agent -Amy- for Influencer Partnerships","done":["\"Amy\" is an AI agent that scales influencer partnerships globally by automating manual coordination with creators.","For new campaigns (e.g., in LATAM), the system populates a creator list 5x the target to offset non-responses.","Amy conducts initial outreach with personalised emails in local languages (e.g., Spanish, Portuguese for LATAM).","It manages back-and-forth communication, answers questions, and negotiates offers (paid, affiliate, or hybrid) on the user's behalf."]},{"title":"01-23 Weekly Meeting- Ad Click-to-Visitor Discrepancy, Affiliate ROAS, Reverse Attribution, and Partners Hub V2 Migration","done":["Topic Title: Ad click-to-visitor discrepancy analysis","Description:","Observed ~50% drop-off from ad clicks to visitors; higher than acceptable 20–30%.","Possible reasons: page load delays, cookies not loading, GA counting rules (time-on-page), targeting issues."]},{"title":"01-26 Weekly Meeting- AI Co-pilot, Advertising Optimisation, and Partner Platforms","done":["A POC for an AI co-pilot agent has been developed to provide a dashboard view of pod performance.","To improve the agent’s output, it needs marketing data about efforts on different assets to add context on strong areas, gaps, and repeatable successes (e.g., repeating Silver’s success for Crystal).","Alignment is required to source this marketing data, as it is not readily available.","Prakash suggested using this data to add context to notifications, which could increase customer engagement and trading."]}]},{"month":"Feb 2026","week":"Week 2 (Feb 08-14)","count":6,"monthHead":"#922B21","monthLight":"#FDEDEC","commentary":"Six meetings — the most partner-intensive week of February. Naomi runs three sessions covering partner V2 funnel, WhatsApp lead nurturing pilot, retargeting, and dashboard alignment. The Partner Ad OS review defines API integrations and campaign intelligence tools for the partner dashboard. Prakash's Partner Toolkit session maps the full Google Ads onboarding flow for partners. Vince's investment and lead conversion session reveals the partner channel is underperforming on deposit conversion.","meetings":[{"title":"Naomi- Partner Onboarding, Custom Messaging, and Campaign Automation","done":["**V2 Partner Journey Flow**: The team discussed the V2 sign-up flow, where partners are directly onboarded instead of becoming leads first. Naomi requested drop-off data for each screen to identify where users abandon the process. It was suggested to request this from Bilal, with Hamza creating the dashboard. Data collected during sign-up (social media links, address, survey answers) could be used for a predictive modeling project. For now, the current flow is deemed acceptable, and a discussion on a one-tap Google sign-up has been parked.","**Testing Social Sign-ups**: There is uncertainty whether social sign-ups redirect users to the Traders Hub or Partners Hub. The team decided to ask Munse from the QA team to test this.","**PPC Partner Leads Communication Flow**: Currently, all new partners receive the same generic WhatsApp and email messages. A specific link in these communications, intended to guide users on \"how to use the referral link effectively,\" lacks a URL shortener and UTM parameters, making it untrackable. The team decided to create a separate, custom communication flow for PPC partner leads to enable better tracking and segmentation.","**Critique of Current Messaging**: The existing automated messaging for survey leads was criticised as sarcastic and condescending."]},{"title":"Naomi- Partner V2 Funnel, WhatsApp Lead Nurturing Pilot, Retargeting, and Dashboard Alignment","done":["Technical health check and V2 sign-up flow","Naomi flagged the need to review technical health checks and the V2 sign-up flow.","They plan to discuss technical health checks tomorrow due to time constraints.","Conclusion: Technical health checks deferred to the next meeting."]},{"title":"Naomi- Team Performance, ROI, and Affiliate Strategy","done":["Naomi expressed concern about the team's long-term viability, viewing the current situation as a \"gamble\" that is at risk if issues are not addressed immediately.","A key problem is that the process for getting deposits is not under the team's control, yet the spending falls under their responsibility.","Shivank Shankar reviewed spending, noting that approximately 50-70k was spent without a corresponding return. The goal is to scale spending while achieving a positive ROAS, which is not currently happening.","A key objective is to map all team activities to show a return on investment."]},{"title":"Partner Ad OS review- AI Marketing Dashboard, API Integrations & Campaign Intelligence Tools","done":["Speaker 3 (intern) has been onboarded and has been pulling data for the last six months, currently resolving errors related to date ranges and security fixes.","The project is fetching responses from APIs using cost-effective models for testing, which is currently causing slow load times.","Immediate focus is on the \"Strategic Brain\" component using mock data, while API integration for live data is pending.","The scope has shifted from campaign metrics to campaign setup criteria (e.g., landing page functionality, naming conventions, tracking setup)."]},{"title":"Prakash Partner Tool Kit- Partners Hub PPC Flow, Google Ads Onboarding, and API Integration Priorities","done":["Topic Title: Partner Toolkits PPC flow within Partners Hub","Prakash proposed a flow for partner toolkits to empower affiliates to run PPC ads under the main account.","Partners would sign up as sub-accounts, choose creatives/banners, and run ads with recommended guidance.","Benefits highlighted: visibility for the company, partner empowerment, and education via performance metrics."]},{"title":"Vince Meeting- Investment, Business Strategy, Lead Conversion","done":["**Market Discussion:** Speaker 1 mentioned being up approximately two million on Bitcoin and Ethereum from a short position, and noted a correction in Bitcoin's price. The hope is for Bitcoin to reach fifty thousand and gold to reach ten, which would be favourable for their options.","**Dubai Real Estate:** The group discussed the significant increase in property prices, with a 100 sq meter apartment costing around three million dollars. A two-bedroom that cost 60-65k after COVID now costs around 100k. Speaker 1 shared a negative experience with buying property, and Shivank Shankar attributed the aggressive behaviour of rental agents to high market demand.","**Competitive Analysis:** The discussion covered competitors like Vantage (noted for aggressive marketing), TopFX, Finauto, and Xness. Xness is reportedly a large-scale Russian-run operation with significant wealth, property investments, and government connections in China. They are allegedly allowing clients to deposit funds without completing KYC procedures, requiring it only for withdrawals. Capital.com's founder, Victor, was also mentioned for his efforts to build his brand in Abu Dhabi.","**Financials vs. Synthetics:** The company is strategically shifting to grow its financials business to compensate for declining revenue from the synthetics business, which is dropping by 2-3% monthly. Historically, synthetics were prioritised for high profits, with financials treated as a \"loss leader.\" Now, with affiliates also splitting their synthetic business, growing the financials side is critical. The \"gold bitcoin spread\" was mentioned as a focus area."]}]},{"month":"Feb 2026","week":"Week 3 (Feb 15-21)","count":4,"monthHead":"#922B21","monthLight":"#FDEDEC","commentary":"Four meetings covering the full partner technology stack: affiliate activation and MCC admin controls, client vs partner PPC strategy separation, partner KPIs and data pipeline setup, and the AI dashboard explanation session for the partner team. The MCC admin controls discussion is significant — it means individual partner accounts will have automated spend guardrails.","meetings":[{"title":"02-17 Team Sync- Affiliate Activation, Predictive Remarketing, and MCC Admin Controls","done":["Topic Title: Early indicators for user activation and funding","Create early signals to predict activation/funding for newly onboarded users without long waits.","Use predictive model’s daily probability outputs by campaign as early indicators; expect improvement within 1–2 weeks as Google/Meta optimise.","Explore tracking “copy referral link” clicks as a proxy for intent at campaign-level; confirm feasibility with Bilal."]},{"title":"02-17 Weekly Meeting- Client vs. Partner PPC Strategy & Data Integration","done":["**Partner PPC**: The main issue is not acquiring affiliates, but identifying affiliates who bring in active clients. The team discussed using \"Amy\" (AI/Tool) to bridge this gap and motivate affiliates to perform.","**Client PPC**: The key challenge is converting sign-ups into active traders (depositing money). Currently, leads are brought to the \"shopping mall\" (Deriv platform), but there is no visibility into their actions inside (the \"Black Box\").","**Goal**: Shift focus from lead generation to revenue generation and understanding lead quality (e.g., who trades Synthetic vs. Forex).","**Misalignment**: Shivank expressed that building an automated dashboard based on stakeholder requirements does not address the core business problems above."]},{"title":"02-20 Project Meeting- Partner-Side KPIs, Search Campaign Automation, and Data Pipeline Setup","done":["Topic Title: Objectives and KPIs for partner-side optimisation","Partner-side success paths include both affiliate deposits and client deposits; both are valid outcomes.","Key partner-side KPIs: deposits returning and number of activated affiliates (affiliates bringing clients).","Avoid using client-side data like POA/KYC for partner-side optimisation."]},{"title":"Partner AI dashboard explaination","done":["Naomi introduced a dashboard to self-optimise campaigns and automate asset creation from text to banners.","The system will detect campaign setup errors affecting performance and send instant notifications.","The dashboard will integrate all campaigns from Google and Meta, with regional filters available.","Saurabh outlined four key project milestones:"]}]},{"month":"Feb 2026","week":"Week 4 (Feb 22-28)","count":6,"monthHead":"#922B21","monthLight":"#FDEDEC","commentary":"Six meetings — all pointing toward the same problem: the partner channel needs its own predictive capability. Amy automation for partner engagement is progressed. The trader conversion improvement session maps the partner-to-deposit funnel gaps. Partner analytics data access and journey mapping defines the architecture for partner-level attribution. The strategic partnership meeting with Google on conversion optimisation directly addresses the VIP recovery workstream through the partner lens.","meetings":[{"title":"02-25 Meeting- Partner PPC Activation Strategy and AI-Assisted Engagement","done":["Topic Title: Partner PPC overview and current process","Partner PPC runs ads on Google and Meta to acquire affiliates/partners.","Affiliates sign up via Partners Hub and connect to CRM tools (uncertain: Dynamic Works/Sell Export/HubSpot).","Onboarding means the affiliate signs up, provides details, and receives a referral link."]},{"title":"02-25 Meeting- Trader Conversion Improvement, Campaign Optimisation, and Partner-Side Plan with “Amy” Automation","done":["Improving conversion across the trader journey (signup to deposit)","Lead volume and traffic quality are strong, but conversion is weak.","Plan to deploy a DME/“Amy” system to nudge users through demo creation, KYC/POA completion, deposit, and first trade.","“Amy” will also alert internal teams about pending approvals and automate parts of the approval workflow."]},{"title":"02-27 Meeting- Partner Analytics Data Access and Journey Mapping Architecture","done":["The team discussed data access required to build an analytics solution for partner and client journey mapping.","Primary data sources identified: Google Ads, Dynamic Works, MyAffiliate, CRO database tables, and internal user databases.","**Key tables required:**","User Profile (client identity, UTM parameters, dates, lifetime stats)"]},{"title":"02-27 Strategic Partnership Meeting- Google Ads - Deriv Marketing Investment & Conversion Optimisation","done":["The main shareholder explained that marketing spend has been reduced not due to lack of funds, but because of internal IT bottlenecks preventing proper lead conversion","Current payback period is twelve months, but the target is sixty days; once this is tightened, investment will increase significantly","Example given: If spending five million monthly with sixty-day payback, the money revolves and compounds rapidly","Google acknowledged the reduced spend and committed to keeping Deriv in their premium programme despite lower investment levels"]},{"title":"Mahantesh- PPC Ownership Alignment, Affiliate Activation, and Revenue Payback Strategy","done":["Topic Title: PPC ownership and scope alignment across client and partner sides","Krishji suggested involving Harsh to improve visibility and optimise PPC funds; requested overlap with Harsh and current projects.","Shivank clarified ongoing PPC efforts with Mahantesh; proposed mapping the scope and defining clear POCs.","Ongoing confusion on PPC decision ownership; Kavin acknowledged but is not engaging; clarity from the client partner side is lacking."]},{"title":"Naomi- Affiliate Conversion Funnel & Predictive Modelling","done":["The main business problem identified is the drop-off of affiliates between the 'on-boarded' and 'active' stages.","The journey for both PPC and non-PPC on-boarded affiliates is the same, using the same partner toolkit.","The core issue is understanding why on-boarded affiliates do not become active. There is a lack of visibility or a \"black box\" in this part of the user journey.","To understand the drop-off, it would be necessary to check the events of every affiliate, but there are no events tracked on Dynamic Works to see if they shared links."]}]},{"month":"Mar 2026","week":"Week 1 (Mar 01-07)","count":2,"monthHead":"#0E6655","monthLight":"#E8F8F5","commentary":"Two clean-up sessions: MCC account setup for Forex (a new geo/product expansion) and partner-side event tracking implementation. The MCC setup is significant — it represents new partner markets being brought onto the infrastructure with proper tracking from day one, unlike legacy partners.","meetings":[{"title":"03-06 Meeting- Partner MCC Account Setup and Affiliate Configuration","done":["The manager account is set up under an email ID and currently shows an in-progress status.","There is a proposal to rename it to reflect \"Partner MCC.\"","No notification has been received yet, although one participant confirmed receiving an email.","The account ID needs to be copied and sent to Michelle so it can be linked to her portfolio."]},{"title":"03-06 Meeting- Partner-Side Event Tracking Implementation for PPC Campaigns","done":["Naomi explained the goal of replicating the client-side event tracking process (used for events like real account creation, first deposit, first trade) for the partner side","Partner-side events identified initially include: partner account creation, activated affiliate, deposited affiliate, and deposited clients from the affiliate","Nuzi had previously indicated offline events are possible and created templates, which were shared with State (confirmed implementation is possible from State's side)","The technical challenge involves determining how to pass events and backend integration, and validating if proposed events are feasible"]}]},{"month":"Mar 2026","week":"Week 2 (Mar 08-14)","count":5,"monthHead":"#0E6655","monthLight":"#E8F8F5","commentary":"Five meetings converging on the partner prediction model. BI data access issues are blocking the model build. Google Ads policy violations in partner MCC accounts require compliance intervention. The Asia markets MCC account setup and affiliate partnership strategy marks geographic expansion. The influencer campaign closure and PPC partner strategy optimisation review closes the first formal influencer programme cycle. The partner prediction model data requirements and timeline meeting is the critical path item.","meetings":[{"title":"03-09 Meeting- BI Data Access Issues, PTC Resource Allocation & Partner Prediction Model","done":["Both participants watched the India-New Zealand cricket match over the weekend.","[Shivank Shankar] used streaming websites with alternative servers and had to switch servers due to buffering issues.","[Mahantesh] tried multiple methods, including YouTube channels with live commentary and dummy players.","The match was described as one-sided and less entertaining."]},{"title":"03-10 Meeting- Google Ads Policy Violations and MCC Account Setup for Forex Campaigns","done":["Speaker 2 created a landing page and ran Google Ads campaigns using both direct links and landing page links","Google Ads flagged the campaigns due to policy violations regarding Forex and investment-related content, requiring additional documentation","The violation was specifically for \"complex speculative financial policy\"","Speaker 2 attempted to modify the ad and promoted a different affiliate programme, but the campaign was later deleted"]},{"title":"03-11 Meeting- MCC Account Setup and Affiliate Partnership Strategy for Asia Markets","done":["The MCC (My Client Centre) account has been successfully set up with a partner affiliate.","The partner is the second-largest affiliate for Asia, based in Pakistan.","A call was held yesterday with the partner to review previous issues and the account setup.","**Previous Issues Identified:**"]},{"title":"03-11 Partnership Marketing Review Meeting- Influencer Campaign Closure and PPC Partner Strategy Optimization","done":["Team reviewed influencer marketing effectiveness for converting influencers into partners or generating client sign-ups","**Campaign Data Analysis (November-January initial review):**","Total sign-ups from influencer campaigns: 13","Top performing influencer contributed 4 sign-ups"]},{"title":"03-11 Project Meeting- Partner Prediction Model Development – Data Requirements and Timeline","done":["Shivank explained the need for partner-side PPC data access to build a prediction model.","Yingqiang indicated that Mahantesh has all required datasets.","The team discussed the specific data needed from Mahantesh to begin model development.","Amir's input was requested to help define data requirements clearly."]}]},{"month":"Mar 2026","week":"Week 3 (Mar 15-21)","count":5,"monthHead":"#0E6655","monthLight":"#E8F8F5","commentary":"Five meetings in the final week. Nef (Philippines) onboarding formally opens the Southeast Asia affiliate market. The Jan-Feb affiliate marketing report review closes the retrospective cycle. Three strategy alignment sessions — marketing strategy + predictive modelling, partner predictive model + ad platform integration, and campaign document review + affiliate compliance — converge on a single question: can the partner channel be made self-optimising before Q2? The predictive model is now the central priority.","meetings":[{"title":"03-17 Onboarding Meeting- Deriv Google Ads Affiliate Support Programme — Nef (Philippines)","done":["Speaker 1 (Joyce/Jenny — Deriv, Partner Manager/Host)","Naomi (Deriv, PPC/Paid Media Manager)","Shivank Shankar (Deriv, Performance Marketing Manager)","Speaker 4 / Nef (Affiliate Partner, Philippines — since 2023)"]},{"title":"03-17 Working Session- Affiliate Marketing Report Review – Jan-Feb Document Finalisation","done":["The impact of AI-assisted audience refinement on Meta, which intentionally reduced top-of-funnel volume in exchange for higher-quality leads, resulting in doubled activations and an improvement in first-time deposits (from zero to six).","Uncertainty around whether March would sustain the same performance trajectory, leading to a decision to present numbers factually without forward-looking claims.","Structural edits to the document — reducing cohort chart length to six months, clarifying H1 vs H2 timelines for key projects, condensing overly verbose sections, and improving labelling (e.g., \"partner real-time retargeting,\" cohort notation).","A discussion around the PPC Partner/Google Ads credit initiative for affiliates, with debate over appropriate terminology (ultimately leaning toward \"Trial Project\") and how to measure its impact via active affiliates using the service."]},{"title":"03-18 Alignment Meeting- Marketing Strategy, Predictive Modelling & Partner Outreach","done":["**Review and monitor partner educational content quality**","**Coordinate with Naomi to obtain PPC partner pre-sign-up classification data**","**Integrate email and WhatsApp outreach; evaluate Telegram feasibility**","**Arrange a similar alignment session for 2026-03-19**"]},{"title":"03-18 Strategy Sync- Partner Predictive Model Development & Ad Platform Integration","done":["**Verify Google Sheet Feed Integration with Ishan/Isaiah**","**Coordinate Fresh Data Request from Mahantesh**","**Review Model Feature Document from Amit**","Speaker 1 (Prashant) raised that, given public holidays on Friday 20 March 2026 and Monday 23 March 2026, the regular Monday call should be rescheduled to **Tuesday 24 March 2026**."]},{"title":"03-18 Working Session- Campaign Strategy Document Review & Affiliate Compliance Concerns","done":["**Merge and finalise the document**","**Remove flagged content items**","Remove the paused campaigns data pulled in erroneously","Remove the summary section"]}]},{"month":"Mar 2026","week":"Week 4 (Mar 22-28)","count":2,"monthHead":"#0E6655","monthLight":"#E8F8F5","commentary":"Partner activation and AI-driven outreach take centre stage. The PTC (Partner Trading Channel) ecosystem strategy is launched — tagging demo clients under existing affiliate accounts to drive activation, with Vietnam identified as the initial regional focus. Amy AI is formally integrated into the partner outreach pipeline, establishing WhatsApp as the live outreach channel and defining a three-part framework (who/what/how) for partner engagement. Production bugs on Partner Hub V2 are flagged as misattributing failures to Amy.","meetings":[{"title":"03-25 PTC Partner Reactivation, Data Access & Campaign Operations","done":["PTC ecosystem strategy launched: tag existing demo/PPC clients under existing affiliate partner accounts to drive activation without recruiting new partners.","Vietnam identified as the strongest regional cluster in existing lead data — recommended as the pilot country for affiliate reactivation.","Data access blockers escalated: GCLID data missing even for Facebook clients; Shivank to approach David directly to identify the relevant BigQuery dataset.","Dashboard dependency removed: Shivank to build an internal self-owned dashboard from a raw data dump, eliminating recurring dependency on the external team.","RORF/RER metric confusion identified — team needs to align on whether it is tracked and under what terminology before further requests are made."]},{"title":"03-26/27 Partners PPC & Amy AI Integration – Activation, Outreach & Dashboard Alignment","done":["PPC campaigns are accountable for lead acquisition (sign-ups, DOIs) only — deposit rates and trading activity are downstream outcomes outside campaign control.","Amy (Partners instance) positioned to bridge the activation gap: partners who sign up but do not proceed further are nudged through a goal-based state machine toward active status.","Three-part outbound framework agreed: (1) who to reach out to, (2) what content to use, (3) how Amy should behave. Mapping document to be delivered by 30 March 2026.","WhatsApp is the live outreach channel; Telegram expected operational by 3 April 2026; email blocked pending a dedicated Amy email address.","ME/Africa-Kenya prioritised for targeted outbound activation — goal of demonstrating at least one end-to-end Amy-assisted partner activation by the week of 30 March 2026.","Serious Partner Hub V2 production bugs (staging redirects, broken profile loading, broken commission tracking) are being misattributed to Amy, damaging its KPI standing — urgent escalation required."]}]}]},{"label":"AI & Predictive Modelling","emoji":"🤖","bg":"#EDE7F6","fg":"#4527A0","count":58,"summary":"58 meetings across 21 weeks. AI and predictive modelling evolved from theoretical planning to daily operational reality. The arc: data infrastructure exploration (Oct–Nov) → LTV model architecture (Dec–Jan) → V1 model training (Feb) → daily FTD prediction deployment and Google Ads offline conversion integration (Mar). By late March 2026, the model was generating daily CSVs of high-probability depositors for campaign optimisation, with a 3× over-prediction gap flagged for recalibration.","weeks":[{"month":"Mar 2026","week":"Week 4 (Mar 22-28)","count":4,"monthHead":"#0E6655","monthLight":"#E8F8F5","commentary":"The prediction model moves from strategy to daily operations. After months of planning, the FTD prediction model is operationalised with a daily CSV handover workflow — 8 high-probability leads (70%+ threshold) identified from the first 3,000-user run. Technical reviews surface a key ambiguity (72-hour feature window vs. 72-hour sign-up window) requiring clarification from the model owner. V2 LTV model development is blocked by data access issues: AIDA bot data is found to be contaminated with demo deposits, and a formal stakeholder escalation (tagging Karim, Max, Jatin, David) is the agreed path forward.","meetings":[{"title":"03-23 Strategy: FTD Prediction Model, Campaign Launch & Stakeholder Alignment","done":["FTD prediction model run identified only 4 campaigns (out of 100+) with 30+ FTDs/month — the minimum required by Google for primary FTD bidding optimisation.","Model purpose extended beyond FTD campaign eligibility: it should also drive budget allocation decisions for campaigns unlikely to hit the threshold, improving ROAS and DOAS.","CEO (Ashutosh) acknowledged understanding the team's strategy for the first time after receiving a simplified email on 21 March 2026, effectively halting pressure to outsource to external agencies.","Model to run on 25 March and 28 March 2026 to generate the first data cycle; V2 data stitching issue to be resolved in a 24 March stakeholder alignment meeting.","Weekly experiment cadence agreed: launch one campaign type per week (PMax, Search, freemium), assess results, and iterate. 177 enabled campaigns currently live."]},{"title":"03-24 V2 LTV Model Data Access Blockers & Stakeholder Escalation","done":["AIDA bot data found to be untrustworthy for model training: demo deposits are being counted as real deposits, inflating figures (e.g., 13K-40K deposits vs. realistic maximum of ~2,000).","V2 LTV model framework is complete (built on V1 data) but all financial/trading columns return zero for V2 — requires BI/Dealing team support to complete the mapping.","Formal channel escalation agreed: message to tag Karim, Max, Jatin, and David simultaneously (not sequentially) to prevent responsibility being passed around.","Obtaining the SQL query rather than a raw CSV is the preferred path — allows data lineage validation before model training begins.","Follow-up call scheduled for 25 March 2026 with all named stakeholders to maintain momentum regardless of whether a written response is received."]},{"title":"03-25 Google Ads Campaign Optimisation & Predictive LTV Model Review","done":["3,443 V2 sign-ups identified via GCLID from the past three days; 8 users in the ≥70% probability bin and 35 users at 30%+ threshold — small but sufficient for directional campaign-level mapping.","Model accuracy reviewed: 50-70% bin showed 58% actual rate (reasonable); 20-30% bin showed 2.46% actual rate — demonstrating the model's varying accuracy across probability bins.","Model runs purely on user profile attributes, not campaign source — campaign-level segmentation not required at this stage; Google's dashboard will surface campaign-level funded conversion data automatically.","Incremental budget increases (10-15%) approved for underperforming/constrained campaigns; launching new campaigns identified as the path to scaling beyond current saturation levels.","Model evaluation window: 3-4 weeks before a go/no-go decision. Daily model refresh confirmed as the target cadence; manual CSV upload continues until automation is established."]},{"title":"03-26 Lead Prediction Model — Daily Deployment & Workflow Alignment","done":["Model operationalised: Speaker 1 will share daily prediction CSV (all users + high-probability ≥70% filtered) as an interim measure starting 26 March 2026.","Output format confirmed: Binary User ID, GCLID, projected conversion time, probability of deposit score. Two CSVs per run — all users and high-probability subset.","Model does not require daily retraining — it is a trained static model; periodic recalibration (roughly monthly) is sufficient as user behaviour evolves.","Priority automation path: contact Jatin to replicate the prior GCP-based automated pipeline (scheduled query → Google Sheet) used for a similar dataset circa May 2025.","Predicted vs. actual tracking exercise agreed: compare predictions against actual funded users every 2-3 weeks to track model accuracy over time."]}]},{"month":"Oct 2025","week":"Week 5 (Oct 29-31)","count":1,"monthHead":"#1B4F72","monthLight":"#D6EAF8","commentary":"The very first meeting of the entire period. The AI root cause analysis tool frames the ambition: use AI to diagnose campaign underperformance automatically. In a two-meeting opening week, this sits alongside the Google Branding Business Case — together they establish the two strategic bets that will run for six months: AI-first operations and Google as the primary channel partner.","meetings":[{"title":"AI root cause analysis tool","done":["The ultimate goal is to create a comprehensive tool that integrates PPC data with user behavior metrics like CPA, CPL, and CLV.","A key feature planned for the future is a chat-based interface that allows users to ask questions about the data using natural language prompts.","This tool will serve as a central solution, consolidating various dashboards and enabling deeper analysis of campaign performance and the users acquired through them.","**Short-Term Goal:** The immediate objective is to gain campaign-level insights for optimization. This includes understanding keyword trends to make tactical adjustments within campaigns."]}]},{"month":"Nov 2025","week":"Week 1 (Nov 01-07)","count":1,"monthHead":"#145A32","monthLight":"#D5F5E3","commentary":"Predictive modelling enters the conversation formally. A single session but with significant downstream consequence — it establishes that the team wants a model that can predict FTD likelihood before leads convert, not just report on past performance.","meetings":[{"title":"Predictive Modeling discussion","done":["The current CLTV calculation uses ARPU (Average Revenue Per User) multiplied by average customer lifespan.","[Speaker 3] proposed changing the target variable from revenue to deposits, noting marketing can influence deposits but not trading revenue.","The proposed new metric is the average lifetime balance a customer maintains (deposits minus withdrawals).","[Speaker 1] noted that a key stakeholder, Rakshit, previously advocated for a revenue-based model to assess profitability against Cost Per Acquisition (CPA)."]}]},{"month":"Nov 2025","week":"Week 2 (Nov 08-14)","count":1,"monthHead":"#145A32","monthLight":"#D5F5E3","commentary":"AMY surfaces for the first time — Naomi's campaign management and AI strategy session introduces the concept of an AI-assisted campaign manager. This is the first prototype of what will eventually become the full AI agent architecture.","meetings":[{"title":"Naomi- AMY, Campaign Management and Strategy","done":["**Description**:","Reviewed partner program budget: October spend was 36k out of a 49k budget.","Monthly spending must be monitored to stay within allocation.","Discussed the document for “affiliate account for partner on Google Ads”; Speaker 2 added a new reference tab."]}]},{"month":"Dec 2025","week":"Week 1 (Dec 01-07)","count":2,"monthHead":"#6C3483","monthLight":"#F5EEF8","commentary":"Two critical technical sessions define the AI architecture. The PPC Rule Engine, CPA-CPL Controls, and DOS-LTV Mapping session is the most technically dense meeting of the quarter — it establishes the mathematical relationship between cost-per-lead, deposit-over-spend, and lifetime value that will underpin the entire Advertising OS. The PMAX Campaign and Measurement Strategy session integrates Google's campaign type into the AI framework.","meetings":[{"title":"PMAX Campaign and Measurement Strategy","done":["**Description**:","Reviewed current campaign pacing: target is 70%, current is 51%.","Total spend is 1.3 million; still below target with a few weeks remaining.","Nigeria is under-pacing: daily spend 2.4k vs target 7k."]},{"title":"PPC Rule Engine, CPA-CPL Controls, and DOS-LTV Mapping","done":["Topic Title: Clarifying the need for rule engines versus platform auto-bidding","Discussion on whether ad platforms’ auto-bidding and AI should handle optimisation when conversion APIs and backend data are connected.","Concern that relying solely on platform auto-bid may not control CPA/CPL targets effectively; hence scripts/rule engines are still used by many companies.","Platforms can maximise conversions without respecting target CPA unless explicitly constrained."]}]},{"month":"Dec 2025","week":"Week 2 (Dec 08-14)","count":5,"monthHead":"#6C3483","monthLight":"#F5EEF8","commentary":"Five AI meetings in the busiest week of the period. The Acceleration of AI and Market Signals session sets the strategic direction. Agentic AI explores autonomous campaign management. The Rule Engine/Budget Pacing/Optimiser Integration session advances the technical architecture. Aswathi's Digital Advertising and Investment Strategy pitch makes the commercial case for AI-first PPC. The Campaign Strategy/Video/YouTube Performance session tests AI-generated creative optimisation.","meetings":[{"title":"Acceleration of AI and Market Signals","done":["Topic Title: Acceleration of AI and Market Signals","The speaker contrasts Google’s valuation growth from $2.3 trillion at a $193 stock price last year to ~\\$4 trillion at a ~$318 closing price, adding ~$2 trillion in 12 months.","Emphasises rapid technological change across industries, not only AI.","Illustrates scale: a million seconds ≈ 11 days; a billion ≈ 31 years; a trillion ≈ 31,000 years."]},{"title":"Agentic AI","done":["Topic Title: Session introduction and speaker overview","Description:","[Speaker 1] introduced Adrian and highlighted his report on transformational strategies.","Mentioned Adrian’s interests (biking, mountaineering) as networking trivia."]},{"title":"Aswathi's Pitch- Digital Advertising and Investment Strategy","done":["**Display & In-Game Ads:** Past campaigns on networks like InMobi resulted in many \"bad installs,\" highlighting the need for better filtering.","**Bing Ads:** Currently used on a small scale, Bing provides high-quality leads who are more likely to deposit. However, it has become significantly more compliance-heavy for forex ads, making it difficult to scale.","**Brave Browser Ads:** A past page takeover campaign performed poorly, as the user base is typically there to avoid ads.","**YouTube Pre-roll Ads:** The team runs these for partners but not directly for clients. Buying ad space on specific, relevant channels was considered but noted as potentially expensive."]},{"title":"Campaign Strategy, Video Content, and YouTube Performance","done":["Speaker 1 needs one more week to finalise contract details.","The goal is to sort everything out to start at least one pilot test.","The team plans to create a presentation to gain goodwill from Chris.","The presentation will focus on how the company can better use Google's products together."]},{"title":"Rule Engine, Budget Pacing, and Optimiser Integration Strategy","done":["Speaker 1 raised concerns about redundancy between the rule generator, intent identifier, and the executor (budget pacer).","The team discussed the capability of machine learning to generate information and introduce tools to implement rules.","Speaker 2 suggested sequencing the development, possibly breaking it down into modules, starting with the rule engine as a single module over one to three months.","It was noted that the team did not identify the rule generator requirement earlier, which has caused some current overla
