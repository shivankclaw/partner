k cuts her off and dismisses her input, while being more receptive to others, like a colleague named Connor.","She believes this is a recurring issue where Shivank doesn't listen to or understand her, causing a build-up of frustration.","Shivank defended his actions, stating he felt \"attacked\" by the way Naomi addressed him in an open office space."]},{"title":"02-17 Team Alignment Meeting- Document Review, Communication Norms, and Compensation Concerns","done":["Topic Title: Review of consolidated document and alignment on priorities","Shivank prepared a document summarising all past ideas and discussions to review alignment, status, and prioritisation.","Requested a step-by-step review to decide what to drop or push.","The review stalled due to escalating interpersonal conflict."]}]},{"month":"Feb 2026","week":"Week 4 (Feb 22-28)","count":5,"monthHead":"#922B21","monthLight":"#FDEDEC","commentary":"Five sessions — the most HR-intensive week of the entire period. Layoff Strategy, WhatsApp Marketing, and Trading Discussion confirms that headcount reduction is being actively planned. Two Organisational Restructuring sessions formalise the new team structure. Chris G's PPC Role Alignment and Funnel Strategy session repositions Chris's role in the post-restructure org. Ishank's Salary Increment Misalignment and HR Escalation is a formal grievance — the restructure is creating compensation disputes.","meetings":[{"title":"02-27 Meeting- Layoff Strategy, WhatsApp Marketing Campaign Setup, and Trading Discussion","done":["Recent performance reviews resulted in three categories: bonus with increment, bonus only, and neither","Employees receiving nothing expected to leave within one or two weeks","Plan exists to reduce headcount by additional 300 employees over coming quarters","**Discussion on timing:** Debate whether to execute layoffs in one go versus gradual approach over multiple quarters"]},{"title":"02-27 Meeting- Organisational Restructuring, AI Integration, and Team Retention Strategy","done":["The organisation is executing a major workforce reduction, targeting 300–400 employees for exit","Layoffs span multiple teams, including Growth Marketing, Trading, and Talent Development","Recent departures include Gemma and others across various functions","LinkedIn licences have been discontinued, and office closures are in progress as cost-cutting measures"]},{"title":"02-27 Strategy Meeting- Growth Marketing, AI Personalisation, and Organisational Restructuring at Deriv","done":["Shivank presented a framework mapping growth levers across acquisition, conversion, and retention","**Acquisition channels discussed:**","Paid search (Google) – monitoring engagement as an early indicator instead of waiting for full ROI","Social media (Meta) – currently running basic hygiene campaigns only; not a major focus"]},{"title":"Chris G- PPC Role Alignment, Funnel Strategy, and Trigger Hub for Deposit Conversion","done":["Shivank is recording meetings to generate transcripts for improved recall and context management.","Objective: build a structured “memory” to prevent context loss across many parallel tasks.","Speaker 2 raised concerns about errors caused by multitasking and cognitive overload.","Both acknowledged the difficulty of managing multiple information streams across regions and time zones."]},{"title":"Ishank- Salary Increment Misalignment and HR Escalation Strategy","done":["Topic Title: Salary increment concerns and alignment with prior expectations","Ishank received an 8.3% increment and feels it is very low.","The earlier understanding in India was that a higher increment would follow after probation.","There is a lack of visibility on HR processes; HRBP or HR may need to be involved."]}]},{"month":"Mar 2026","week":"Week 1 (Mar 01-07)","count":3,"monthHead":"#0E6655","monthLight":"#E8F8F5","commentary":"Three sessions as HR meets performance management. AI Transformation, Performance Management, and Return to Office Policy is the broadest organisational session of March — all three threads (AI adoption, performance standards, and RTO policy) are addressed together. The Dashboard Development, Campaign Optimisation, and Job Security session confirms job security discussions are embedded in regular work sessions. The Quarterly Planning and Deriv Account Performance Review session frames Q1–Q2 targets in a people context.","meetings":[{"title":"03-05 Meeting- AI Transformation, Performance Management, and Return to Office Policy","done":["The organisation is undergoing a significant culture shift requiring everyone to align with AI-driven ways of working","Previous bulk AI learning sessions are being discontinued as those interested have already joined; remaining individuals must take initiative independently","The V2 team demonstrated capability by delivering a product in three weeks, setting a new organisational pace","The organisation cannot operate at two different speeds; all teams must adapt to the accelerated AI-driven workflow"]},{"title":"03-05 Meeting- Dashboard Development, Campaign Optimisation, and Job Security Discussion","done":["Shivank is building an interim dashboard view to bridge the gap between raw data and final analytics dashboard requirements","Current approach involves manually downloading CSV files from multiple sources on a weekly/monthly basis to create visualizations","The goal is to automatically flag campaigns with poor performance metrics (DOS, conversion rate) rather than requiring manual analysis","**Technical challenges identified:**"]},{"title":"03-05 Quarterly Planning Meeting- Deriv Account Performance Review and Q1-Q2 Target Discussion","done":["Zainab is under pressure to secure a viable quarterly target for Deriv.","Current end-of-quarter projection shows a significant gap: target is $3.48 million, current spend is $1.01 million, with a prediction of reaching $1.49 million.","Q1 target may be adjusted to approximately $2.7 million based on seasonality and quarterly decline trends.","A VIP deal is signed with momentum to spend, but Google policy approval delays are blocking campaign launches."]}]},{"month":"Mar 2026","week":"Week 2 (Mar 08-14)","count":1,"monthHead":"#0E6655","monthLight":"#E8F8F5","commentary":"Partner Acquisition Strategy Meeting — Performance Review and Report Structure. A performance review session that uses partner acquisition KPIs as the performance evidence framework, linking individual accountability to commercial outcomes.","meetings":[{"title":"03-13 Partner Acquisition Strategy Meeting- Performance Review and Report Structure","done":["Discussion focused on reviewing and refining a partner acquisition report intended for external stakeholders.","The report was generated using the AI tool Claude, which analysed Google Drive documents and Slack channels to compile numbers, ongoing projects, blockers, and working elements.","Key challenge identified: determining the narrative and story the report should convey to prospective partners and external channel readers.","Debate on whether to wait until March to send a quarterly report instead of a January–February report."]}]},{"month":"Mar 2026","week":"Week 3 (Mar 15-21)","count":3,"monthHead":"#0E6655","monthLight":"#E8F8F5","commentary":"Three final sessions. The Strategic Meeting on Google Ads Performance Review and Predictive Model Roadmap includes Prakash meeting preparation — managing up before a key executive review. The two Strategy Meetings on AI Model Optimisation and PPC Performance Review frame performance accountability in the context of the models that are now live. People performance is now measured against AI-assisted benchmarks.","meetings":[{"title":"03-16 Strategic Meeting- Google Ads Performance Review, Predictive Model Roadmap & Prakash Meeting Preparation","done":["**Preparing for the upcoming in-person meeting with Prakash** (Head of Growth at Deriv/Dorio), to be framed as a candid \"reset conversation\" — honest and forward-looking, not an ultimatum — focused on the predictive model as the central unlock for improved performance.","**Diagnosing and addressing the root causes of declining Google Ads performance**, including falling search revenue, stagnating funded client numbers, missing GCLIDs, ad disapprovals, and a significant Q1 VIP deal spend shortfall.","Search revenue has declined significantly quarter-on-quarter from approximately 1.5M the prior quarter.","Funded client numbers are currently ~2–2.5K/month against a year-end target of 14K/month."]},{"title":"03-18 Strategy Meeting- AI Model Optimisation & Affiliate Funnel Performance Review","done":["**AI Model Development:** The current work covers only the optimisation layer of a much larger AI initiative. Additional components — quality checks, compliance, competitor research, and banner creative automation — are in the pipeline but deprioritised until the core optimisation is stable.","**Retargeting & Amy Integration:** Retargeting was discussed as dependent on event tracking (Events 360 on the partner side). However, Mahantesh reportedly has a flow in place for partners that may partially address this. Amy (an AI/automation tool) was identified as a potential consolidation point for retargeting and activation nudges across the funnel.","**Country Rationalisation Strategy:** A deliberate cut-down of underperforming countries was identified as a key strategic decision that contributed to improved active affiliate and DOS numbers. This needs to be highlighted in the report.","**Q4 vs. Q1 Narrative:** The team agreed that the report needs a clear introductory narrative showing how Q4 (October–December) saw growth in Leads and Onboarded, while Activation remained flat, leading to the strategic pivot now underway in Q1."]},{"title":"03-18 Strategy Meeting- PPC Performance Review & Predictive Modelling Roadmap","done":["The impact of implementing **Conversion API (via Stripe)** in November, which significantly increased real account sign-ups but failed to produce a corresponding uplift in funded accounts.","The core issue identified: Google's ad optimisation algorithm requires a minimum of **30 conversion signals per campaign** to effectively optimise. Funded accounts had insufficient volume and a long conversion lag (1–3 months), preventing timely signal feedback to Google.","The solution being deployed: a **Predictive Modelling engine** that generates pseudo-funded conversion signals within **24–48 hours** of a demo sign-up, enabling Google to optimise towards funded users far more efficiently.","The predictive model is going live on the client side on **19 March 2026** (the day following this meeting)."]}]}]},{"label":"Dashboard & Reporting","emoji":"📊","bg":"#F3E5F5","fg":"#4A148C","count":27,"summary":"24 meetings across 11 weeks — sparse early, then explosive in March. Virtually absent Oct–Dec, first significant cluster in Jan Week 3–4 (dashboard architecture), then Mar Weeks 1–3 become the most dashboard-intensive period of the entire six months. The campaign performance dashboard was the primary deliverable of March.","weeks":[{"month":"Nov 2025","week":"Week 1 (Nov 01-07)","count":1,"monthHead":"#145A32","monthLight":"#D5F5E3","commentary":"A single session: HOD Scorecard Alignment on Paid Branding Impact. This establishes the concept of a head-of-department scorecard that tracks brand campaign contribution to performance metrics — not vanity metrics. The seed of what will become the full campaign performance dashboard six months later.","meetings":[{"title":"HOD Scorecard Alignment on Paid branding impact","done":["`HOD scorecard`","`paid branding`","`PPC performance`","The team discussed how to represent paid branding and PPC within the HOD scorecard."]}]},{"month":"Dec 2025","week":"Week 3 (Dec 15-21)","count":1,"monthHead":"#6C3483","monthLight":"#F5EEF8","commentary":"CAPI Dashboard to Plan Strategy — a one-session discussion on how the Conversion API dashboard will visualise server-side conversion data. An early design conversation that will feed into the March dashboard sprint.","meetings":[{"title":"CAPI- Dashboard to plan strategy","done":["Topic Title: Need for visibility across campaign funnel stages","Team lacks a consolidated view of campaign counts across funnel buckets: Demo, Real Account, and New Funded (FTD).","Desire to track week-by-week and month-by-month movement: demo → real → new funded per campaign and child account.","Aim to plan timelines (e.g., 3–6 months) for regions to reach thresholds based on current spend and performance."]}]},{"month":"Dec 2025","week":"PPC Weekly Meeting- Brand Impression Share Analysis, Budget Alignment, and Tracking Roadmap - Summary.md","count":1,"monthHead":"#6C3483","monthLight":"#F5EEF8","commentary":"","meetings":[{"title":"PPC Weekly Meeting- Brand Impression Share Analysis, Budget Alignment, and Tracking Roadmap","done":["Topic Title: Clarifying scope of impression share analysis (Brand vs Non-brand)","The team discussed confusion about whether the analysis is for brand or non-brand keywords.","Objective clarified: measure the impact of increasing brand campaign search impression share on lower-funnel metrics (real account creation and cost).","Current data: the analysis so far is Google-only; Bing was mentioned but is not included in the exercise."]}]},{"month":"Jan 2026","week":"Week 3 (Jan 15-21)","count":3,"monthHead":"#7D6608","monthLight":"#FEFCE8","commentary":"Three foundational dashboard sessions. AI-Driven Ad Campaign Optimisation Dashboard, Accuracy Guardrails, and Data Integrations defines the technical architecture. Dashboard Go-Live, Milestones, AI Dependencies, and Optimisation Strategy sets the delivery roadmap. Conor's Email Strategy and AI Dashboard Plans adds CRM integration to the dashboard scope. This week is when the dashboard transitions from 'idea' to 'project with milestones'.","meetings":[{"title":"01-21 Meeting- AI-Driven Ad Campaign Optimisation Dashboard, Accuracy Guardrails, and Data Integrations","done":["The team discussed building an AI-assisted dashboard to review and act on campaign-level suggestions.","Core concept: The AI proposes changes (e.g., increase budget); the team approves or rejects with detailed comments to teach the system.","Aim is to achieve >90–95% suggestion accuracy before allowing autonomous changes.","Four key tabs/views proposed: metrics overview, AI suggestions, accuracy tracker by region/campaign, and change history with impact tracking."]},{"title":"01-21 Project Meeting- Dashboard Go-Live, Milestones, AI Dependencies, and Optimisation Strategy","done":["Topic Title: Project Milestones and Naming","The team discussed defining milestones and their status (e.g., “FTT” with “active trading volume”).","There was uncertainty about final names; suggestion to lock names later and use placeholders for now.","“Activated” was proposed as a clear milestone status label."]},{"title":"Conor- Conversion Funnel Optimisation, Email Strategy, and AI Dashboard Plans","done":["Topic Title: Upcoming team review on conversion drop-offs and user journey recordings","Plan to conduct a focused 1-hour session by region to review user journeys, drop-offs, and conversion issues.","Team will analyse post-hoc recordings, capture insights, and consolidate findings in a single Google Sheet.","Insights to be shared on the channel for faster identification and escalation to product."]}]},{"month":"Jan 2026","week":"Week 4 (Jan 22-28)","count":3,"monthHead":"#7D6608","monthLight":"#FEFCE8","commentary":"Three build sessions in close succession. AI-Driven Ads Optimisation Dashboard, Health Checks, and API Integrations advances the technical build. The companion 'Dashboard and AI Optimisation' session refines the recommendation logic. The Global Marketing Dashboard, AI Recommendations, Compliance, and Optimisation Logs session expands the scope to global (all regions) and adds compliance logging — a requirement for Google policy audits.","meetings":[{"title":"01-22 Meeting- AI-Driven Ads Optimisation Dashboard, Health Checks, and API Integrations","done":["AI-driven ads optimisation dashboard overview","Payal presented a unified dashboard for monitoring and optimising Meta and Google ads.","Features include region selection, date filters, and month-on-month/week-on-week comparisons.","Live metrics monitor provides a platform overview without logging into ad platforms."]},{"title":"01-22 Meeting- Dashboard and AI Optimisation","done":["**Efficiency Matrix & Website Impact:**","A view was discussed to display the impact and efficiency of various websites, visualised as dots on a matrix.","The matrix aims to identify high-impact websites; a region-wise filter was suggested.","**AI's Role in Optimisation:**"]},{"title":"01-23 Weekly Meeting- Global Marketing Dashboard, AI Recommendations, Compliance, and Optimisation Logs","done":["Topic Title: Global Dashboard Overview and Workflow","The global dashboard includes Overview, Account Health, AI Recommendations, and Campaign Metrics.","AI recommends actions; users can discard, provide feedback, or accept to queue and deploy to platforms after configuration.","Date ranges and regions are customisable (monthly, weekly, etc.)."]}]},{"month":"Feb 2026","week":"Week 2 (Feb 08-14)","count":1,"monthHead":"#922B21","monthLight":"#FDEDEC","commentary":"PPC Client Team Update — PPC Strategy, Attribution Alignment, and Performance Reporting. A client-facing (partner-side) reporting session that reveals the dashboard is being used externally as well as internally, creating a second requirements set.","meetings":[{"title":"PPC Client Team Update- PPC Strategy, Attribution Alignment, and Performance Reporting","done":["Team morale and clarity for new members","Newer members are uncertain; openness surfaces issues to all levels, creating transparency and anxiety.","Establish clearer communication and a structured cadence (e.g., weekly recorded updates) to build short-term confidence.","Prioritise actions that deliver results now; improve update sharing and visibility via dashboards and short videos."]}]},{"month":"Feb 2026","week":"Week 3 (Feb 15-21)","count":1,"monthHead":"#922B21","monthLight":"#FDEDEC","commentary":"Client AI Dashboard Explanation — a knowledge transfer session showing partners how to interpret and use the AI dashboard outputs. The tool is live and being onboarded.","meetings":[{"title":"Client AI dashboard explaination","done":["Topic Title: Project scope and objectives (AI Insights and Automation/Advertising OS)","Two parallel tracks: AI Insights from existing PPC data, and Automation (Advertising OS/ad brain) for campaign optimisation.","Automation focus: bids, budgets, keywords, ad copies — starting with Google Ads, later connecting to multiple ad platforms.","Milestones mapped to functional “blocks”: Attribution Engine, AI Rule Engine, Budget Allocation Engine, integration to ad platforms."]}]},{"month":"Feb 2026","week":"Week 4 (Feb 22-28)","count":1,"monthHead":"#922B21","monthLight":"#FDEDEC","commentary":"Microsoft Ads Attribution, ROS Targets, and Cohort Reporting — a session that adds Microsoft Ads as a tracked channel and introduces cohort-level reporting (grouping traders by acquisition month) to measure LTV by cohort, not just aggregate.","meetings":[{"title":"02-23 Weekly Meeting- Microsoft Ads Attribution, ROS Targets, and Cohort Reporting","done":["Shift in attribution focus and campaign strategy","Management has moved focus from DOS to ROS across platforms.","Some campaigns show decent DOS but poor ROS; optimisation will be driven by ROS.","ROS is partly outside direct control but will be used as a proxy for revenue impact."]}]},{"month":"Mar 2026","week":"Week 1 (Mar 01-07)","count":2,"monthHead":"#0E6655","monthLight":"#E8F8F5","commentary":"Two dedicated dashboard development sessions. The Campaign Performance Dashboard Development and Data Integration Strategy session (03-04) assigns Damon and Dux full-time to the build. The Campaign Performance Metrics Analysis Framework and Dashboard Development session (03-06) defines exactly what the dashboard will measure. This is the hardest sprint of the dashboard's lifecycle — the team is building it in crisis conditions.","meetings":[{"title":"03-04 Meeting- Campaign Performance Dashboard Development and Data Integration Strategy","done":["Mahantesh is working on stitching together data layers from campaigns to clients, deposits, and trades to enable campaign optimization","Building a data pipeline connecting all metrics (CTR, CTL, LTD, DOS) from campaigns through to client trading activity","Reverse engineering database queries using LLMs due to lack of SQL documentation from the BI team","Successfully stitched six months of historical client data; partner data only available from January 2025 onwards"]},{"title":"03-06 Meeting- Campaign Performance Metrics Analysis Framework and Dashboard Development","done":["Discussion focused on creating a unified measurement approach, with Cost Per Acquisition (CPA) as the primary optimisation goal.","**Current approach in development:**","Analyse campaigns by region rather than overall, as Click-Through to Lead (CTL) rates vary significantly across regions.","Flag campaigns using multiple metrics (CTR, CTL, CPA) benchmarked against regional averages."]}]},{"month":"Mar 2026","week":"Week 2 (Mar 08-14)","count":5,"monthHead":"#0E6655","monthLight":"#E8F8F5","commentary":"Five sessions — the most intense dashboard week of the period. The PPC Campaign Performance Dashboard and Scaling Strategy session (03-10) defines which metrics will trigger automated scaling decisions. The Campaign Performance Tracking and Retargeting Strategy review (03-11) integrates retargeting signals. The Data Migration Priorities and V2 Platform Tracking session (03-11) confirms V2 will require its own dashboard instrumentation. The Q1 Dashboard Updates and Regional Strategy Review (03-13) provides the first Q1 performance read. The PPC Analytics Dashboard Development and Data Access Issues session (03-13) surfaces the same BI pipeline blocker as in the partner sessions.","meetings":[{"title":"03-10 Marketing Review Meeting- PPC Campaign Performance Dashboard and Scaling Strategy","done":["Shivank is building a granular analytics dashboard to track PPC campaigns, inspired by Speaker 2's version.","Dashboard breaks down data by:","Weekly performance metrics","Countries and regions"]},{"title":"03-11 Marketing Campaign Review Meeting- Performance Tracking, Retargeting Strategy & Technical Optimisations","done":["Shivank Shankar shared an update on the ongoing security situation in Dubai:","Alerts are still occurring (e.g., a 2 AM alert advising people to stay home for an hour).","Daily operations and deliveries are functioning normally despite panic messages.","No direct impact on team members, though related incidents are appearing in the news."]},{"title":"03-11 Meeting- Data Migration Priorities, V2 Platform Tracking, and Campaign Performance Dashboard Development","done":["Shivank Shankar raised concerns about the numerous cards and requests being handled, seeking clarity on prioritisation and thought process","Currently, multiple requests are being distributed across different team members, and Shivank wanted to understand if Letty would be the central person handling all concepts","**Speaker 1's approach:**","Taking help from Pion to split complex queries into multiple tables using a divide-and-conquer method, similar to the PPC clients setup"]},{"title":"03-13 Marketing Performance Meeting- Q1 Dashboard Updates, Campaign Optimisation and Regional Strategy Review","done":["Shivank has updated the dashboard and migrated it to GitHub for easier access and distribution","Created GitHub repository under username \"Shivang wipe code\" due to username availability","Dashboard set to public hosting to avoid manual download/send loops","Added \"Geo individual performance\" dashboard with regional breakdowns"]},{"title":"03-13 Project Status Meeting- PPC Analytics Dashboard Development and Data Access Issues","done":["The project is delayed due to data access issues:","Data was pulled from BI reporting instead of the territory database, which contains PII and is inaccessible to the team.","The provided SQL query was from BI reporting, not from the accessible dataset.","The client has supplied a six-month data dump to enable immediate work while a permanent solution is configured."]}]},{"month":"Mar 2026","week":"Week 3 (Mar 15-21)","count":5,"monthHead":"#0E6655","monthLight":"#E8F8F5","commentary":"Five sessions as the dashboard reaches its final form. The AI-Powered Campaign Management Dashboard Strategy and Roadmap session (03-16) defines the roadmap beyond Q1. The Intelligence Layer Internal Meeting (03-16) formalises the dashboard's AI recommendation engine as a distinct component. The Dashboard Optimisation and Google Search Scoping session (03-17) narrows the initial scope to Google Search for reliability. The AI Dashboard Development and Data Access Sync (03-18) attempts to resolve the BI pipeline blocker. The Campaign Performance Dashboard and AI Agent Roadmap (03-18) sets the roadmap for making the dashboard self-optimising via the PPC AI Agent.","meetings":[{"title":"03-16 Internal Meeting- Ad Dashboard Intelligence Layer, WhatsApp Campaign & Operational Updates","done":["**Share Change History Document**","**Share Generic Campaign Content**","**Merge Two Weekly Calls**","**Follow Up on WhatsApp Dashboard / Reporting**"]},{"title":"03-16 Working Meeting- AI-Powered Campaign Management Dashboard – Strategy & Roadmap Discussion","done":["**Categorise campaign themes in the shared sheet**","**Brief Ishank and connect him with Mahantesh/Damien**","**Share change history sheet links with Mahantesh and Damien**","**Define and document the change-to-metric mapping in writing**"]},{"title":"03-17 Alignment Meeting- Campaign Dashboard Optimisation – Google Search Scoping & Data Quality","done":["**Review and validate the platform-campaign name mismatch list**","**Confirm and align on campaign naming conventions internally**","**Provide Mahantesh's team with a clear campaign categorisation framework**","**Summary:** Mahantesh presented the dashboard built to identify underperforming campaigns. The tool evaluates each campaign across five funnel metrics: CTR, Click-to-Lead (CTL), Demo-to-Real, Real-to-Deposit, and Deposit-on-Spend (DOS)."]},{"title":"03-18 Meeting- AI Dashboard Development & Data Access Sync – Google, Meta & BI Pipeline","done":["**Review Google Data Dump Provided by Naomi**","**Coordinate with Jatin Regarding Partner vs. Client Data Distinction**","**Consult Omar's Team on Existing Data Pipeline**","**Build Partner-Side AI Dashboard (3-Step Plan)**"]},{"title":"03-18 Strategy Meeting- Campaign Performance Dashboard & AI Agent Roadmap","done":["**Prepare Document 1: Action-Based Pointers for Campaign Optimisation**","**Prepare Document 2: Elaborated Recommendation Logic**","**Review and Validate Updated Dashboard Logic**","**Discussion:**"]}]},{"month":"Mar 2026","week":"Week 4 (Mar 22-28)","count":3,"monthHead":"#0E6655","monthLight":"#E8F8F5","commentary":"Three parallel dashboard initiatives converge in Week 4. The AI-powered PPC recommendations dashboard prototype is reviewed (recommend/reject buttons confirmed as dummy — reject feedback loop with Supabase storage to be built by 30 March). The BI benchmarking dashboard shifts to daily snapshots (Sep 2024 – Mar 2026) but is not yet connected to live pipelines. Meta Ads API access is unblocked via Amy's internal Gmail account. The PPC dashboard and Google Ads search term negation module are aligned on a human-in-the-loop model with a 2-3 week validation window before any automation is scaled.","meetings":[{"title":"03-24 Google Ads Performance Dashboard & Recommendations Alignment","done":["Dashboard prototype validated: spend-at-risk and primary recommendations to be based on channel gap only (not geo gap). Geo median suppressed when channel median data is available.","Recommendations document confirmed ready (Aswathi): multiple actionable steps per metric condition, initially seeded by Gemini without explicit human input — demonstrating AI can derive optimisation recommendations independently.","Approve/reject buttons are currently dummy buttons — no live API integration. Reject feedback box with Supabase storage to be deployed by 30 March 2026 end of day.","Manthesh's expectation that AI is ready to autonomously handle ads optimisation identified as premature — needs recalibration. Recommendations document serves dual purpose: immediate dashboard logic + data structure mapping for eventual AI agent.","Google Ads Editor access to be provisioned for the development team as an interim workaround for search term data access while the API integration is pending."]},{"title":"03-25 BI Dashboard Review, Benchmarking Logic & Meta Ads Integration","done":["Dashboard shifted from monthly to daily snapshots (17 Sep 2024 – 17 Mar 2026) using a snapshot from Mudit. Not yet connected to live metadata pipelines.","Three-phase roadmap agreed: (1) implement Naomi's benchmarking rules for underperforming campaign identification, (2) diagnose root causes, (3) connect to ad platforms for live data.","Meta Ads API access unblocked: Amy's internal Gmail account to be used to create a Facebook profile and Meta developer account — a two-step signup process allowing API access without personal credentials.","Project workflow mapping sheet shared with Dim and Tushar for collaborative editing; benchmarking workstream explicitly added. Daily updates required so the team avoids chasing status via chat.","26 March call skipped; next check-in confirmed for 27 March 2026. Tushar (new owner, taking over from Manthesh) to onboard fully within 1-2 days."]},{"title":"03-25/26 PPC Dashboard Review, Google Ads Optimisation & Search Term Negation Strategy","done":["Dashboard scoped exclusively to Google Search and non-search campaigns (70-80% of PPC spend). All other platform campaigns (Facebook inquiry, etc.) excluded until further notice.","Search term negation logic agreed: MCC non-brand search campaigns, last 30 days, cost > ~$50 threshold AND zero Virtual Sign-up conversions. Top high-cost zero-conversion terms to be separately reviewed for new campaign creation potential.","Human-in-the-loop model maintained throughout: AI provides recommendations, humans approve or reject. 2-3 week validation window required post-data injection before scaling automation further.","Ad copy and search term data sourcing: two separate scheduled Google Ads reports (ad text/copy + search terms), with cost filters to manage 300K+ row volume. Automated daily/weekly download to Google Sheets proposed.","Cautionary note: Meta Ads account suspension referenced as a consequence of excessive AI agent API calls — platform flagged it as bot activity. Over-reliance on ad platform AI automation to be avoided."]}]}]},{"label":"Platform & Technology","emoji":"⚙️","bg":"#ECEFF1","fg":"#263238","count":19,"summary":"19 meetings across 10 weeks — critical infrastructure decisions, mostly clustered in Dec and Jan. V2 migration planning dominated Dec, HubSpot setup ran Jan–Feb, and by March the V1→V2 database migration became a cross-team ownership crisis that threatened the tracking infrastructure.","weeks":[{"month":"Nov 2025","week":"Week 1 (Nov 01-07)","count":1,"monthHead":"#145A32","monthLight":"#D5F5E3","commentary":"V2 Migration and User Experience Strategy — the first mention of the V2 platform transition. At this point it is a UX discussion, not an engineering crisis. The team is thinking about how the new platform will affect the user journey, not yet about how it will break tracking.","meetings":[{"title":"V2 Migration and User Experience Strategy","done":["V2 Redirect Strategy and Social Sign-up: V2 adoption is hindered because social sign-ups—about 70% of V1 sign-ups—still route to V1. Plan: integrate social sign-up with ORI on V2 by November 17, launch first in Argentina, then scale. PPC campaigns missing country data are being fixed to stop defaulting to V1.","P2P Migration and Country Expansion Plan: V2 country rollout is blocked by the P2P marketplace migration. Phased release: test with internal employees, then a few live countries, then expand to 20 more. After migration, focus shifts to payment agents and API developers.","Strategy for Capturing User Phone Numbers: Rather than making phone number mandatory (due to SMS restrictions, regulatory approvals, and costs), increase voluntary submission and verification. Prompt at high-value moments (e.g., withdrawals), gamify profile completion, and make the field more prominent in V2 onboarding.","Phone Number Data Formatting for HubSpot: Phone numbers sent to HubSpot are invalid—missing the '+' and sometimes the country code—breaking marketing and outreach. Issue exists on V1 (storage) and V2 (transmission) and is under investigation."]}]},{"month":"Dec 2025","week":"Week 1 (Dec 01-07)","count":3,"monthHead":"#6C3483","monthLight":"#F5EEF8","commentary":"Three sessions establish the technology architecture for 2026. The Data Model, AI Projects, and PPC Data session defines how the data layer will support AI initiatives. The H2 Campaign Performance, AI Conversion Agent, HubSpot Migration, and MarTech Automation Roadmap session is the broadest technology planning session of the year — it covers the full MarTech stack transformation. The Year-End Review and HubSpot Integration session formally kicks off the HubSpot migration workstream.","meetings":[{"title":"Data Model, AI Projects, and PPC Data","done":["The initial model used only 6 months of data, which was insufficient since churn typically starts after 8 months.","The model was mistakenly using company-wide data instead of Pay-Per-Click (PPC) data, making the dataset appear too large.","The model should use only PPC data, totaling approximately 20,000 First-Time Deposits (FTDs).","Unnecessary constraints (e.g., filtering for users interested only in synthetic indices) should be removed; all relevant data should be included to correctly frame the model."]},{"title":"H2 Campaign Performance, AI Conversion Agent, HubSpot Migration, and MarTech Automation Roadmap","done":["Year-end review deck","Brand recognition and campaigns","Messaging diversification and automation","AI conversion agent"]},{"title":"Year-End Review, Organisational Changes & HubSpot Integration","done":["Speaker 1 announced an expected reorganisation involving functional and tribe changes; details are not yet finalised.","Speaker 1 will check with Divya to confirm whether year-end reviews proceed as planned despite the changes.","Team to continue preparing year-end review sections, focusing on H2 performance and insights for next year's planning.","Carl ([Speaker 2]) will finalise his section with Connor and Deep by Monday."]}]},{"month":"Dec 2025","week":"Week 2 (Dec 08-14)","count":4,"monthHead":"#6C3483","monthLight":"#F5EEF8","commentary":"Four sessions expose the V2 migration risk. AI PPC Optimisation and V2 Tracking Issues is the first explicit V2 tracking problem — a warning that the migration will create measurement gaps. V2 Pages, UAE Campaigns, and Funnel Improvement maps the V2 impact on specific campaign landing pages. V2 Roadmap and Marketing Funnel Optimization formalises the migration plan. Contract Negotiation, Data Modelling, and Branding Consulting adds vendor management complexity.","meetings":[{"title":"AI PPC Optimization and V2 Tracking Issues","done":["**First Time Deposit (FTD) Tracking:** The FTD event is not being tracked correctly for V2 users. The `CE Payment Transaction` event, which should signal a deposit, is not being sent to the tracking system (STAPE) because it lacks the necessary marketing click tags. This means **100% of V2 FTDs are not being reported**, and any FTD data visible in Google Ads is only from legacy V1 users. This is a high-priority issue blocking campaign optimization, and the team needs to find a developer with Xano expertise to implement a fix.","**Real Account Tracking:** Real account creation for V2 is being inaccurately tracked using the `MT5 Account Created` event. The correct event, `CE Wallet Created`, needs to be wired into STAPE to properly identify when a user creates a real account before depositing.","**V2 Migration Confusion:** There is significant confusion about which countries have fully migrated to V2. This lack of clarity makes it difficult to strategize campaigns, as optimization for FTDs is impossible for V2-migrated countries.","**Deep Linking:** A requirement was raised for deep linking from ads to specific trading pages (e.g., DTrader with a pre-selected asset). Currently, users are redirected to the generic Trader's Hub after sign-up, breaking the user journey. A \"return URI\" feature is needed but is not on any team's roadmap."]},{"title":"Contract Negotiation, Data Modelling, and Branding Consulting","done":["**Contract Proposal Discussion**","Discussed a proposal from \"Lloyd\": ₹5,000 for the first 6 months, then ₹20,000/month under a contract.","The contract can be terminated after 6 months if outcomes are unsatisfactory.","Compared with an alternative from \"the segment\": ₹3,000/month for a full year, with a year-long commitment and quarterly payments."]},{"title":"V2 Pages, UAE Campaigns, and Funnel Improvement","done":["The old version (V1) was a simple page requiring only an email ID.","The new version (V2) is designed to be a smoother, low-code system that allows for easier addition and removal of components.","The goal of V2 is to help users move down the funnel more easily and generate more real, new funnel accounts.","A question was raised about user experience: if a user selects a country (e.g., Afghanistan) that is not set up on the V2 structure, will they be redirected to the V1 page?"]},{"title":"V2 Roadmap and Marketing Funnel Optimization","done":["**Past Performance:** The marketing focus has shifted quarterly, from \"visitor-to-demo\" in Q1, to lead generation in Q2, and \"demo-to-real\" in Q3/Q4, supported by the Conversion API. Lead volumes saw a significant spike from October 2024 to January 2025 before declining.","**Data & Reporting Issues:** A major recurring issue is the unreliability of performance dashboards. Metrics like Cost Per Install (CPI), average revenue per user (ARPU), and payback period are skewed due to incorrect data sources and definitions (e.g., calculating ARPU based on leads instead of active traders). The team concluded that the current dashboards are not fit for analysis.","**Unsustainable CPA vs. LTV:** The current Cost Per Acquisition (CPA) of ~$340 is too close to the Lifetime Value (LTV) of ~$400, resulting in a very long payback period. This is far from the healthy industry benchmark of a 3:1 LTV to CPA ratio and a 4-6 month payback period. A significant data gap is the lack of LTV tracking, even for organic channels.","**Regulatory Constraints:** The company's cautious approach to branding and promotion is due to regulatory concerns, as its synthetic products could be classified as gambling, risking its financial services license. This limits aggressive branding campaigns, except in regions like the UAE where these products are not offered."]}]},{"month":"Jan 2026","week":"Week 2 (Jan 08-14)","count":1,"monthHead":"#7D6608","monthLight":"#FEFCE8","commentary":"Manahil's session on PPC Performance, HubSpot Migration, and Real-to-Funded Conversion Recovery tracks the first month of HubSpot live data — the migration is complete but data quality is not yet confirmed.","meetings":[{"title":"Manahil- PPC Performance, HubSpot Migration, and Real-to-Funded Conversion Recovery","done":["PPC funnel performance and conversion bottlenecks","Sign-up to funded conversion has declined sharply; Demo-to-Real improved, but Real-to-Funded is the primary bottleneck.","PPC spans 50–60 countries; only ~20–22 deliver acceptable ROI. Plan to prioritise countries with better conversion rates and higher average deposits.","E-books and brand keywords drive acquisition in Africa/South America; onboarding emails outperform e-book emails. Email frequency is high and risks spam; reduce sends and focus on effective sequences."]}]},{"month":"Jan 2026","week":"Week 3 (Jan 15-21)","count":1,"monthHead":"#7D6608","monthLight":"#FEFCE8","commentary":"V2 Conversion, Mobile Testing, and PPC Pages — the V2 conversion war room. Mobile users on V2 are converting at lower rates than V1. The PPC landing pages built for V1 are not compatible with V2's URL structure, creating both UX and tracking gaps.","meetings":[{"title":"War room client conversion- V2 Conversion, Mobile Testing, and PPC Pages","done":["**Problem:** On PPC pages for v2, the country selection box is causing issues where OTPs are not getting configured correctly, leading to OTP failures and user drop-offs.","**Proposed Solution:**","Remove the country selection box from the PPC pages.","Replace it with a CTA (Call to Action) button."]}]},{"month":"Jan 2026","week":"Week 4 (Jan 22-28)","count":2,"monthHead":"#7D6608","monthLight":"#FEFCE8","commentary":"Two architecture sessions. Lean Architecture, Federated Mesh, and AI Strategy introduces the long-term technical vision: a federated data mesh where each squad owns its data contract. The Signup UX Change, AI Demo Deployment, Data Integration, AWS Access session is operationally broad — covering frontend deployment, AWS infrastructure, and AI demo readiness simultaneously.","meetings":[{"title":"01-26 Meeting- Lean Architecture, Federated Mesh & AI Strategy","done":["Harsh proposed a product development framework that prioritises resilience and scalability by starting small and adapting as needed, termed \ {"title":"Michelle Google Meeting- Campaign Strategy, Performance, and Technical Challenges","done":["**CEO's Vision & Leadership:** The CEO, described as being direct and anti-bureaucracy, wants direct control over primary growth levers, particularly paid advertising, which he sees as more scalable than the affiliate channel. He prefers contrarian, innovative strategies and is focused on financial results and AI's role in running campaigns. He has instructed Shivank's team to focus full-time on AI-related tasks.","**Shivank's Role & Career Growth:** Following feedback to be more assertive and take a leadership role, Shivank plans to engage directly with the CEO within three months to demonstrate impact. The CEO has positioned Shivank's team to act like an agency, with Shivank responsible for campaign performance and another stakeholder, Yoli, handling invoicing.","**Team & Stakeholder Management:** Shivank is splitting his team's focus, with himself and Ashwati on AI projects, while Connor and Naomi manage business-as-usual operations. However, there is potential for stakeholder misalignment, as the CEO's direct mandate to Shivank may bypass other leaders like Yoli and the new Head of Growth, whose roles need clarification.","**Budget & Planning:** The Q1 budget is currently undefined, pending a leadership trip to Malaysia. Shivank is working to get clear goals from Connor to reverse-calculate budget needs."]}]},{"month":"Jan 2026","week":"Week 3 (Jan 15-21)","count":1,"monthHead":"#7D6608","monthLight":"#FEFCE8","commentary":"Google Team — Country Tiers and PMAX Campaigns. Google provides country-tier classification guidance that aligns with Deriv's own tiering framework. PMAX campaign structure is reviewed against Google's recommended architecture.","meetings":[{"title":"Google team- Country Tiers, PMAX Campaigns","done":["The meeting opened with troubleshooting significant audio lag on Wi-Fi, suspected to be due to a \"merge audio\" feature; the issue was resolved by rejoining and adjusting the setup.","After fixing the tech issue, the team shared brief holiday updates, including trips to Cape Town and London, and time spent at home.","Naomi mentioned picking up her dogs post-trip and noted that while a \"bring your pet to work day\" would be nice, it’s likely not feasible.","Michelle ([Speaker 6]) introduced CG ([Speaker 5]) as a new app expert joining the team."]}]},{"month":"Feb 2026","week":"Week 2 (Feb 08-14)","count":1,"monthHead":"#922B21","monthLight":"#FDEDEC","commentary":"Michelle Google — Growth Strategy, Analytics Attribution, and Activation Roadmap. A strategic review that reveals the VIP status gap: Deriv's current Google spend (£380–400K/mo) is far below the £26M/year VIP threshold. The activation roadmap (offline conversion uploads, AI Max scale-up, PMAX signal improvement) is the recovery plan. This session is the origin of the February VIP crisis narrative.","meetings":[{"title":"Michelle Google- Growth Strategy, Analytics Attribution, and Activation Roadmap","done":["Health and work-from-home update","Speaker 1 is unwell with recurring chest/cough issues due to continuous rain since January; was off Monday and yesterday; working from home today.","Expressed desire for rest and a trip to Dubai.","Book discussion"]}]},{"month":"Mar 2026","week":"Week 3 (Mar 15-21)","count":2,"monthHead":"#0E6655","monthLight":"#E8F8F5","commentary":"Two final Google sessions. The Google Offline Conversion Upload and SQL Query Alignment session (03-18) advances the most critical technical requirement for VIP evidence — uploading deposit events as offline conversions to prove Google's contribution to FTD. The PPC Strategy, Google VIP Status, Predictive FTD Model, and Partner Scaling session (03-18) confirms the VIP hard deadline of end-April and frames the predictive FTD model as the primary VIP evidence mechanism. The final week of the period ends with the Google relationship at maximum strategic importance.","meetings":[{"title":"03-18 Meeting- Google Offline Conversion Upload & SQL Query Alignment","done":["Shivank Shankar","Speaker 2 (Shatil – identified from farewell exchange)","Speaker 3 (Jatin)","**Complete and populate the offline conversion upload sheet**"]},{"title":"03-18 Weekly Meeting- PPC Strategy, Google VIP Status, Predictive FTD Model & Partner Scaling","done":["**Automation, Optimisation & Predictive Analytics** — A predictive model for First Time Deposits (FTDs) is being deployed on 19 March 2026 on Google Ads. Results (before/after comparison) are expected to be visible from the following week.","**Conversion Accelerator** — A credit-based incentive for new account holders is being launched imminently to drive urgency in deposits.","**Tracking Issue Resolution** — Meta tracking has confirmed issues (in-app private browsing stripping UTM parameters, session breaks, and over-attribution). Google tracking appears largely stable, though partner tracking in the new Partners Hub app is broken and blocking spend on that front.","**Sub-Account / Partner Scaling** — The team needs to identify, onboard, and activate bigger partners under the sub-account umbrella. Country managers will be the initial point of contact for identifying suitable candidates. Small financial incentives may be offered to the right partners."]}]}]},{"label":"External / Industry Intel","emoji":"🌐","bg":"#E8EAF6","fg":"#283593","count":16,"summary":"16 meetings all in a single week — Dec Week 2. This was the GTFT 2025 Summit, where the team received competitive intelligence on Crypto.com, Capital.com, XTB, Angel One, and emerging AI/Web3 trends. The summit provided the external benchmarks (Capital.com at $5M/mo FTD) that would be used to frame the VIP crisis narrative in February.","weeks":[{"month":"Dec 2025","week":"Week 2 (Dec 08-14)","count":16,"monthHead":"#6C3483","monthLight":"#F5EEF8","commentary":"All 16 external intelligence meetings land in a single week — the GTFT 2025 Summit. The intelligence gathered here shapes the next four months of strategy. Capital.com at $5M/mo FTD becomes the benchmark that defines the Google VIP gap. XTB's influencer marketing strategy validates the influencer investment. The AI sessions (Agentic AI, Agentic Commerce, Scale and Impact of AI, Moving from Digitisation to Autonomous AI) set the external context for Deriv's own AI-first pivot. The Global Bank and Web3 sessions are more aspirational but contribute to the long-term platform vision. Trust as the Foundation of Banking and Financial Inclusion provide the regulatory and accessibility framing for growth markets. Together, the summit provides a complete competitive and technological landscape assessment that informs the H1 2026 planning sessions that follow.","meetings":[{"title":"Agentic AI Financial Services Innovation Strategic Partnerships","done":["**Comparison with Past Eras:** The current AI wave was compared to the advent of smartphones and the internet. AI is seen as a deeper transformation than remote work or mobile banking, directly reshaping productivity and business structures.","**Pace of Innovation:** Change is unprecedented, with models improving markedly every three months. The paradigm has shifted from individual AI use to “teams of AI” collaborating.","**Organisational Adoption:**","Consulting firms are recording immediate productivity gains and reduced reliance on junior research roles."]},{"title":"Agentic Commerce","done":["**Description:**","**Commerce has progressed from physical stores to online e-commerce, enabling purchases from home.**","**The next revolution is \"agentic commerce,\" where personal AI shopping assistants handle tasks for us.**","**These AI agents will manage everything from ordering food and groceries to booking travel and making restaurant reservations.**"]},{"title":"Broker Marketing Strategies and Onboarding Friction Insights","done":["Topic Title: Transport and logistics discussion among attendees","Description:","Participants discussed travel plans around JLT and Cluster G, including car drop-offs and metro options.","One attendee left a car overnight due to drinking and took a taxi in the morning, noting responsible driving."]},{"title":"Capital.com overview and current scale","done":["Topic Title: Introduction of speaker and background","Description:","[Speaker 1] introduces Victor Prokopenya, highlighting multiple degrees and business leadership.","Mentions networking sessions and dinner for further discussions."]},{"title":"Crypto.com's Growth and Strategy","done":["The company has reached 150 million users, a significant milestone.","Growth is attributed to building a comprehensive network of licenses, ensuring a secure and trusted product.","The company is expanding its product offerings beyond crypto to include equities, ETFs, and funds.","The UAE is a key strategic market with a long-term commitment."]},{"title":"Evolution of Angel One and Indian Capital Markets","done":["**Evolution of Angel One and Indian Capital Markets**","Angel One has evolved over 30 years from a small, physical stock brokerage into a leading digital platform.","India is the 5th largest economy by GDP and 4th by market capitalisation; however, market penetration remains low (8.2% trading accounts, 2.4% active participation).","Trading accounts surged from 40 million in 2020 to 200 million by 2025."]},{"title":"Leveraging Global Technology for Local Relevance","done":["[Speaker 1] introduces Adam with three fun facts:","He can sing songs from \"K-pop Demon Hunters\".","He flew in from London.","He is happy to be away from his young children for an uninterrupted night's sleep."]},{"title":"Moving from Digitisation to Autonomous AI","done":["Topic Title: Opening and Panel Introduction","Description:","[Speaker 1] highlighted Google’s success while noting broader networking value in the room.","Introduced a panel led by a Google colleague overseeing fintech for UKI and championing Women in Fintech."]},{"title":"Scale and Impact of AI Beyond Productivity","done":["Speaker 1 framed the current AI moment as larger than just productivity gains.","Emphasis that AI will transform multiple functional areas, not only efficiency metrics.","Google and Google DeepMind are positioning themselves as long‑term pioneers in AI over the last 10 years.","**Conclusion:** AI is seen as a broad transformative force across sectors, surpassing narrow productivity-focused narratives."]},{"title":"The Global Challenge of Financial Inclusion","done":["**Description**:","The discussion addresses the \"inclusion of health paradox,\" where high digital adoption exists alongside low financial resilience globally.","A merchant in Lagos and a gig worker in London face similar financial volatility.","Access to financial tools without intelligence is described as a \"digital dead end.\" For example, a merchant can swipe a card but is denied a loan due to a lack of credit history."]},{"title":"The Role of AI in Modern Marketing","done":["Increasing user behaviour complexity: ~130 daily touchpoints spanning search, streaming, scrolling, and shopping.","AI is essential; manual campaign management is no longer sufficient.","Google and YouTube uniquely aggregate these behaviours in one ecosystem.","Objective: businesses should leverage Google’s AI advantage to gain a business advantage."]},{"title":"Trust as the Foundation of Banking","done":["The speaker states that in banking, trust is the primary factor, outweighing features, apps, and processes.","The speech title is \"Trust Connects What Innovation Creates,\" highlighting the synergy between trust and technology.","Trust cannot be guaranteed; it must be earned by committing to people, their values, social cohesion, and the economy.","UBS is portrayed as the number one universal bank in Switzerland, serving over 3 million clients across retail, affluent, corporate, and institutional sectors."]},{"title":"Vision of Web3 in the next decade","done":["Topic Title: Opening and speaker introductions","Description:","[Speaker 1] framed the session around disruption in AI, crypto, and blockchain.","Introduced Rachel Conlon, CMO of Binance, highlighting initiatives like Humans of Binance, CR7 partnership, Alpine F1 collaboration."]},{"title":"Vision to Build the First Truly Global Bank","done":["Vision to Build the First Truly Global Bank","Revolut aims to be the primary bank in live markets and obtain licences in the US, UK, Australia, and New Zealand.","Founders’ target: 100 million customers across 100 countries.","Current onboarding: ~60,000 users/day; ~1 million every 17 days; target expected around 2026."]},{"title":"Welcome to GTFT 2025 Summit","done":["Marcin Ternowski from Google IT marketing welcomed attendees to GTFT 2025, a flagship finance and technology summit.","The summit brings together BNC-level leaders in finance, technology, and fintech.","The speaker's passion is turning strategy into measurable impact and ROI, which is a key theme for the event.","The speaker praised Abu Dhabi as a city that embodies future-forward scale and innovation."]},{"title":"XTB's growth & Influencer Marketing","done":["**The 5-Second Rule**: Marketers have only five seconds to capture audience attention. Successful hooks lead to customer satisfaction, while poor ones lead to disappointment.","**Marketing as a Marathon**: Marketing requires hard work, consistency, and the right strategy rather than instant results. It is not just a script or AI-generated solution.","**Role of AI**: While AI is useful for daily tasks, it creates a risk where all content looks the same. Brand differentiation becomes crucial when AI levels the playing field.","**Shortcut to Attention**: Using a famous ambassador like Zlatan Ibrahimović provides an immediate shortcut to capturing audience attention, which is harder with generic AI assets."]}]}]},{"label":"Budget & Finance","emoji":"💰","bg":"#E8F5E9","fg":"#1B5E20","count":16,"summary":"14 meetings across 6 weeks — front-loaded. Nov Week 2 alone had 7 budget meetings, establishing the 2026 flat-YoY constraint that shaped everything downstream. The Dec Google budget shortfall meeting and Feb EDS payment negotiation represent the only significant mid-period finance activity.","weeks":[{"month":"Nov 2025","week":"Week 1 (Nov 01-07)","count":1,"monthHead":"#145A32","monthLight":"#D5F5E3","commentary":"2026 Budget Planning, Product Strategy, and Martech — the first budget planning session of the cycle. At this point the budget is still under construction; the envelope has not yet been set.","meetings":[{"title":"2026 Budget Planning, Product Strategy, and Martech","done":["Speaker 1 requested the 2026 budget plan for a discussion with the finance team (Janice and Geraldine) next week.","Initial assumption: flat year-over-year budget; any incremental spend requires a business case.","Key incremental items to consider:","Separate budget line item for the UAE."]}]},{"month":"Nov 2025","week":"Week 2 (Nov 08-14)","count":7,"monthHead":"#145A32","monthLight":"#D5F5E3","commentary":"Seven budget meetings in a single week — the most finance-concentrated period of the entire six months. The 2026 Budget Justification session builds the investment case. Aligning on Experiment Campaigns Budget Allocation locks the test-and-learn envelope. Google Ads Budget Allocation defines the channel mix. The Google Team meeting on Q4 Budget Ramp and ROAS-Focused Pivot is the most commercially significant — Google is being asked to approve a Q4 ramp that requires ROAS evidence. Notes on Q4 Budget and Remaining Budget for Q4 are housekeeping sessions. The UAE Migration and Budget Planning session introduces the UAE as a prioritised high-spend market. Together, these seven sessions make Nov Week 2 the budget decision week — the 2026 flat-YoY constraint is locked here.","meetings":[{"title":"2026 Budget Justification, Experiment Campaigns, Metrics Reporting","done":["Focus on justifying incremental budget requests, especially items highlighted in blue for 2025.","Finance requires clear results and projections to support increased spend.","Need to present actual outcomes for 2025 spend, particularly for new campaigns and experiments.","Limited actuals for Q4 2025; projections are based on October numbers multiplied by three."]},{"title":"Aligning on Experiment campaigns budget allocation","done":["**Description**:","The team reviewed a new analysis from the CRO dashboard, focusing on non-brand PPC keyword performance by country. This analysis tracks the conversion funnel from new visitors to first-time traders (FTT).","The \"Virtual to Funded\" (V2F) conversion rate was identified as a key metric for evaluating country performance and guiding budget allocation, offering a more accurate view than previous data which included clients from past years.","**Key Observations & Decisions**:"]},{"title":"Google Ads Budget Allocation","done":["The discussion focuses on allocating a daily budget—initially mentioned as 30,000—across multiple platforms.","Speaker 1 asks whether the budget is exclusively for Google or for all platforms; it is confirmed to cover all platforms.","A total budget of 277k is referenced, with a possible deduction of 6,000 per month for MQL.","The team evaluates whether MQL (Marketing Qualified Leads) spend is part of the budget."]},{"title":"Meeting with Google team- Q4 Budget Ramp, ROAS-Focused Pivot, PMAX and UAE App Scaling","done":["`Q4 budget`","`Experiment alignment`","`UAE app campaigns`","`PMAX experiments`"]},{"title":"Notes on Q4 budget","done":["The influencer marketing spend is shown as \"50k\" for the entire year.","Speaker 2 challenged the 50k figure, noting the actual spend was higher.","Speaker 1 referenced a document shared with Speaker 2 and clarified the annual allocation was 124 (currency not specified).","Speaker 1 used half of 124 due to a lack of confirmed actual spend data."]},{"title":"Remaining Budget for Q4","done":["Speaker 2 presented a spreadsheet detailing the team’s budget from January to September.","Fixed costs: $8 million.","Variable costs: $10 million, including PPC spend and broker listings.","Year-to-date spend: $11 million."]},{"title":"UAE Migration, Budget Planning, Marketing Experiments","done":["UAE platform is built on version 1.5, not full v2 as previously assumed.","Missing features identified; users need migration to v2.","App flyers and related setups must be redone to fit the new architecture.","Proposed five-week pause in spend and activities due to migration delays."]}]},{"month":"Dec 2025","week":"Week 2 (Dec 08-14)","count":3,"monthHead":"#6C3483","monthLight":"#F5EEF8","commentary":"Three sessions as budget strategy meets product and growth targets. FTTs, Productisation, and Payback Period formally establishes the payback period benchmark — 4–6 months is the target, 12 months is current reality. This number becomes the primary commercial risk in the Google VIP narrative. Marketing Meeting on Budget Management and PMAX Campaigns reviews in-quarter spend pacing. Payment Solutions, Regional Growth, and V2 Rollout adds crypto payment infrastructure to the budget conversation.","meetings":[{"title":"FTTs, Productisation, and Payback Period","done":["Speaker 2 outlined a new responsibility and a plan to transition to a new tribe structure through gradual changes.","The core approach is to productise certain functions to build scalable levers that boost productivity and increase First Time Depositors (FTTs).","The structure is designed for agility. Squads may be disbanded, productised into the new structure, or moved back to functional teams.","The functional organisation chart may evolve around the products created."]},{"title":"Marketing Meeting- Budget Management and PMAX Campaigns","done":["Daily budgets are currently set high and have been scaled across all areas.","[Speaker 2] needs to confirm the remaining budget from another department.","A new tracking sheet is updated daily at 9 AM to monitor performance against targets.","The team agreed to use existing budget split percentages as benchmarks for new targets. For example, if Jamaica’s spend is 2% of the total, its new target is 2% of 2.5 million."]},{"title":"Payment Solutions, Regional Growth, and V2 Rollout","done":["**Strategic Pillars:** The company's strategic focus is on Africa, cryptocurrencies, and localisation.","**Regional Performance:**","**Africa:** Showed strong 13% year-on-year growth, with deposits increasing from 217 million to 311 million over three years. The company expanded from 7 to 16 countries with local solutions.","**America:** Showed no improvement."]}]},{"month":"Dec 2025","week":"Google Weekly Meeting- Budget Shortfall, Q4 Performance, and 2026 Planning - Summary.md","count":1,"monthHead":"#6C3483","monthLight":"#F5EEF8","commentary":"","meetings":[{"title":"Google Weekly Meeting- Budget Shortfall, Q4 Performance, and 2026 Planning","done":["[Speaker 2] highlighted a blocker related to a 100k overspend compared to the budget previously aligned with Yoli, who is currently on leave and unresponsive.","This overspend needs approval from Yoli, who in turn needs to align with Prakash, the new Chief Growth Officer.","[Speaker 2] mentioned that Yoli doesn't seem to have the budget and the new organisational structure has complicated the approval process.","[Speaker 1] sees a Q4 performance of 1.8 million, which is significantly lower than Q3, causing concern for the business."]}]},{"month":"Dec 2025","week":"Yoli Weekly Meeting- PPC Performance, Payback Period, and AI Outreach - Summary.md","count":1,"monthHead":"#6C3483","monthLight":"#F5EEF8","commentary":"","meetings":[{"title":"Yoli Weekly Meeting- PPC Performance, Payback Period, and AI Outreach","done":["A key concern is that the current payback period for ad spend has increased from 8 months to approximately one year.","A competitor, Capital.com, reportedly achieves a two-month payback on a $10 million monthly spend, potentially due to a sales team for lead follow-up.","The Customer Acquisition Cost (CAC) to Customer Lifetime Value (CLV) ratio is currently unhealthy. For example, in Nigeria, the CPA is around $200 while the CLV is only $120.","Historical data shows that a recent push to fill the top of the funnel, especially in Pakistan, increased spending but led to a poor deposit funnel."]}]},{"month":"Feb 2026","week":"Week 4 (Feb 22-28)","count":1,"monthHead":"#922B21","monthLight":"#FDEDEC","commentary":"EDS Payment and Negotiation Strategy — a vendor negotiation session for a significant payment processor contract. Low frequency but high value; cost management is being actively pursued as a lever alongside revenue growth.","meetings":[{"title":"02-25 Meeting- EDS Payment and Negotiation Strategy","done":["The cost has increased significantly from five hundred to four thousand five hundred.","A negotiation with Gulf News and other publishers is being considered to reduce rates.","Speaker 1 believes publishers will not lower their rates and that any reduction must come from EDS.","Payment has been delayed, with only one quarter paid and three quarters outstanding. This context is not known by Priyanka."]}]},{"month":"Mar 2026","week":"Week 3 (Mar 15-21)","count":1,"monthHead":"#0E6655","monthLight":"#E8F8F5","commentary":"","meetings":[{"title":"03-19 Strategy Review: Client Budget, PPC Campaign Performance & Partnership Alignment","done":["Client stakeholder (agency/partner) reviewed PPC campaign results and discussed the ~720K gap against the VIP milestone target for the quarter.","Agreement to scale budgets on well-performing search campaigns rather than underperforming ones; client confirmed willingness to discuss budget increases with the team.","Team perception shared: strong strategic alignment between Shivank and the client, with execution delays noted as the primary gap in the current setup.","Eid holiday period noted as a factor in reduced activity; catch-up planned to ensure no surprises the following day."]}]},{"month":"Mar 2026","week":"Week 4 (Mar 22-28)","count":1,"monthHead":"#0E6655","monthLight":"#E8F8F5","commentary":"Q1 comes to a close with a ~720K gap against the VIP milestone target. Finance agreed to retain the current support structure on the condition investment levels are maintained. Campaigns only began scaling meaningfully from 23 March 2026, meaning the forecast understates the actual trajectory — the team opted for accurate conservative projections over inflated estimates. April FTTS target formally set above the current 2,500 baseline; a forecasting model is needed before April but the responsible team member (Mahantesh) is on leave.","meetings":[{"title":"03-25 Quarterly Budget Review, Campaign Performance & Affiliate Identification","done":["~720K gap to the VIP milestone target. Finance reviewed last 3 quarters and agreed to retain the current support structure — conditional on maintaining current investment levels. Q4-Q1 spend drop from ~2.2 to ~1.3-1.4 noted as 'quite drastic'.","Retargeting campaigns (Nigeria, Jamaica, additional countries) estimated to contribute ~50K incremental demand gen spend before end of Q1. 10 country-specific campaigns being configured by Connor.","Agency evaluation exercise agreed (specifically Loom, recommended by the Google partnership team): primarily for expectation-setting with C-level stakeholder on Demand Gen and YouTube scope, not a commitment to agency engagement.","April FTTS target to exceed the current 2,500 baseline; exact figure to be formally agreed before April 2026. Forecasting model gap identified — interim build proposed using Claude and available data by 28 March 2026.","Prediction model first run completed 25 March: 3,300 TCL IDs identified, 8 flagged as likely to convert/fund. Model to be re-run on 26 and 27 March with daily team review cadence established."]}]}]},{"label":"Strategy & Planning","emoji":"🎯","bg":"#E0F2F1","fg":"#004D40","count":11,"summary":"11 meetings across 8 weeks — lean but architecturally important. Concentrated in Nov–Jan, covering the H1 summit preparation, OKR alignment, tribe calls, and the AI-first strategic pivot. March is noticeably absent — the organisation had shifted from planning to pure execution and crisis management.","weeks":[{"month":"Nov 2025","week":"Week 5 (Nov 29-31)","count":1,"monthHead":"#145A32","monthLight":"#D5F5E3","commentary":"Yoli Tribe Call — the cross-functional alignment session that closes out November. Tribe calls are the highest-level planning forum below CEO, bringing growth, product, and marketing into alignment. This one sets the December direction.","meetings":[{"title":"Yoli tribe call","done":["**User Acquisition and Engagement:** The previous model of \"campaigns\" vs. \"distribution\" is being replaced. The new structure will be organised around four user acquisition levers: Paid, Owned, Earned, and Affiliates. The tribe may be renamed to \"User Acquisition and Engagement.\"","**User Engagement Squad:** Led by Gemma [Speaker 3], this new group consolidates all outbound activities. It is currently focused on two key initiatives:","**The Merge Project:** A prototype using data science to analyse recent customer behaviour and nudge them to \"trade more, return more, or pay more.\" Early tests on 2,000 clients have shown positive results.","**Conversion Bots:** The existing click bot is being evolved into an AI-powered companion named \"Amy.\" Built on a detailed persona and knowledge base covering the customer journey, Amy aims to provide personalised coaching to improve conversion. A/B testing against the click bot is planned."]}]},{"month":"Dec 2025","week":"Week 2 (Dec 08-14)","count":2,"monthHead":"#6C3483","monthLight":"#F5EEF8","commentary":"Two sessions in the busiest week of the period. Email Templates, Year-end Review, and Ebook Launch covers the Q4 content programme. Strategy Meeting on Automation, FTT Growth, and Event360 Alignment is more consequential — it formally links the automation strategy to the FTT (First-Time Trader) growth metric for the first time.","meetings":[{"title":"Email Templates, Year-end Review, and Ebook Launch","done":["**Description**","[Speaker 1] reported that email templates display misaligned elements on mobile, despite looking correct on desktop.","This is a known HubSpot limitation: desktop and mobile elements are interdependent, so changes in one affect the other.","The issue was previously discussed with Karl, with guidance to proceed with the best possible version; this approach is now causing problems."]},{"title":"Strategy Meeting- Automation, FTT Growth, and Event 360 Alignment","done":["Leadership (Rakshit) aims to shift the company mindset to be fully product-centric and automated, minimising human dependency.","**FTT (First Time Trade)** is the primary success metric for the upcoming \"TRIBE\" project.","The goal is to prove the product can drive the \"first trade\" with minimal human intervention.","Strategy parallels Elon Musk’s \"Gigafactory\" concept: target ~1% human interaction and maximal automation."]}]},{"month":"Dec 2025","week":"Week 3 (Dec 15-21)","count":2,"monthHead":"#6C3483","monthLight":"#F5EEF8","commentary":"Two sessions reviewing the full Q1–Q3 performance. Growth Tribe, Marketing Automation, and AI Tools aligns the growth tribe on the technology roadmap. The Q1–Q3 Performance Marketing, AI Automation, and Tracking for Conversion and Deposit Growth session is the definitive mid-year retrospective — it establishes that all future work must map to conversion or deposit growth, eliminating activities that don't have a measurable downstream impact.","meetings":[{"title":"Growth Tribe, Marketing Automation, and AI Tools","done":["A conflict exists between Vakas and Prakash regarding the setup of the applied AI team.","Vakas wants to build his AI simulator project (\"Event Jack\") within his tribe for faster incubation before moving it to Prakash's tribe for scaling.","Prakash has a different, ambitious vision for the growth tribe, which is documented for review. His focus is on the Market Command Center (MCC) hub and he is concerned about building similar things in two different tribes.","The new \"tribe chart\" is expected to be finalised in a few days."]},{"title":"Team-Q1–Q3 Performance Marketing, AI Automation, and Tracking for Conversion & Deposit Growth","done":["Last year’s planning pushed too many initiatives in parallel, ignoring capacity and creating chaos, rework and a sense of “nothing moved” for ~6 months.","Budget rework with Yoli brought more clarity on direction and country focus.","For the coming year (with particular focus on Q1 and 2026 planning), the team will:","Commit to fewer, clearly defined initiatives (3–4 main “buckets”)."]}]},{"month":"Dec 2025","week":"Week 4 (Dec 22-28)","count":1,"monthHead":"#6C3483","monthLight":"#F5EEF8","commentary":"AI-First Marketing Stack, Cross-Channel Optimisation, and Productisation for Online Trading Broker — a single strategic session that productises the marketing stack concept. 'Productisation' means treating the AI marketing system as a product with features, version releases, and a roadmap, not just a collection of tools.","meetings":[{"title":"Strategy Meeting- AI-First Marketing Stack, Cross-Channel Optimisation and Productisation for Online Trading Broker","done":["The business is an online trading broker (stocks, forex, crypto) aiming to become one of the first **AI‑first brokers by 2026**.","Marketing is heavily performance‑driven across **Google, Meta, TikTok, programmatic, native, and app channels**.","Funnel: **demo signup → real account (KYC) → funded account (deposit)**.","Final KPIs: **number of funded accounts**, **ROAS**, and **funnel conversion rates per country**."]}]},{"month":"Dec 2025","week":"Week 5 (Dec 29-31)","count":1,"monthHead":"#6C3483","monthLight":"#F5EEF8","commentary":"CEO Meeting Preparation — the year-end strategic review is being prepared. This session frames the narrative that will be presented to leadership: what was achieved in 2025 and what the 2026 AI-first strategy will deliver.","meetings":[{"title":"CEO Meeting Preparation","done":["The team is strategising on what topics to present in an upcoming meeting with a senior executive, likely the CEO.","The discussion highlights the potential for significant consequences, including changes to the organisational chart and reporting structure, based on the information shared.","A key concern is how to frame issues without negatively impacting their manager, Yoli, who is currently away.","They are debating whether to have the meeting before or after Yoli returns."]}]},{"month":"Jan 2026","week":"Week 1 (Jan 01-07)","count":2,"monthHead":"#7D6608","monthLight":"#FEFCE8","commentary":"Two summit preparation sessions. Strategic Alignment for the AI and Automation Summit and Yoli's AI Initiative Alignment and H1 Summit Preparation confirm that the H1 summit (an internal showcase of AI progress) is the primary strategic delivery milestone for the first half of 2026.","meetings":[{"title":"Strategic Alignment for the AI and Automation Summit","done":["**Rule Engine:** This was confirmed as a top-three, AI-driven priority. The discussion clarified that it would ingest data from attribution efforts, such as the \"match to one\" dashboard, and would be managed by a single squad but applied differently for both client and partner campaigns due to their distinct funnels.","**Automation Tasks:** The group scrutinised a list of manual tasks ripe for automation.","**GCL ID Tracking:** This was highlighted as a significant issue, with Aswathi noting that 60% of GCL IDs were not passing in the previous month. The plan is to create an automated alert system for this.","**Campaign QA:** Many proposed automations, such as checking for mismatched numbers or cross-domain issues, were consolidated under the concept of a \"QA automation dashboard for PPC\" to handle pre-launch and ongoing checks."]},{"title":"Yoli- AI Initiative Alignment and H1 Summit Preparation","done":["**Create**: Carl explained that Create is evolving into a group with four key functions. It is building a **data layer** by ingesting news articles and influencer data to generate data-driven ads. It also includes cells for creating **visual-heavy assets** (videos, images) for new customer acquisition and **copy-heavy content** (blogs, news posts) led by Priyanka. A new addition is **UX-Ray**, an audit tool to identify and suggest improvements for critical user path pain points using data from PostHog. Overlaps were noted between Create's data layer and Business 360, as well as between UX-Ray and other journey-mapping efforts.","**Advertising OS**: Shivank detailed the two-part focus of the Advertising OS. The **post-view** component will connect display ad impressions to user IDs across all funnels (PPC, affiliate, etc.) to measure their influence on conversions and optimise branding budgets. The **post-click** component aims to fully automate campaign optimisation. Using AI, it will create dynamic rules to manage bids, budgets, and targeting based on real-time performance metrics like ROAS and CPC. A major risk highlighted is that approximately 60% of Google Click IDs are currently failing to be tracked, severely hindering optimisation.","**Pulse Engine & Market Labs**: Priyanka outlined her projects. The **Pulse Engine** acts as an \"intelligent layer\" that monitors market trends and generates content concepts. When a significant event occurs (e.g., \"gold touches an all-time high\"), it will trigger the creation of multiple asset formats (newsletters, push notifications, videos). This engine will be interconnected with other systems, receiving signals from Event 360 and Create's data layer. Separately, **Market Labs** is a new, signed-out user acquisition portal, starting with an \"Instrument Explorer.\" This tool will provide deep, actionable insights on specific assets (like silver) through a combination of charts, multi-timeframe analysis, news, and AI-driven analysis, all hosted on a user-friendly URL (e.g., `marketintelligence.derive.com/silver`) to drive traffic and conversions.","**Referral OS**: Yoli introduced a proof-of-concept project to build a client referral program, inspired by fintechs like Revolut, which acquired 50% of its customers this way. The objective is to acquire one new user for free for every user acquired through advertising. The plan is to test surfacing referral calls-to-action in Traders Hub and other channels, with incentives for both the referrer and referee. The project will start with a client-to-client model, with a long-term vision to upsell high-value referrers into the affiliate program. The team is currently researching whether to build this system or buy a third-party solution."]}]},{"month":"Jan 2026","week":"Week 3 (Jan 15-21)","count":1,"monthHead":"#7D6608","monthLight":"#FEFCE8","commentary":"Yoli Leads Call — One-pagers, H1 Summit Demos, and Agentic Onboarding Workflows. The summit preparation advances to demo readiness — each AI initiative needs a working demonstration for the H1 showcase.","meetings":[{"title":"Yoli Leads call- One-pagers, H1 Summit Demos, and Agentic Onboarding Workflows","done":["`One-pager: Mission, Data, Tools`","`H1 Summit Demos`","`Onboarding automation and agentic workflows`","Topic Title: One-pager requirement (Mission, Data, Tools) and ownership"]}]},{"month":"Jan 2026","week":"Week 4 (Jan 22-28)","count":1,"monthHead":"#7D6608","monthLight":"#FEFCE8","commentary":"H1 Design Plan, AI Initiatives, and Growth Hacking — the final H1 plan is assembled. This is the last formal planning session before execution becomes the primary focus. After this week, the organisation shifts from planning to building.","meetings":[{"title":"01-22 Weekly Meeting- H1 Design Plan, AI Initiatives, a
