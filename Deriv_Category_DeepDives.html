oom crisis in March.","meetings":[{"title":"GCLID and Funded Account Attribution Discrepancies","done":["[ ] Escalate the First-Time Deposit (FTD) attribution issue to Nuzi for investigation into why `payment_deposit` events are not passing attribution data like GCLID - [TBD]","[ ] Organise a follow-up meeting after Nuzi has investigated the FTD issue - [TBD]","[ ] Update the GCLID analysis dashboard to include V2 data for more accurate reporting - [TBD]"]}]},{"month":"Jan 2026","week":"Week 2 (Jan 08-14)","count":7,"monthHead":"#7D6608","monthLight":"#FEFCE8","commentary":"Seven sessions — the most attribution-intensive week of the period. Chris's Multi-touch Attribution Project Status reviews progress against the Nov architecture. The Multi-touch Attribution System session advances the implementation. Yoli's Event360 Roadmap session maps the data pipeline. Naomi's GA4 Tracking and V2 Event Tracking session escalates the V2 migration risk — the new platform's events are not tracking correctly. Ishank's Google Ads and Offline Conversion session attempts to close the GCLID gap. Conor's Post-view Attribution session introduces view-through credit for YouTube. Yoli's AI Max-PMAX Geo Controls and Multi-touch Attribution session confirms AI Max is live and adding new attribution complexity.","meetings":[{"title":"Chris Weekly Meeting- Multi-touch Attribution Project Status","done":["[ ] Speaker 4 to get access to the V2 project data in Superbase.","[ ] Speaker 4 to check with Newsy about enabling multi-touch tracking on `join.deriv.com`.","[ ] Check with Lindsay/Newsy about the V2 data and any existing dashboards.","[ ] Shivank Shankar to get a data dump for the V2 platform once tracking is fully enabled."]},{"title":"Conor Meeting- Country Tiering, PPC Strategy, and Post-view Attribution for Funded Conversion Growth","done":["Country Tiering","PPC and Partner Campaigns","Conversion and Deposit Analysis","Conversion Rate Optimisation"]},{"title":"Ishank- Predictive Modelling, Google Ads, and Offline Conversion","done":["The year-long project aims to predict user deposit probability (yes/no) and lifetime value (LTV).","The current Quant team model primarily uses 'country of residence' as the key predictor.","Critical fields like income source and education level have ~90% missing data, limiting granularity and optimisation potential.","Enhance prediction by tracking immediate user behaviour within 24–48 hours post-signup."]},{"title":"Multi-touch Attribution System","done":["Shivank Shankar provided context on the multi-touch attribution system. V1 was built for UAE but was shut down, leaving no data to analyse.","A V2 dashboard was created but it was not functional. It was supposed to use a U-shaped logic, attributing 40% weight to the first and last touchpoints.","The primary goal of the meeting is to align on the current state of multi-touch and decide on the next steps.","Speaker 4 (Nuzi) explained that the system currently captures all user events (like page views) up to the point of login or signup on `home.deri.com` (V2)."]},{"title":"Naomi Meeting- GA4 Tracking, V2 Event Tracking, and AI Automation","done":["Shivank questioned whether GA4 tracking is implemented for partner pages, specifically for monitoring metrics like bounce rate and page load times.","Naomi confirmed that `join.deriv.com` has GA4 and it should cover partner pages.","Naomi suggested that Microsoft Clarity could also be used for this analysis.","The discussion touched on creating audiences in GA4 for retargeting, but it was noted that similar event tracking could be done with GTM."]},{"title":"Yoli Meeting- Agentic Architecture, Slack Interface, and Event360 Roadmap","done":["Topic Title: Shift from Event-Based Workflows to Agentic AI","Description:","Proposal to transition from prescriptive event-triggered actions to agents connected to data and mission, enabling AI to reason and decide actions.","Agents should have access to orchestration tools (HubSpot, RudderStack, Intercom, Slack, WhatsApp, email creation)."]},{"title":"Yoli- PPC Optimisation, AI Max-PMAX Geo Controls, DV360 Onboarding, and Multi-touch Attribution","done":["A spreadsheet maps events and actions for affiliate and client journeys; actions include email, WhatsApp/notifications, retargeting pools, and segment placement. Goal: build “Event 360” as the orchestration brain for events, triggers, and actions.","Miro architecture visualises reporting, data sources, connectors (RudderStack, HubSpot, Intercom), and tracking (UTMs, GAs, CLIDs/GCLIDs, CAPI, affiliate IDs, binary ID). Mobile vs web tracking differs; require specificity on trackers (e.g., AppsFlyer) and engineering focus on failure points.","UTMs and cross-channel attribution currently lack last-touch visibility across WhatsApp, SMS, Email, Meta/Google; remarketing pools and deep linking missing from roadmap. Need a tracker QA checklist and prioritisation to enable effective retargeting and accurate attribution.","Conclusion: Review the event spreadsheet and Chris G’s visualisation for completeness and tracker specificity; define tracker QA and fix attribution/remarketing gaps."]}]},{"month":"Jan 2026","week":"Week 3 (Jan 15-21)","count":1,"monthHead":"#7D6608","monthLight":"#FEFCE8","commentary":"Prakash's Conversion Improvement, Event360 Tracking, and Agent-First Operating Model session makes Event360 central to the agent architecture — the attribution data layer is now part of the AI operating model, not just a reporting tool.","meetings":[{"title":"Prakash Meeting- Conversion Improvement, Event360 Tracking, Agent-First Operating Model","done":["Focus on Conversion as Top Priority","Conversion issues persist from v1 and into v2; tracking accuracy is core to improvement.","Event360 and Business360 are central to measuring events, state transitions, and time-to-transition.","Aim to deploy AI for data insights, alerts (errors, rage clicks, dead clicks), and recommending fixes."]}]},{"month":"Jan 2026","week":"Week 4 (Jan 22-28)","count":1,"monthHead":"#7D6608","monthLight":"#FEFCE8","commentary":"Attribution Strategy for Google Display and Video's Impact on Bottom-Funnel Outcomes — a focused methodological session on whether display and video should receive credit for FTD conversions that happened 7-30 days after the impression. The answer will affect how much of the budget is justified for upper-funnel channels.","meetings":[{"title":"01-23 Meeting- Attribution Strategy for Google Display-Video Impact on Bottom‑Funnel Outcomes","done":["Topic Title: Objective—Attribution for Display and Video Impact on Bottom‑Funnel Outcomes","Goal: demonstrate how Google Display/Video influences bottom‑funnel outcomes (funded accounts/deposits), even when final conversions are credited to affiliates.","Current success via Match2One/AdRoll: stitching impression IDs to internal binary user IDs to attribute post‑view conversions across channels (PPC, affiliate, direct).","Aim: achieve similar clarity for Google channels to justify upper/mid‑funnel investment."]}]},{"month":"Jan 2026","week":"Week 5 (Jan 29-31)","count":1,"monthHead":"#7D6608","monthLight":"#FEFCE8","commentary":"GA4 Attribution, PPC Credit, and Conversion Funnel Discrepancies — the month ends with unresolved attribution gaps. GA4 is over-crediting certain channels and under-crediting others. The discrepancy is quantified but not yet resolved.","meetings":[{"title":"01-30 Weekly Meeting- GA4 Attribution, PPC Credit, and Conversion Funnel Discrepancies","done":["Topic Title: Discrepancies between Data Studio, Ad Platforms, and GA4","Data Studio vs GA4 mismatch noted: backend vs attributed data cause differences.","Ad clicks vs visitors gap increased to ~44%; example: January 3.3 million ad clicks vs 1.45 million visitors.","Potential causes listed: slow landing page (Lighthouse score ~55), accidental clicks, tag/pixel misfires, bot traffic, UTM not loading properly."]}]},{"month":"Feb 2026","week":"Week 2 (Feb 08-14)","count":2,"monthHead":"#922B21","monthLight":"#FDEDEC","commentary":"Two sessions: HubSpot PPC Lead Misclassification and UTM Hygiene reveals that leads from paid campaigns are being labelled as organic in HubSpot due to UTM parameters being stripped in the handoff. This is a systemic data integrity failure. Prakash's Post-View Attribution session advances the view-through credit methodology.","meetings":[{"title":"Hubspot- PPC Lead Misclassification, UTM Hygiene, and Email Journey Governance","done":["Topic Title: PPC leads receiving Partner (Affiliate) communications","Multiple PPC-acquired client leads (e.g., forex ebook via Google Search Ads) are receiving “Welcome to Deriv Partner Family” emails and being assigned affiliate IDs.","These leads should follow the Traders Hub (client) journey but seem to also have Partners Hub accounts.","Concern that the partner welcome series (including Spanish) is being triggered for client leads."]},{"title":"Prakash- Post-View Attribution and Advertising Strategy","done":["**Description**:","The current attribution model assigns a very high value to post-view, roughly six times higher than post-click.","Shivank Shankar clarified the dashboard is currently showing 100% of post-view value. He suggested the realistic figure should be closer to 40% to align with a shared attribution model (e.g., 40% post-view, 40% post-click, 20% middle).","This post-view attribution model is currently applied to less than 10% of ad spend. Wider alignment across all dashboards is needed before scaling to prevent double counting and report inconsistencies."]}]},{"month":"Feb 2026","week":"Week 3 (Feb 15-21)","count":3,"monthHead":"#922B21","monthLight":"#FDEDEC","commentary":"Three sessions as attribution integrity degrades. PII Data, GCLID Integration, and Predictive Model Strategy surfaces a compliance constraint: GCLID data may contain PII, limiting how it can be used in the model. The Backend Tracking Discrepancies session is the first 'crisis' attribution meeting — backend records don't match GA4 records, and the gap is widening. PostHog Integration and User Journey Analysis explores a new tracking tool to fill the gaps.","meetings":[{"title":"02-18 Meeting- PII Data, GCLID Integration, and Predictive Model Strategy","done":["Jatin is joining the security team and was approached about providing email IDs in PII (Personally Identifiable Information).","Jatin stated that a dashboard is not feasible as the security team needs a dynamic sheet that is continuously updated.","A manual process would require repeatedly downloading and uploading a CSV file to populate the data. A linked Google Sheet would automate this process.","Plan: create an event using GCLID (Google Click Identifier) data for a predictive model, targeting users in the 50%–75% bin."]},{"title":"02-20 Weekly Meeting- Backend Tracking Discrepancies, Pod Dashboards, Predictive Modelling, and ClickUp Workflow","done":["Topic Title: Backend tracking discrepancies for Meta/Google campaigns","Description:","New campaigns on Meta and Google show leads/conversions on platforms, but none appear on backend.","Approx. spend of 2,000 dollars with some campaigns showing no backend results; others show fewer than expected."]},{"title":"PostHog Integration and User Journey Analysis","done":["Speaker 2 showcased a PostHog view tracking a user’s journey through events (e.g., reaching the login page). It currently uses the PostHog person ID, which will later be mapped to the actual client ID.","The system can track users by PostHog ID or email address, indicating their position in the funnel.","**Next Step**: Correlate communication emails (from the comms DB) with the user journey to identify which communications prompted actions like visiting the login page.","**Conclusion**: Shivank validated this direction as it clarifies the user journey."]}]},{"month":"Feb 2026","week":"Week 4 (Feb 22-28)","count":2,"monthHead":"#922B21","monthLight":"#FDEDEC","commentary":"Two targeted sessions: Google Ads Offline Conversions, LTV Modelling, and Data Automation attempts to solve the offline conversion upload problem that is blocking the Google VIP evidence. The UTM Instrumentation and Landing Page Drop-offs session identifies exactly where in the funnel UTM parameters are being lost.","meetings":[{"title":"02-23 Project Meeting- Google Ads Offline Conversions, LTV Modelling, and Data Automation","done":["Topic Title: Passing deposit probability signals to Google Ads (offline conversions)","Goal: Upload daily offline conversion signals to Google Ads using a fixed Google Ads template sheet.","Required fields: GCLID, conversion name, conversion time, conversion value, and conversion currency.","GCLID is generated on Google Ads clicks; the backend should capture it and map to binary user IDs via BigQuery."]},{"title":"02-25 बैठक- Ad Funnel Flow, UTM Instrumentation, and Landing Page Drop-offs","done":["Topic Title: Ad funnel flow and site routing (joinodell/joinodder/joinorder → home.odell)","Ads on Google, Facebook, and Instagram drive traffic to joinodell.com (variations noted as joinodder/joinorder due to STT).","Users land on targeted pages (e.g., gold, silver, MT5) with tailored Webflow layouts and banners.","Post sign-up, users are redirected to home.odell.com and guided via Traders Hub banners to the intended tools (DTrader or MT5) based on ad intent."]}]},{"month":"Mar 2026","week":"Week 1 (Mar 01-07)","count":1,"monthHead":"#0E6655","monthLight":"#E8F8F5","commentary":"UTM Tracking Issues Analysis — Facebook and Google Platforms. A diagnostic session that confirms the UTM hygiene problems are platform-specific: Facebook's privacy restrictions are stripping click IDs, and Google's parallel tracking is creating GCLID mismatches in certain browser environments.","meetings":[{"title":"03-05 Meeting- UTM Tracking Issues Analysis - Facebook and Google Platforms","done":["Investigation was conducted to identify problems with UTM parameters not being passed through properly in conversion tracking.","Analysis covered multiple platforms, including BigQuery, to trace user journeys.","Data showed that certain users did not have UTM parameters coming through.","Browser types were examined as part of the investigation."]}]},{"month":"Mar 2026","week":"Week 3 (Mar 15-21)","count":5,"monthHead":"#0E6655","monthLight":"#E8F8F5","commentary":"Five sessions in the attribution war room week. Meta Attribution Failure, UTM Tracking Discrepancies, and Campaign Reconciliation (03-16) quantifies the scale of the problem. The Campaign Tracking, Attribution Issues, and Growth Scorecard session (03-17) introduces the Growth Scorecard as the measurement governance framework going forward. The Marketing Campaign Tracking, Attribution, and Data Reconciliation session (03-17) begins the manual reconciliation process. The Technical Review (03-18) covering Meta and Google ad tracking and conversion audit performs the forensic analysis. The final session on Predictive LTV Model, Conversion API, and UTM Tracking defines the remediation architecture: Conversion API (CAPI) as the server-side solution that bypasses browser-level tracking losses.","meetings":[{"title":"03-16 Working Meeting- Meta Attribution Failure, UTM Tracking Discrepancies & Campaign Reconciliation","done":["The session was a working review focused on diagnosing and resolving significant discrepancies between Meta (Facebook) ad campaign conversion data and internal BigQuery/dashboard attribution data, as well as Google Ads tracking, across several active campaigns — including Jamaica Gold, Nigeria Silver, and other pod campaigns.","The root cause of the Meta attribution failure was identified as **HubSpot's auto-tracking feature**, which was automatically overriding the team's custom hardcoded UTM parameters (replacing `utm_medium=paid_social` with `utm_medium=paid`, etc.) on two recently reconnected Meta ad accounts. This caused leads to go unattributed in BigQuery entirely.","**Immediate fix completed during the meeting:** Yabby/Robbie (Speaker 7) disabled HubSpot auto-tracking for the affected Meta ad accounts.","Additional issues surfaced included: client-side conversion tracking noise in Google Ads, UTM parameter stripping by Meta's in-app browser (even with go link redirects), affiliate attribution gaps due to missing UTM source values, FBC/FBP ID privacy limitations, and multi-touch attribution complexity."]},{"title":"03-17 Meeting- Campaign Tracking, Attribution Issues & Growth Scorecard Discussion","done":["**Conduct Impact Analysis on Tracking Issues**","**Follow Up with Chris on Conversion API Setup**","**Provide Full Context in Chat Before Chris's Next Morning**","**Explore and Propose \"Where Did You Hear About Us?\" Post-Sign-Up Form**"]},{"title":"03-17 Working Session- Marketing Campaign Tracking, Attribution & Data Reconciliation","done":["This was a comprehensive multi-part working session focused on identifying, debugging, and resolving significant discrepancies between Meta (Facebook) Ads conversion data and the team's internal tracking platforms (Loco Studio / Lucas Studio / V2 dashboard / Looker Studio).","The core problem: Meta was reporting materially higher virtual sign-up and conversion numbers than the internal backend — in some cases showing 18–28 conversions where the internal system showed only 4, or even zero.","**Attribution mismatch** was identified as a primary driver of discrepancy. Meta's default reporting includes view-through (post-view) conversions, which the internal backend — using last-click attribution requiring a UTM click — does not capture. The team aligned on using **one-day click conversion** (or seven-day click where relevant) as the correct comparable metric, excluding view-through conversions entirely.","**UTM parameter changes** made on 13 March 2026 (removal of extra parameters, retaining only source, medium, and campaign) were confirmed as having corrected lead tracking. Data prior to that date is unreliable for cross-platform comparison."]},{"title":"03-18 Technical Review Meeting- Ad Campaign Tracking & Conversion Audit — Meta & Google","done":["**HubSpot tracking removal** was acknowledged as a likely positive factor that has recently caused movement in previously stagnant campaign data.","**First-time deposit (FTD) discrepancies** were flagged as a major concern — Meta is reporting FTDs that are not reflected in the internal back end. The team explored whether this could be due to view-through attribution over-reporting, multi-touch attribution claims by multiple platforms simultaneously, or broken pixel/session tracking.","**In-app browser behaviour** was identified as a probable root cause: when users click a Meta ad and are redirected via the in-app browser, it may open a fresh session without carrying over the Facebook cookie/session, rendering pixel tracking ineffective and breaking the conversion attribution chain.","**No Facebook Pixel detected** on `home.driv.com` was highlighted as a significant gap, potentially explaining why conversions are not being captured accurately."]},{"title":"03-18 Todo- Predictive LTV Model, Conversion API & UTM Tracking for Ad Platform Optimization","done":["[ ] Build a predictive model to predict lifetime value within 24–48 hours and pass it as a pseudo value (signal) back to the ad platform, so Google's AI can optimize toward a target ROAS (e.g., 300%) without waiting for a 3–6 month lag","[ ] Implement the Conversion API to gain better tracking of funded users and enable signal passing back to the ad platform to scale funded clients","[ ] Establish a proactive tracking structure to prevent UTM breakage (e.g., add automated triggers and monitoring) so that UTM data is consistently linked to PPC users, ensuring the predictive model and conversion API signals remain accurate and uninterrupted"]}]},{"month":"Mar 2026","week":"Week 4 (Mar 22-28)","count":5,"monthHead":"#0E6655","monthLight":"#E8F8F5","commentary":"The most analytically intensive week of the quarter. Five meetings address the full attribution stack — from Meta pixel over-attribution and Stape server-side tracking to Bing Ads conversion drop (unresolved since November), funnel drop-off analysis in target geographies (Zimbabwe, Uganda, Jamaica), and the V1/V2 offline conversion data overlap in Google Ads. A Stape Care subscription upgrade (USD 149/month) is approved and a support call confirmed for 27 March 2026 to investigate Jamaica Gold FTD misattribution. The prediction model is found to over-predict by approximately 3× relative to actual conversions, attributed to a 90-day lag in the model.","meetings":[{"title":"03-23 Technical Review: Conversion Tracking, Attribution Discrepancies & Ad Platform Performance","done":["Meta over-attribution confirmed and expected: Meta claims credit whenever a Meta ad click occurred within the attribution window, regardless of actual conversion source. Discrepancies of 2× considered within acceptable range.","Stape/server-side tracking strips UTM tags and works only off click IDs (FBC IDs) — affiliate traffic carrying FBC IDs from Meta ad clicks is incorrectly attributed to Meta, inflating conversion numbers.","Bing Ads has not reported any conversions from the US since approximately 13 November 2025 — root cause linked to a GTM push on 12 November. MSCLKID investigation assigned to Chris.","Partner pixel to proceed via Cappy (server-side Conversions API) rather than client-side GTM, as the partner site uses Flutter (to which Chris does not have access).","Call with Steve (Stipe) confirmed for 24 March 2026: agenda includes last-click attribution configuration, affiliate click ID filtering, and the Bing Ads conversion drop."]},{"title":"03-24 Marketing Analytics: FTD Drop-Off & Funnel Analysis","done":["User journey analysis revealed users browsing deposit page multiple times (visiting payment options — USD, payment agents, P2P) without completing a deposit, suggesting confusion or an inability to use available payment methods.","Campaigns running since January 2026 (~3 months) with zero conversions identified — further cohort analysis required to determine whether this is a technical blocker or user intent issue.","Ivory Coast precedent: OTP codes from Orange Money were blocking deposits — similar undiscovered technical blockers suspected in Zimbabwe, Uganda, and Jamaica. Ground-level testing with a local contact (~USD 10 gift) proposed.","AI-assisted onboarding funnel tool (Event 360) in development: visualises full 30-day onboarding funnel with AI-surfaced issue flags (74% drop-off at deposit stage highlighted). Currently performed manually.","State/Analytics support subscription expired; decision deferred — if FTD numbers remain unexplained after 25 March 2026 review, a monthly Care subscription (~USD 149) to be purchased."]},{"title":"03-25 Partners Hub Marketing Attribution & Rudderstack Integration","done":["Core attribution problem: CE sign-up event payload does not distinguish between client and partner sign-ups, preventing accurate attribution to the correct advertising accounts.","Anonymous ID returning as '1' — incorrect and breaking the identity call mechanism entirely; must be fixed before the current partner attribution setup can work at all.","X-App ID approach agreed: use X-App ID (available across all gateway hops) to infer whether a sign-up originated from Partners Hub, avoiding an additional API call that would impact backend performance.","Affiliate activation event (most complex piece): when a client signs up via a partner's link, a new event must be created carrying the partner's marketing data — not the client's. Zan service to subscribe to CE sign-up events on the event bus.","Rudderstack event naming fix: partner sign-ups to be renamed from 'virtual sign up' to 'partner sign up' via a conditional transformer; partner commission wallet creation to be mapped as 'partner zero state'."]},{"title":"03-26 Marketing Analytics & Conversion Tracking Discrepancy Review","done":["FTD misattribution on Jamaica Gold campaign: 18 Jamaican depositors on 25 March had no FB source in UTM, meaning none should have been routed through Stape — yet FTD attribution was still appearing. Investigation ongoing.","Stape subscription upgraded to Care tier (USD 149/month, total USD 299/month) during the meeting; support call confirmed for 27 March 2026 at 15:30 Dubai time. Jamaica Gold to be used as the case study.","Partners V2 sign-up funnel discrepancy: 2,500 virtual account sign-ups reviewed, but only 33 had affiliate IDs — suggesting a major funnel drop-off or data mapping problem compared to V1 behaviour.","FBC is an encrypted campaign interaction ID (user interacted with a Meta ad); FBP is the Facebook Pixel ID for users logged into Facebook while on-site — affiliates duplicating the Deriv homepage could trigger erroneous events.","Next step: Chris to modify data query to surface partner/client account type distinction and investigate Jamaica Gold FTD attribution for the Stape support call on 27 March 2026."]},{"title":"03-27 Google Ads Offline Conversion Tracking & Campaign Performance Review","done":["V1 and V2 user data merged under the same conversion action due to sequential uploads using the same Google Sheet — separation is impractical at this stage; team agreed the merged conversion action is acceptable as individual user actions drive optimisation.","Prediction model over-predicting by ~3×: Uganda PMax showed 342 predicted FTDs vs. 5 actual funded accounts. 90-day model lag means predictions are disproportionately weighted toward January data.","Search campaigns showed better alignment between predictions and actuals compared to PMax — suggesting PMax lead quality is comparatively poorer.","Uganda PMax (Nov 2025 – Mar 2026): 23 new funded accounts, ROAS 1.96%, DOS 3.29%. Jamaica remains the stronger FTD driver alongside Uganda.","Discrepancy report to be presented to Zach/Isaiah on Monday 30 March 2026; LTV model to be run alongside FTD prediction for P-Max campaigns to get a fuller picture of campaign value."]}]}]},{"label":"Uncategorised","emoji":"❓","bg":"#F5F5F5","fg":"#999999","count":41,"summary":"41 meetings (10%) that didn't match any category pattern. A mixed bag: some are genuinely cross-cutting (Q1 milestones, operational alignment), some are technical discussions that didn't trigger keywords, some are personal recordings, and a few are timestamped file names with no descriptive title. The Jan Week 4 cluster (8 meetings) is notable — a burst of one-off strategic and product conversations in a dense week.","weeks":[{"month":"Nov 2025","week":"Week 1 (Nov 01-07)","count":3,"monthHead":"#145A32","monthLight":"#D5F5E3","commentary":"Three sessions that don't fit neatly into any category. Deriv App Store Visibility, Copy Trading UX, and Brand Protection is a product-marketing crossover. The Payal Performance Discussion is a management conversation that overlaps with HR. Root Cause Analysis AI Tool — the foundational AI tool session that technically belongs in AI & Predictive but was filed under a generic title.","meetings":[{"title":"Deriv App Store Visibility, Copy Trading UX, and Brand Protection","done":["Speaker tested the search term “Deriv” on the UK App Store.","Noticed competing listings (e.g., “plus 500”) bidding on the “Deriv” keyword.","Saw “Deriv Nakal” appearing instead of the official Deriv app.","Highlighted that users are unlikely to search “Deriv UAE”; they will simply type “Deriv”."]},{"title":"Performance discussion about Payal with naomi","done":["[Naomi] expressed frustration about a report submitted by Payal, which was the same one that had received negative feedback during her appraisal.","[Naomi] was unclear about quality expectations and asked whether the report met standards from [Shivank]'s perspective.","[Shivank] had not reviewed the latest version but observed that Payal may be failing to communicate her original idea effectively.","[Shivank] noted that Payal is struggling to accept the need to learn and improve, affecting her alignment with feedback."]},{"title":"Root Cause Analysis AI Tool","done":["`Marketing KPIs`","`Core vs. Experiment Campaigns`","`Click-to-Real and CPR`","KPI Framework and Levels"]}]},{"month":"Nov 2025","week":"Week 2 (Nov 08-14)","count":3,"monthHead":"#145A32","monthLight":"#D5F5E3","commentary":"Three sessions: Catchup with AppsFlyer covers the mobile attribution tool relationship. ClickUp Implementation and AI Reporting sets up the project management and reporting infrastructure. Naomi's First Meeting as TL is her inaugural session as Team Lead — a milestone captured but not otherwise categorised.","meetings":[{"title":"Catchup with Appsflyer team","done":["**Lack of clear integration architecture blueprint for their specific tech stack.** The team is unsure how to architect AppsFlyer with their existing systems (Firebase vs. AppsFlyer, HubSpot CRM, Datadog, web/app flows). Impact: delays in onboarding, risk of suboptimal data flows and limited activation on ad platforms. Current situation: they acknowledge multiple ways to integrate and lack strong internal architecture capability. Quantitative metrics: none provided yet; implied need to define key in-app events like signup, deposit, trade. Examples: questions about unique user IDs, CRM connectivity, web-to-app flows, postbacks, SA360/value-based bidding. Context: trading platform with plans to scale mobile; first time working with AppsFlyer for several team members. Stakeholders: Paid Acquisition, Mobile Acquisition/MAE team, CRM owners, tech leads.","**Limited internal experience with app marketing and in-app event design.** Several team members are new to app campaigns and mobile measurement, leading to uncertainty on which events to track and how to send them to partners (Meta/Google) for optimization. Impact: slower ramp-up, potential missed optimization opportunities (lookalike targeting, conversion modeling). Current situation: learning phase; relying on AppsFlyer guidance. Quantitative metrics: not specified; goal to reach volumes of sign-ups and deposits. Examples: desire to enable value-based bidding and define trading-related events (deposit, trade). Context: moving “all in on mobile” with a nascent MAE team (~6 months old). Stakeholders: Paid Acquisition, MAE team, Commercial/Tech stakeholders.","**Affiliate fraud risk and attribution hijacking.** Working with affiliates may lead to inflated installs and stolen attribution from genuine sources (e.g., Meta/Google), causing misaligned payouts. Impact: wasted spend, distorted performance data, incorrect partner credit, and potential budget misallocation. Current situation: awareness raised by AppsFlyer; need fraud controls (anti-fraud, uninstall analysis). Quantitative metrics: not provided; symptoms include spikes in installs not matching app store stats. Examples: affiliates getting credit for deposit/trade events by hijacking last-touch. Context: planning/using affiliate campaigns with performance payout triggers. Stakeholders: Acquisition, Finance, Compliance, BI/Analytics.","**Unclear roadmap alignment for web-to-app and value-based bidding on app.** They have guidance from Google and plan web-to-app and value-based bidding but have not implemented SA360 for app. Impact: delayed use of advanced bidding strategies, reliance on basic postbacks, reduced efficiency. Current situation: app not yet enabled for SA360; plan to reach sufficient signup volume before enabling value-based bidding. Quantitative metrics: threshold volumes for signups not defined. Examples: Google roadmap, SA360 real-time value-based bidding examples shared by AppsFlyer. Context: trading platform aiming to scale mobile conversions. Stakeholders: Paid Acquisition, Marketing Ops, Tech/Analytics."]},{"title":"ClickUp Implementation and AI Reporting","done":["**Description**:","Move all projects and trackable tasks to ClickUp as the single source of truth, replacing scattered Slack messages.","Provide Yoli with a centralized view of ownership and status across all tasks.","Enable visibility into team workload and project distribution among PICs."]},{"title":"Naomi's 1st meeting as TL","done":["A document was prepared to align on better ways of working together, inspired by a previous meeting. The team feels they work too individually and lack transparency.","It's acceptable for team members to have different opinions and disagree, as this brings new perspectives. However, all disagreements should be resolved within the meeting to ensure everyone is on the same page before leaving.","The key is to reach alignment and have clear action points before a meeting concludes, avoiding open-ended outcomes.","An activity is proposed for the next meeting where team members will share their personal strengths and weaknesses to understand each other better and leverage individual skills to fill gaps."]}]},{"month":"Nov 2025","week":"Week 3 (Nov 15-21)","count":1,"monthHead":"#145A32","monthLight":"#D5F5E3","commentary":"Execution Speed, Liquidity Providers, and Marketing Strategy — a cross-functional session touching trading operations, marketing, and execution. A reminder that the marketing team operates within a fintech context where trading infrastructure directly affects marketing claims.","meetings":[{"title":"Execution Speed, Liquidity Providers, and Marketing Strategy","done":["A concern was raised about a significant increase in transmission speed (latency) for some accounts, from 15 milliseconds to 1000 milliseconds.","A request was made for the dealing team to constantly monitor execution speed as a key performance indicator (KPI).","[Speaker 1] requested the IDs for the affected accounts to be sent for a thorough check on execution and booking status (A-book).","There's a risk that liquidity providers (LPs) might add delays or provide prices that differ from the global market, requiring stronger monitoring."]}]},{"month":"Nov 2025","week":"Martech Weekly Call - Summary.md","count":1,"monthHead":"#145A32","monthLight":"#D5F5E3","commentary":"","meetings":[{"title":"Martech Weekly Call","done":["Managing Affiliates without Unique Identifiers: Outlines a pragmatic data strategy for approximately 30,000 active affiliates from the \"MyAffiliates\" system who lack unique IDs. The temporary plan enables country managers to engage these affiliates by creating artificial identifiers, pushing them to HubSpot as a segmented list, and retroactively updating records with real IDs as affiliates create CR accounts—acknowledging a short-term drop in data quality until a permanent migration to the \"Scalio\" system.","**Key Points**","There is an issue with 30,000 affiliates who do not have a unique identifier.","A decision was made with Chris Horn and BI to temporarily send this data to HubSpot."]}]},{"month":"Dec 2025","week":"Week 1 (Dec 01-07)","count":5,"monthHead":"#6C3483","monthLight":"#F5EEF8","commentary":"Five diverse sessions. AI-focused Tribes and Lead Generation advances the tribe model. Marketing-Sales Integration and Skill Development addresses the handoff between marketing acquisition and sales activation. Risk Team CLV/CAC and Conversion Funnel Analysis is a cross-functional session with the risk team — the first time risk metrics (CLV/CAC) are brought into the marketing conversation. SKI (an agency) is evaluated for AI-optimised paid media management. Stakeholder Management and Email Marketing Analysis covers the internal communication and CRM programme.","meetings":[{"title":"AI-focused Tribes, Lead Generation, and Account Conversion","done":["The board is reimagining the structure of tribes, requiring them to be AI-focused projects.","Work that can be done within a standard function should be moved out of the tribes.","Tribes will now resemble AI-built projects or products, such as predictive modelling initiatives.","The team needs a conversation to restructure their work accordingly."]},{"title":"Marketing-Sales Integration, Skill Development, and Experimentation Strategy","done":["Topic Title: Concerns about marketing competence and self-doubt","Speaker 1 feels overwhelmed and tends to delay responses to process feedback before applying it, which prolongs discussions.","Feedback: strong in current role but needs a better grasp of marketing, especially integrating marketing with sales.","Speaker 1 is conflicted between passion and skill, worrying about not knowing “how to sell” despite technical marketing knowledge."]},{"title":"Risk team- CLV, CAC, and Conversion Funnel Analysis","done":["[Speaker 1] raised an issue understanding CLV, noting a value of USD 513 as of 30th October but getting lost in later conversations with Jatin and Conor.","The CLV definition is not standardised across teams (affiliate, Prakash, Yoli).","Kwan's team is collaborating with BI to define a clear, unified CLV calculation.","The new calculation will vary by country, as using an overall average can be misleading."]},{"title":"SKI- AI Optimisation and Paid Media Management","done":["**Description**:","[Speaker 3] (from Kenshu Sky) opened the meeting to understand the client’s business and needs.","The client is an online trading broker with 25 years in operation, active in Latin America, Africa, and Asia.","They have a strong web presence; their app presence is still emerging."]},{"title":"Stakeholder Management and Email Marketing Analysis","done":["[Speaker 2] expressed frustration with Prakash, a key stakeholder, for providing conflicting feedback on PPC candidate profiles and publicly criticising the team's PPC lead quality while privately offering support.","This has created uncertainty about Prakash's intentions, with [Speaker 1] suggesting he may be trying to avoid conflict.","There is a concern that leadership (Rakshath, Swarup) is receiving a skewed view of the team's performance. The team plans to proactively defend their work by documenting communications and building a data-backed narrative to clarify their contributions.","An analysis of the affiliate email workflows revealed significant issues, initiated by the observation that emails are not sent over the weekend."]}]},{"month":"Dec 2025","week":"Week 2 (Dec 08-14)","count":3,"monthHead":"#6C3483","monthLight":"#F5EEF8","commentary":"Three sessions in the summit week. Budget Control, Branding Optimisation, and Lead Quality Filter is a management session applying financial discipline to brand spend. Deriv E-book Reactivation, Platform Roadmap, and Organisation Restructure links content marketing to the broader platform and org change agenda. GTFT Overall is the summit wrap-up session.","meetings":[{"title":"Budget Control, Branding Optimisation, Lead Quality Filter","done":["Remaining overall budget figures: lead gen approx 149.2 total allocated; spend ~144.4 by Dec 12; branding spend ~48.79; branding remaining ~27.2.","Current December remaining budget discussed as 18k; recent daily spend ~3k and weekly target ~10k.","Concern about overspending; recommendation to monitor weekly spend and align to target.","Keep weekly spend around 10k for the remaining weeks; use dashboards to monitor and bring regions back to pace. Prioritise immediate budget control actions."]},{"title":"Deriv E-book Reactivation, Platform Roadmap, and Organisation Restructure","done":["A client is sending the e‑book to only about half of their audience as an A/B test, effectively “content vs nothing”. This was criticised as poor optimisation logic.","Despite this, one speaker is less concerned since they are already using the e‑book with their own clients. PR support is ongoing and the e‑book also exists in French and Spanish.","The e‑book is considered strong, “hot” content with a time‑sensitive window for reactivation (roughly now until end of January). After that, New Year‑style messaging usually takes over.","There is currently no dedicated landing page or clear CTA flow; questions remain about where users should be directed and how they convert into Deriv users."]},{"title":"GTFT overall","done":["Marcin Ternowski from Google IT marketing welcomed attendees to GTFT 2025, a flagship finance and technology summit.","The summit brings together BNC-level leaders in finance, technology, and fintech.","The speaker's passion is turning strategy into measurable impact and ROI, which is a key theme for the event.","The speaker praised Abu Dhabi as a city that embodies future-forward scale and innovation."]}]},{"month":"Jan 2026","week":"Week 1 (Jan 01-07)","count":1,"monthHead":"#7D6608","monthLight":"#FEFCE8","commentary":"Google Ad Manager for Internal Promotions and Future Monetisation — exploring using Google's ad serving infrastructure for internal cross-sell campaigns, a novel use case that could eventually create a monetisation layer on top of the existing client base.","meetings":[{"title":"Google Ad Manager for Internal Promotions and Future Monetisation","done":["An ad server: for serving own (house) ads and third-party ads.","An ad exchange: for programmatic monetisation through market demand.","Standard targeting (e.g., geo).","Key-Value Targeting: custom fields passed in the ad request from page logic or URL parameters (including UTMs). These can be dynamic or predefined and act as binary signals to match campaigns and serve tailored creatives."]}]},{"month":"Jan 2026","week":"Week 3 (Jan 15-21)","count":1,"monthHead":"#7D6608","monthLight":"#FEFCE8","commentary":"OTP Issues, User Sign-up Funnel, and Data Analysis — a product-technical session focused on one-time password delivery failures in the sign-up funnel. A conversion problem that sits at the intersection of product, engineering, and marketing acquisition.","meetings":[{"title":"war room client conversion- OTP Issues, User Sign-up Funnel, and Data Analysis","done":["A major issue was found with clients authenticating from PPC (Pay-Per-Click) pages, leading to OTP generation problems and lower conversions.","Race conditions in the authentication system (`Ori`) occur because sign-ups can start from multiple entry points.","To fix this, all sign-up CTAs on pages like `German.dev.com` will be unified into a single \"Sign Up\" button.","This button will redirect users to `home.dev.com`, ensuring a single origin for all sign-ups."]}]},{"month":"Jan 2026","week":"Week 4 (Jan 22-28)","count":8,"monthHead":"#7D6608","monthLight":"#FEFCE8","commentary":"Eight sessions in a dense week of one-off strategic meetings. Q1 Milestones and Operational Metrics Alignment sets the Q1 measurement framework. Amazon Operations AI-Driven Automation is an unusual session — AI automation applied to Amazon-related operations, possibly logistics or marketplace listing. Prototype-POC Selection and Demo Readiness aligns on which AI tools will be demoed at the H1 summit. Post-View and Post-Click Development is a product session. Referral Feature and Google Ad Manager Integration is a growth product session. Strategic Direction on Automation and Agent-First Model aligns on the operating model. Documentation Change Clarity defines how process changes are communicated. OneTap Onboarding Flow addresses the social sign-in UX.","meetings":[{"title":"01-22 Meeting- Product Strategy, Post-View & Post-Click Development","done":["**Decision:** The team decided to focus on developing and presenting a single, well-defined \"post-view\" product for an upcoming summit. Presenting two products was deemed too risky. The \"post-click\" product will be positioned as a future Phase 2.","**New Tool Proposal:** A proposal from Prakash and Hirsch for a simplified Google Ads tool for partners was discussed. While acknowledged as a significant gap, the idea was postponed to maintain focus, with the team noting that a similar solution (Aurora) already exists.","**Function:** This product aims to improve campaign efficiency by identifying and excluding underperforming websites that bring in traffic but few new funded users (depositors).","**Development Status:** Jatin is working on a dashboard linking user deposit data back to source websites, expected by next Tuesday. An LLM will be used to process this data to identify and suggest bad websites for exclusion."]},{"title":"01-22 Weekly Meeting- Q1 Milestones, Unlocks vs Visible Signals, and Operational Metrics Alignment","done":["Clarifying milestones vs. sub-steps and planning depth","Concern raised that projects show only one milestone, which may signal poor planning.","Suggestion: keep the Q1 milestone as the key target but add 1–3 smaller milestones or sub-steps under it.","Purpose: help communicate a clear plan to stakeholders (e.g., Prakash) and avoid misperceptions."]},{"title":"01-26 Meeting- AI-Driven Automation for Amazon Operations and Six-Month Project Plan","done":["Topic Title: Scaling AI support for Amazon-related operations","Description:","Aim to scale Amazon-related operations by using AI to reduce internal workload.","Focus on analysing daily tasks and identifying where AI can automate or assist."]},{"title":"01-26 Meeting- Prototype-POC Selection, Demo Readiness, and Commitment Planning","done":["Topic Title: Selection and Tracking of Prototype/POC Projects","Prakash emphasised selecting 4–5 projects as prototypes/POCs within the next couple of hours.","Deliverables include evidence of building and launching items that reduce manual work by end of the week.","Daily status updates requested: short, clear statements on progress and confidence for Thursday commitments."]},{"title":"01-26 Meeting- Referral Feature & Google Ad Manager Integration","done":["**Description**","The discussion began around enabling the referral feature on the partners or trade platforms, timed with another partner-related release.","The core of the referral functionality is from Scalio, which provides campaign-led referrals. The backend is ready, but the frontend app integration is pending.","An integration with HubSpot was proposed. This would allow referral to be an action triggered by Event 360, which uses CRM data to decide the next best action for a user."]},{"title":"01-26 Meeting- Strategic Direction on Automation and Agent-First Model","done":["The main theme for the year is \"excellence through automation,\" focusing on phasing out manual work and adopting an agent-first model.","The goal is to productize systems to drive growth and scale with the same headcount.","This strategy is critical for staying competitive in a crowded market with hundreds of brokers and new entrants.","The industry is highly competitive, with a high churn rate among new companies."]},{"title":"01-27 Meeting- Documentation Change Clarity and Standardisation","done":["Clarifying documentation of changes","Saurabh reviewed an item and confirmed it is visible.","He asked how to clearly confirm what changes have been done.","He suggested writing it so the reader can easily see the specific changes."]},{"title":"01-27 Meeting- OneTap onboarding flow, country of residence requirement, and social sign-in consistency","done":["Topic Title: OneTap onboarding flow and country of residence requirement","The current OneTap V2 requires users to provide their country of residence before proceeding.","There is an extra step on a specific “tactic” page to collect the country of residence.","Clarification is needed in the UI copy: users have not yet created an account; they must provide their country of residence before moving ahead."]}]},{"month":"Jan 2026","week":"Week 5 (Jan 29-31)","count":1,"monthHead":"#7D6608","monthLight":"#FEFCE8","commentary":"","meetings":[{"title":"01-30 Meeting- Presentation Review and Event Logistics","done":["Discussion on presentation content, including \"audience discovery\" and \"two-step shuffle\".","Naomi and Shivank Shankar reviewed using asterisks instead of inverted commas.","Discussion about changing slide images; Shivank suggested taking a screenshot and specifying the change.","Naomi replaced an image, but it was not displaying correctly in the presentation."]}]},{"month":"Feb 2026","week":"Week 1 (Feb 01-07)","count":1,"monthHead":"#922B21","monthLight":"#FDEDEC","commentary":"","meetings":[{"title":"2026-02-03 13-45-20","done":[]}]},{"month":"Feb 2026","week":"Week 2 (Feb 08-14)","count":4,"monthHead":"#922B21","monthLight":"#FDEDEC","commentary":"Four sessions. Aswathi's Performance Marketing Skill Gaps and GTM Strategy session is an honest assessment of where the team's skills don't match the strategy's requirements. Payal's Reporting Alignment, ROI Targets, and Media Planning session advances the reporting framework. Phone Number Acquisition, TradingView Integration, and Bonus Structures is a cross-functional session on growth mechanics.","meetings":[{"title":"2026-02-09 10-30-30 merged","done":["Aswathi raised concerns about the team's skill gaps, particularly in the fundamentals of performance marketing.","The discussion highlighted a lack of practical experience with ad platforms like Meta and YouTube, beyond Google.","While the team is strong in high-level data analysis and backend strategies (like ROAS improvement), they lack knowledge in frontend campaign setup and execution.","Aswathi noted that questions about platform-level strategies and go-to-market plans are common in interviews, and this is where she feels unprepared."]},{"title":"Aswathi- Performance Marketing Skill Gaps and GTM Strategy","done":["Aswathi raised concerns about the team's skill gaps, particularly in the fundamentals of performance marketing.","The discussion highlighted a lack of practical experience with ad platforms like Meta and YouTube, beyond Google.","While the team is strong in high-level data analysis and backend strategies (like ROAS improvement), they lack knowledge in frontend campaign setup and execution.","Aswathi noted that questions about platform-level strategies and go-to-market plans are common in interviews, and this is where she feels unprepared."]},{"title":"Payal- Reporting Alignment, ROI Targets, Funnel Visibility, and Media Planning","done":["Topic Title: Reporting Lines and Org Structure Changes","Shivank relayed Rakesh’s messages about aligning reporting; options discussed were Priyanka or Prakash.","Shivank stated he is unwilling to report to Priyanka due to past micromanagement concerns.","Current setup described as “no layers,” with direct access to Prakash and Rakesh for decisions and negotiations."]},{"title":"Phone Num Acquisition, TradingView Integration, and Bonus Structures","done":["**Mobile Capture:** The team is shifting strategy to capture mobile phone numbers immediately at the sign-up stage (even for demos) rather than requiring email first. This aims to secure higher-quality leads and avoid disposable emails.","**Landing Page & Flow:** A new landing page will be created requesting only a phone number. The flow involves OTP verification followed by lead nurturing via WhatsApp (\"juicing the orange\") or SMS.","**Infrastructure:** Twilio is currently in use, with Plivo integration scheduled for this week to expand country coverage. WhatsApp will be the primary channel for supported regions (e.g., Latin America), while SMS will be used elsewhere (excluding the US).","**Target Markets:** Specific campaigns are being targeted at Venezuela, Bangladesh, and the Philippines."]}]},{"month":"Feb 2026","week":"Week 3 (Feb 15-21)","count":3,"monthHead":"#922B21","monthLight":"#FDEDEC","commentary":"Three sessions including two timestamped files with no descriptive titles (likely audio recordings that weren't renamed). Marketing Strategy and Relaunch is a broad repositioning session. Deposit Entry Flow, Failure Analysis, and Beginner UX Improvements is a critical product-marketing conversion session — deposit failures are a direct revenue loss.","meetings":[{"title":"02-18 Meeting- Marketing Strategy and Relaunch","done":["A technical migration is underway, during which the company aims to avoid acquiring new customers.","A request was made to define the \"bare minimum\" brand awareness and recall activities that can run until April.","The company will maintain limited media presence for the Airtel brand.","The speaker will seek board approval for the proposed minimum activities, such as a few hoardings."]},{"title":"02-19 Team Meeting- Deposit Entry Flow, Failure Analysis, and Beginner UX Improvements","done":["Topic Title: Deposit Entry Flow and Tracking","The “entry flow” refers to landing on the deposit page and selecting a payment method.","Entry flow should capture intent; unique user constraints are not required for click events.","Payment methods on the entry page include card, crypto, and fiat."]},{"title":"2026-02-21 21-56-09","done":[]}]},{"month":"Feb 2026","week":"Week 4 (Feb 22-28)","count":2,"monthHead":"#922B21","monthLight":"#FDEDEC","commentary":"Two sessions: Cohort ROI, LTV Strategy, and AI-Driven Retention advances the retention-through-AI agenda. Data Rolling Window and User Prediction Model is a technical session on how time windows affect model accuracy — important for the predictive models that will go live in March.","meetings":[{"title":"02-24 Team Meeting- Cohort ROI, LTV Strategy, and AI-Driven Retention","done":["Topic Title: Challenges with Lifetime Value (LTV) and Cohort ROI","The team sees acceptable conversion funnel and cumulative ROI, but cohort-level ROI struggles over 6–12 months.","There is no clear, data-backed plan to increase LTV; company-level understanding of LTV by country is missing.","Current focus has been on acquisition (PPC), while retention and LTV improvement lack strategy."]},{"title":"02-24 Technical Discussion- Data Rolling Window & User Prediction Model","done":["**72-Hour Window:** The team agreed to implement a 72-hour rolling window for data updates. Data older than this window will be removed, and new data will be continuously added.","**Daily Updates:** The list will be dynamically refreshed every day.","**Offline Importing Context:** Ishank referenced previous offline imports involving GCLID users and six months of data—high in volume and leveraged by Google for optimisation.","**Operational Ease:** Shivank Shankar highlighted that a 72-hour rolling window simplifies backend operations for a team with part-time members who may not always be available."]}]},{"month":"Mar 2026","week":"Week 1 (Mar 01-07)","count":3,"monthHead":"#0E6655","monthLight":"#E8F8F5","commentary":"Three sessions: UAE Marketing Strategy, V2 Launch, Budget Commitment, and Competitive Positioning is a regional strategy session with commercial commitments. Channel Chiefs Feature for Slack Signals and Work Tracking introduces a new Slack-based work visibility tool. Camera Application Troubleshooting is a pure technical support recording — the most clearly non-meeting item in the entire dataset.","meetings":[{"title":"03-05 Meeting- UAE Marketing Strategy - Product V2 Launch, Budget Commitment, and Competitive Positioning","done":["The team discussed UAE marketing, focusing on out-of-home (OOH) advertising such as billboards.","There is a committed budget to agencies: 482–606 dollars in total that must be spent.","This includes commitments to EDS and existing media buying agreements.","Key constraint: Media buying is a pure branding effort with no measurable ROI on funded FTTs (first-time traders)."]},{"title":"03-06 Team Meeting- Implementation of Channel Chiefs Feature for Slack Signals and Work Tracking","done":["The organisation is enhancing the Slack signals system previously used during appraisal downloads to track employee KPIs and contributions.","A new \"channel chief\" feature will be introduced in private Slack channels to improve visibility of team members' work.","The system will analyse twelve months of backdated data and compile it into a TL (Team Lead) report on the TL channel.","This will help managers track what different projects team members are working on, especially when they may not have complete visibility."]},{"title":"03-06 Technical Issue- Camera Application Troubleshooting","done":["[Speaker 1] encountered a camera unavailability error message stating \"camera is unavailable, try closing other apps that may be using it.\"","Discussion occurred about which application was being used.","Recording was initiated and then stopped during the troubleshooting process.","Casual conversation took place between participants."]}]},{"month":"Mar 2026","week":"Week 2 (Mar 08-14)","count":1,"monthHead":"#0E6655","monthLight":"#E8F8F5","commentary":"V2 Architecture Migration — Journey, Achievements, and Team Transformation. A retrospective and forward-looking session on the V2 migration: what has been accomplished, what remains, and how the team has changed through the process. A rare moment of reflection in an execution-heavy period.","meetings":[{"title":"03-11 Meeting- V2 Architecture Migration - Journey, Achievements, and Team Transformation","done":["The team experienced multiple failed refactoring attempts using GoJS and Golang before choosing a completely new approach.","Low code was selected over AI for the rebuild, despite widespread scepticism about it being “serious engineering”.","The full V2 rollout achieved 80% sign-ups within 16 months, versus 2 years for Bind Me V2 on the same legacy architecture.","Timeline breakdown:"]}]}]},{"label":"People, HR & Org","emoji":"👥","bg":"#FFF3E0","fg":"#E65100","count":33,"summary":"33 meetings across 13 weeks — the hidden workload. Performance reviews, appraisals, conflict resolution, role transitions, and restructuring ran continuously alongside all the technical work. The Feb–Mar cluster (conflict resolution, layoff strategy, HR escalations, salary disputes) coincides with the period of maximum commercial pressure, revealing the organisational stress beneath the delivery metrics.","weeks":[{"month":"Nov 2025","week":"Week 1 (Nov 01-07)","count":2,"monthHead":"#145A32","monthLight":"#D5F5E3","commentary":"Two Payal sessions open the HR activity: an appraisal feedback session and a probation/team-fit review. The probation review is the more significant — it establishes the performance standard for junior team members early in the period.","meetings":[{"title":"Payal appraisal feecback","done":["**Probationary Appraisal and Interpreting Feedback:** This covers the specific evaluation framework for probationary employees, including its unique rating scale. It also provides guidance on interpreting developmental feedback as a constructive tool for growth rather than negative criticism, emphasising that the employee's confirmation is secure.","**Positive Performance Feedback:** This point summarises the employee's recognised strengths, such as strong ownership, proactivity in problem-solving, driving valuable solutions, effective cross-functional collaboration, and being a dependable, fast learner.","**Strategic Understanding and Business Context (The \"Why\"):** This identifies the core developmental feedback, stressing the need to move beyond task execution to grasp the strategic purpose behind the work. This involves asking questions to understand business objectives and how tasks contribute to wider team goals.","**Analytical Reporting Standards:** This outlines the requirement for reports to be more than just data summaries. They must provide insightful analysis, conclusions, and actionable next steps. It highlights a miscommunication over a draft report, stressing the need to clearly label documents to manage expectations."]},{"title":"Performance Review- Payal’s Probation and Team Fit","done":["A discussion was held regarding an employee, Payal, and her performance during her probation period.","[Shivank] noted that Payal’s defensive reaction to feedback is a significant red flag. She tends to believe she is always right and does not accept criticism well.","Her body language during feedback sessions suggests she feels misunderstood and that her colleagues “don’t understand.”","The issue is identified as a will issue (unwillingness to learn/change) rather than a skill issue."]}]},{"month":"Nov 2025","week":"Week 2 (Nov 08-14)","count":3,"monthHead":"#145A32","monthLight":"#D5F5E3","commentary":"Three sessions signal early organisational stress. Naomi's People Management and Role Transition session formalises her promotion to Team Lead. The Team Building session (Guess My Emoji and Worst Idea Brainstorm) is a deliberate morale investment in a period of high pressure. Yoli's Team Restructuring and Budget Management session introduces the first formal discussion of team structure changes.","meetings":[{"title":"Naomi's People Management and Role Transition","done":["Speaker 2 feels unprepared and scared about a new role that involves greater responsibility and people management.","Others have cautioned Speaker 2 about the politics and challenges of people management.","Speaker 2 describes moving from a comfortable position (\"the side of the Sun\") to a more uncertain one (\"a good dark part\").","They feel they should have been more mentally prepared, having previously thought the role change might not happen."]},{"title":"Team Building- Guess My Emoji & Worst Idea Brainstorm","done":["**Objective:** Each person chose 3-5 emojis to represent themselves or a personal story. The rest of the team then guessed the meaning behind the emojis.","**Gameplay Highlights:**","**Payal's Emojis (Dog, sleeping face, movie clapper, knife, snake):** The team guessed she was a dog lover who watched movies. Payal clarified she loves binge-watching thrillers with murders and dislikes people with \"snake-like\" instincts.","**Tabish's Emojis (Mountain, microphone, scuba diver, avocado, chess piece):** Guesses correctly pointed to his love for outdoor adventures, singing, swimming, healthy eating (avocado), and strategizing (chess)."]},{"title":"Yoli- Team Restructuring, Budget Management, and Affiliate Program","done":["[Speaker 2] announced that Chris Godfrey will be joining their team.","Chris will bring a team of marketing engineers, AI engineers, and a dedicated data team to provide support.","He will lead the 'ads to use the cns team' and build an engineering function for support.","[Speaker 1] believes this will be a \"game changer\" and make it easier to get things done, especially regarding marketing-related technical aspects."]}]},{"month":"Dec 2025","week":"Week 1 (Dec 01-07)","count":1,"monthHead":"#6C3483","monthLight":"#F5EEF8","commentary":"Google Call Prep, Influencer Hiring, ClickUp Ownership, and Org Restructuring — a single session with four distinct threads. The org restructuring thread is now appearing in general strategy sessions, not just dedicated HR meetings, suggesting the restructuring agenda is becoming embedded in day-to-day conversations.","meetings":[{"title":"Google Call Prep, Influencer Hiring, ClickUp Ownership, and Org Restructuring","done":["Topic Title: Landing page questions and ownership in ClickUp","Description:","Discussed adding a “questions” section to the landing page.","Ownership of the questions task has moved to Speaker 1."]}]},{"month":"Dec 2025","week":"Week 2 (Dec 08-14)","count":3,"monthHead":"#6C3483","monthLight":"#F5EEF8","commentary":"Three sessions during the busiest week of the period. Marketing Team Structure and Role Overload surfaces the workload issue explicitly — the team is understaffed for its ambition. Organisational Restructure and PPC Strategy links team design to campaign execution — you can't have AI-first PPC without reshaping the team around it. Workplace Dynamics and Expectation Management is a conflict management session.","meetings":[{"title":"Marketing Team Structure and Role Overload","done":["The discussion focused on the Chief Growth Officer, who has a communications background rather than a traditional marketing one.","There is uncertainty about how this background will shape the growth strategy.","A female colleague in the marketing team was noted as highly knowledgeable and capable.","It was suggested that the Chief Growth Officer will likely rely heavily on her expertise."]},{"title":"Organisational Restructure and PPC Strategy","done":["**Discussion**:","A significant organisational change, referred to as \"plan 26,\" is imminent. The trading and affiliate teams will merge with the marketing department to form a single \"growth\" function.","Prakash will lead this new merged function, which includes trading, marketing, and GP.","The new reporting structure will have Yoli reporting to Prakash, who then reports to Rakshay."]},{"title":"Workplace Dynamics and Expectation Management","done":["Speaker 2 expressed anxiety about working with Prakash again, citing past negative experiences that are causing stress.","The main concern is Prakash's tendency to create pressure, want more and more, and have high expectations without providing a supportive environment.","Speaker 2 feels that working with Yodhi was going well, as she provided freedom and condensed tasks, but Prakash's involvement adds complexity and pressure.","There is a lack of clarity on roles and how to function, particularly between Yodhi and Prakash. Speaker 2 is caught between their differing expectations."]}]},{"month":"Dec 2025","week":"Week 3 (Dec 15-21)","count":3,"monthHead":"#6C3483","monthLight":"#F5EEF8","commentary":"Three sessions covering performance and role clarity. Naomi's Partner Activation and Role Clarity session settles ownership boundaries between Naomi and the broader team. Taabish's Q3 Appraisal and Team Strategy session closes out the quarterly review cycle. Yoli's PPC Performance, Team Dynamics, and Technical Implementation session signals that team dynamics are affecting campaign execution.","meetings":[{"title":"Naomi- Partner Activation, Role Clarity, Compliance Governance, and Quarterly Priorities","done":["Managing information flow to reduce pressure","Limit updates to Prakash to 3–4 priority items per quarter; maintain a buffer of 1–2 items to handle quietly without escalation.","Align on a single, concise “story” across the team to avoid scope creep and keep pressure focused on committed deliverables.","Agreement to maintain controlled information sharing and a unified narrative."]},{"title":"Taabish- Performance Review- Q3 Appraisal and Team Strategy","done":["[ ] [Speaker 1] will ensure the ClickUp setup is properly aligned and sorted.","[ ] The team will work on automating the process for tracking performance numbers to move away from manual Google Sheet updates.","[ ] [Speaker 2] will focus on increasing engagement in meetings and on Slack by asking questions and participating in broader team discussions.","[ ] The team will consider re-implementing weekly updates or platform-specific brainstorming sessions to improve collaboration and visibility."]},{"title":"Yoli- PPC Performance, Team Dynamics, and Technical Implementation","done":["[Speaker 1] expressed feeling low and anxious due to past negative experiences working with Prakash.","Prakash is perceived as wanting extremely fast responses and more information, which he then uses to find faults. If things go wrong, he blames others' judgment.","[Speaker 1] recalled Prakash judging people based on their reply speed and felt a subconscious pressure to respond quickly, which they are now trying to resist.","Prakash also kept Shivam's involvement in the PPC partner project a secret from [Speaker 1], despite Swarup's request to include him."]}]},{"month":"Jan 2026","week":"Week 2 (Jan 08-14)","count":3,"monthHead":"#7D6608","monthLight":"#FEFCE8","commentary":"Three performance reviews in a single week. Ishank's Performance Review covers AI initiatives and career development — a signal that AI capability is now a performance criterion. Saurabh's Team Misalignment and Role Clarity session surfaces misaligned expectations between Saurabh's understanding of his role and the organisation's expectations. Taabish's Q4 Feedback and Squad Feedback session closes out the annual review cycle.","meetings":[{"title":"Ishank Performance Review- AI Initiatives & Career Roadmap","done":["The discussion began around the appraisal, with Shivank noting his comments are based on actual accounts and numbers. The core theme was that career growth and better compensation are directly tied to demonstrating clear, quantifiable business impact.","Speaker 1 raised concerns about their pay scale being very low compared to market standards. Shivank acknowledged this and explained that while the company is willing to align salaries with the market, management requires a clear demonstration of impact to justify it.","Past experiences, like receiving a 100 dirham raise, were seen as disrespectful and were a result of not effectively showcasing impact.","Showing the direct impact of recent initiatives, like copy optimisation, is difficult in the current appraisal cycle due to lag time, with results expected in Q2 or Q3."]},{"title":"Saurabh Weekly Meeting- Team Misalignment & Role Clarity","done":["Shivank expressed frustration with Prakash's chaotic approach, noting he doesn't seem to understand his own role.","Prakash communicates via Slack but isn't clear, leading to confusion. An example was given about Ashwati's placement in a team and conflicting feedback regarding Naomi and Yoli.","There is a general feeling of chaos and lack of clear communication from Prakash, who either replies vaguely or not at all.","Shivank mentioned a disconnect in the marketing function, with Prakash insisting on a structure that isn't aligning with others, causing \"cross-firing\"."]},{"title":"Taabish Q4 feedback- Performance Review Alignment, Campaign Documentation, and Squad Feedback","done":["Performance review preparation and alignment","A shared Google Sheet consolidates self, squad, and manager inputs, plus prior quarter comments (including Yoli’s).","Aim: Align on content before submission; cover self, squad, and manager sections for Q4.","Manager seeks clarity and proactive feedback to avoid past appraisal confusion."]}]},{"month":"Jan 2026","week":"Week 3 (Jan 15-21)","count":1,"monthHead":"#7D6608","monthLight":"#FEFCE8","commentary":"Payal Probation Confirmation — Performance Feedback, Campaign QA, and Confirmation Decision. Payal's probation is formally concluded. The session also covers campaign QA standards — performance reviews are now being linked to work quality metrics.","meetings":[{"title":"Payal probation confirmation- Performance Feedback, Campaign QA, and Confirmation Decision","done":["Performance appraisal content and tone","Discussion on appraisal wording that “supports and scores level delivery,” emphasising collaboration and demonstrable cross-team impact.","Request to include examples, strategic feedback, ad copy, and collaboration with content.","Concern that the writing style resembles Slack; clarification requested and provided."]}]},{"month":"Feb 2026","week":"Week 2 (Feb 08-14)","count":3,"monthHead":"#922B21","monthLight":"#FDEDEC","commentary":"Three sessions as team stress accelerates. Conor's Pods, Team Goals, Meta Reporting Issue, and Job Security session is notable — job security concerns are surfacing alongside the technical problem (Meta reporting discrepancy). Prakash and Mahantesh's AI for Advertising Optimisation and Team Restructure session links the AI transformation directly to team headcount decisions. Swati's Project Direction and Team Dynamics session flags morale issues in the partner toolkit team.","meetings":[{"title":"Conor- Pods, Team goals, Meta reporting issue and job security","done":["**Description:**","The \"pods\" initiative is a main focus, aiming to increase trading volume across various assets.","The three main pods are Metals (Gold, Silver, Copper), US Indices, and Crypto. Silver has been paused due
